            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

        // 初始化主题：优先使用 localStorage，否则跟随系统
        let savedTheme = localStorage.getItem("meek_theme");

        if (savedTheme === null) {

        }

<body><!-- 访客欢迎通知组件 -->
<script>
(function() {
    const VISIT_KEY = 'blog_welcome_shown';
    const VISIT_EXPIRY_KEY = 'blog_welcome_expiry';
    // 24小时的毫秒数
    const EXPIRY_TIME = 24 * 60 * 60 * 1000;
    let hasShownToast = false;
    
    function createWelcomeToast() {
        const toast = document.createElement('div');
        toast.id = 'welcome-toast';
        toast.className = 'welcome-toast';
        toast.innerHTML = `
            <div class="welcome-toast-inner">
                <div class="welcome-toast-content">
                    <div class="welcome-toast-icon">👋</div>
                    <div class="welcome-toast-body">
                        <p id="welcome-message" class="welcome-toast-title">正在加载...</p>
                        <p id="welcome-stats" class="welcome-toast-stats"></p>
                        <p class="welcome-toast-quote">在茫茫互联网的大海中 感谢遇见你🙏</p>
                        <div class="welcome-toast-links">
                            <a href="https://t.me/kemiaochat" target="_blank" rel="noopener noreferrer" class="welcome-toast-link welcome-toast-link-blue">
                                👆加群
                            </a>
                            <span class="welcome-toast-divider">|</span>
                            <a href="https://github.com/moretti815/blog/issues/2" class="welcome-toast-link welcome-toast-link-green">
                                📬订阅更新
                            </a>
                            <span class="welcome-toast-divider">|</span>
                            <a href="javascript:void(0)" onclick="copyRssLink()" class="welcome-toast-link welcome-toast-link-orange">
                                📋RSS
                            </a>
                        </div>
                        <p id="rss-copy-msg" class="welcome-toast-copy-msg hidden">已复制到剪贴板~</p>
                    </div>
                    <button onclick="closeWelcomeToast()" class="welcome-toast-close" aria-label="关闭">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(toast);
        return toast;
    }
    
    window.closeWelcomeToast = function() {
        const toast = document.getElementById('welcome-toast');
        if (toast) {
            toast.classList.remove('show');
            setTimeout(() => {
                toast.remove();
            }, 500);
        }
    };
    
    window.copyRssLink = async function() {
        const msg = document.getElementById('rss-copy-msg');
        const rssUrl = window.location.origin + '/rss.xml';
        try {
            await navigator.clipboard.writeText(rssUrl);
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 2000);
        } catch (e) {
            const input = document.createElement('input');
            input.value = rssUrl;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 2000);
        }
    };
    
    async function fetchLocation() {
        try {
            const response = await fetch('https://v2.xxapi.cn/api/ip');
            const data = await response.json();
            
            if (data.code === 200 && data.data) {
                const location = data.data;
                const locationText = `HI 来自${location.address}的朋友`;
                
                const messageEl = document.getElementById('welcome-message');
                if (messageEl) {
                    messageEl.textContent = locationText;
                }
            }
        } catch (error) {
            console.error('Failed to fetch location:', error);
            const messageEl = document.getElementById('welcome-message');
            if (messageEl) {
                messageEl.textContent = 'HI 来自远方的朋友';
            }
        }
    }
    
    async function fetchStats() {
        // 等待 Vercount 脚本加载完成
        let attempts = 0;
        const maxAttempts = 30; // 最多等待3秒
        
        while (attempts < maxAttempts) {
            const sitePvEl = document.getElementById('busuanzi_value_site_pv');
            if (sitePvEl && sitePvEl.textContent) {
                const pageviews = sitePvEl.textContent.trim();
                const statsText = `欢迎 我是 Moretti 你是本站迎来的第${pageviews}次访问`;
                
                const statsEl = document.getElementById('welcome-stats');
                if (statsEl) {
                    statsEl.textContent = statsText;
                }
                return;
            }
            await new Promise(resolve => setTimeout(resolve, 100));
            attempts++;
        }
        
        // 超时后显示默认文本
        const statsEl = document.getElementById('welcome-stats');
        if (statsEl) {
            statsEl.textContent = '欢迎 我是 Moretti';
        }
    }
    
    async function showWelcomeToast() {
        if (hasShownToast) return;
        
        const toast = createWelcomeToast();
        
        // 强制重绘以确保过渡动画生效
        toast.offsetHeight;
        
        setTimeout(() => {
            toast.classList.add('show');
        }, 100);
        
        hasShownToast = true;
        
        await Promise.all([fetchLocation(), fetchStats()]);
        
        // 5秒后自动关闭
        setTimeout(() => {
            closeWelcomeToast();
        }, 5000);
    }
    
    function shouldShowWelcome() {
        const now = Date.now();
        const expiry = localStorage.getItem(VISIT_EXPIRY_KEY);
        
        // 如果存在过期时间且未过期，则不显示
        if (expiry && now < parseInt(expiry)) {
            return false;
        }
        
        // 如果已过期或不存在，清除旧数据
        localStorage.removeItem(VISIT_KEY);
        localStorage.removeItem(VISIT_EXPIRY_KEY);
        return true;
    }
    
    function markAsVisited() {
        const now = Date.now();
        localStorage.setItem(VISIT_KEY, 'true');
        localStorage.setItem(VISIT_EXPIRY_KEY, (now + EXPIRY_TIME).toString());
    }
    
    // 等待页面加载完成后再显示
    function init() {
        if (shouldShowWelcome()) {
            markAsVisited();
            // 延迟显示，等待页面其他元素加载
            setTimeout(() => {
                showWelcomeToast();
            }, 1000);
        }
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>

<script>
(function() {
    // 回到顶部功能
    function backToTop() {
        window.scroll({ top: 0, behavior: 'smooth' });
    }

    // 滚动监听，控制按钮显示/隐藏
    function handleScroll() {
        const wrapper = document.getElementById('back-to-top-wrapper');
        if (!wrapper) return;

        // 当滚动超过 300px 时显示按钮
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        if (scrollTop > 300) {
            wrapper.classList.add('visible');
        } else {
            wrapper.classList.remove('visible');
        }
    }

    // 节流函数，优化性能
    function throttle(func, limit) {
        let inThrottle;
        return function() {
            const args = arguments;
            const context = this;
            if (!inThrottle) {
                func.apply(context, args);
                inThrottle = true;
                setTimeout(function() {
                    inThrottle = false;
                }, limit);
            }
        };
    }

    // 绑定滚动事件（节流处理，每 100ms 执行一次）
    window.addEventListener('scroll', throttle(handleScroll, 100));

    // 初始化一次
    handleScroll();

    // 暴露到全局
    window.backToTop = backToTop;
})();
</script></body>

let systemThemeListener = null;

function getSystemTheme() {
    return systemThemeMediaQuery.matches ? 'dark' : 'light';
}

function startSystemThemeListener() {
    // 移除旧的监听器
    if (systemThemeListener) {
        systemThemeMediaQuery.removeEventListener('change', systemThemeListener);
    }
    // 添加新的监听器
    systemThemeListener = (e) => {
        let newSystemTheme = e.matches ? 'dark' : 'light';
        document.documentElement.setAttribute("data-color-mode", newSystemTheme);
        // 更新图标
        if (themeSettings[newSystemTheme]) {

            document.getElementById("themeSwitch").setAttribute("d", IconList[icon]);
            document.getElementById("themeSwitch").parentNode.style.color = color;
        }
    };
    systemThemeMediaQuery.addEventListener('change', systemThemeListener);
}

function stopSystemThemeListener() {
    if (systemThemeListener) {
        systemThemeMediaQuery.removeEventListener('change', systemThemeListener);
        systemThemeListener = null;
    }
}

function applyTheme(mode) {
    // 应用主题设置，更新图标和颜色
    if (themeSettings[mode]) {
        let icon = themeSettings[mode][1];
        let color = themeSettings[mode][2];
        document.getElementById("themeSwitch").setAttribute("d", IconList[icon]);
        document.getElementById("themeSwitch").parentNode.style.color = color;
    }

    if (currentThemeMode === "light") {
        newMode = "dark";

        newMode = "auto";
    } else {
        newMode = "light";

// 树枝背景动画 - 参考 BackgrounRandom.astro
(function() {
    const canvas = document.getElementById('branch-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    
    const r180 = Math.PI;
    const r90 = Math.PI / 2;
    const r15 = Math.PI / 12;
    const MIN_BRANCH = 30;
    const len = 6;
    
    let steps = [];
    let prevSteps = [];
    let size = { width: window.innerWidth, height: window.innerHeight };
    
    function randomMiddle() {
        return Math.random() * 0.6 + 0.2;
    }
    
    function initCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = size.width + 'px';
        canvas.style.height = size.height + 'px';
        canvas.width = dpr * size.width;
        canvas.height = dpr * size.height;
        ctx.scale(dpr, dpr);
    }
    
    function polar2cart(x, y, r, theta) {
        const dx = r * Math.cos(theta);
        const dy = r * Math.sin(theta);
        return [x + dx, y + dy];
    }
    
    function step(x, y, rad, counter) {
        counter = counter || { value: 0 };
        const length = Math.random() * len;
        counter.value += 1;
        
        const [nx, ny] = polar2cart(x, y, length, rad);
        
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(nx, ny);
        ctx.stroke();
        
        const rad1 = rad + Math.random() * r15;
        const rad2 = rad - Math.random() * r15;
        
        if (nx < -100 || nx > size.width + 100 || ny < -100 || ny > size.height + 100) return;
        
        const rate = counter.value <= MIN_BRANCH ? 0.8 : 0.5;
        
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad1, counter); });
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad2, counter); });
    }
    
    function frame() {
        prevSteps = steps;
        steps = [];
        
        if (!prevSteps.length) return;
        
        prevSteps.forEach(function(i) {
            if (Math.random() < 0.5) steps.push(i);
            else i();
        });
        
        requestAnimationFrame(frame);
    }
    
    function getBranchColor() {
        const isDark = document.documentElement.getAttribute('data-color-mode') === 'dark';
        // 使用 CSS 变量获取主题色，适配明暗模式
        const style = getComputedStyle(document.documentElement);
        const accent = style.getPropertyValue('--color-accent-fg').trim() || (isDark ? '#58a6ff' : '#0969da');
        // 解析 HSL 并降低透明度
        if (accent.startsWith('#')) {
            const r = parseInt(accent.slice(1, 3), 16);
            const g = parseInt(accent.slice(3, 5), 16);
            const b = parseInt(accent.slice(5, 7), 16);
            return 'rgba(' + r + ', ' + g + ', ' + b + ', 0.12)';
        }
        return isDark ? 'rgba(88, 166, 255, 0.12)' : 'rgba(9, 105, 218, 0.12)';
    }
    
    function start() {
        const color = getBranchColor();
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 1;
        ctx.strokeStyle = color;
        prevSteps = [];
        steps = [
            function() { step(randomMiddle() * size.width, -5, r90); },
            function() { step(randomMiddle() * size.width, size.height + 5, -r90); },
            function() { step(-5, randomMiddle() * size.height, 0); },
            function() { step(size.width + 5, randomMiddle() * size.height, r180); }
        ];
        if (size.width < 500) steps = steps.slice(0, 2);
        requestAnimationFrame(frame);
    }
    
    initCanvas();
    start();
    
    // 窗口大小改变时重新绘制
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
            if (window.innerWidth === size.width) return;
            size.width = window.innerWidth;
            size.height = window.innerHeight;
            initCanvas();
            start();
        }, 200);
    });
    
    // 主题切换时更新颜色
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.attributeName === 'data-color-mode') {
                start();
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true });
})();

// SafeGo 外链中转处理

(function() {
    const SAFEGO_CONFIG = {
        enableBase64: true,
        goPagePath: 'https://blog.2005815.xyz/go.html',
        domainWhitelist: ["moretti815.github.io", "github.com", "jsd.268682.xyz", "jsd.liiiu.cn", "www.kemiaosw.top", "blog.2005815.xyz"],
        ignoreAttrs: ["data-fancybox"],
        enableTargetBlank: true
    };
    
    function encodeSafeUrl(url) {
        if (!SAFEGO_CONFIG.enableBase64) {
            return encodeURIComponent(url);
        }
        
        // Base64 encode with URL safe characters
        const base64 = btoa(encodeURIComponent(url).replace(/%([0-9A-F]{2})/g,
            function(_, p1) { return String.fromCharCode('0x' + p1); }
        ));
        
        // Replace URL unsafe characters
        return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    
    function isExternalLink(href) {
        if (!href || href.startsWith('#') || href.startsWith('javascript:') || href.startsWith('mailto:') || href.startsWith('tel:')) {
            return false;
        }
        
        // Relative links
        if (href.startsWith('/') && !href.startsWith('//')) {
            return false;
        }
        
        try {
            const url = new URL(href, window.location.href);
            const currentHost = window.location.hostname;
            
            // Same domain
            if (url.hostname === currentHost) {
                return false;
            }
            
            // Check whitelist
            for (let i = 0; i < SAFEGO_CONFIG.domainWhitelist.length; i++) {
                if (url.hostname.includes(SAFEGO_CONFIG.domainWhitelist[i])) {
                    return false;
                }
            }
            
            return true;
        } catch (e) {
            return false;
        }
    }
    
    function hasIgnoreAttr(element) {
        for (let i = 0; i < SAFEGO_CONFIG.ignoreAttrs.length; i++) {
            if (element.hasAttribute(SAFEGO_CONFIG.ignoreAttrs[i])) {
                return true;
            }
        }
        return false;
    }
    
    function processLinks() {
        const links = document.querySelectorAll('a[href]');
        
        links.forEach(function(link) {
            // Skip already processed
            if (link.hasAttribute('data-safego-processed')) {
                return;
            }
            
            const href = link.getAttribute('href');
            
            // Skip if has ignore attribute
            if (hasIgnoreAttr(link)) {
                link.setAttribute('data-safego-processed', 'true');
                return;
            }
            
            // Check if external link
            if (isExternalLink(href)) {
                const encodedUrl = encodeSafeUrl(href);
                // 将来源页 URL 附加到 go 链接中，解决 noopener 导致 referrer 为空的问题
                const fromUrl = encodeURIComponent(window.location.href);
                const goUrl = SAFEGO_CONFIG.goPagePath + '?u=' + encodedUrl + '&from=' + fromUrl;
                
                link.setAttribute('href', goUrl);
                link.setAttribute('data-safego-processed', 'true');
                link.setAttribute('rel', 'external nofollow noopener noreferrer');
                
                if (SAFEGO_CONFIG.enableTargetBlank) {
                    link.setAttribute('target', '_blank');
                }
            }
        });
    }
    
    // Process on DOM ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', processLinks);
    } else {
        processLinks();
    }
    
    // Process dynamically added links
    const observer = new MutationObserver(function(mutations) {
        let shouldProcess = false;
        mutations.forEach(function(mutation) {
            if (mutation.type === 'childList') {
                mutation.addedNodes.forEach(function(node) {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        if (node.tagName === 'A' || node.querySelectorAll) {
                            shouldProcess = true;
                        }
                    }
                });
            }
        });
        
        if (shouldProcess) {
            processLinks();
        }
    });
    
    observer.observe(document.body, { childList: true, subtree: true });
})();

// Transform Memos
function transformMemos(memos) {
    return memos
        .filter(m => m.visibility === 'PUBLIC' && m.state === 'NORMAL')
        .map(m => ({
            id: m.name,
            content: m.content,
            date: m.createTime,
            tags: m.tags || [],
            images: (m.attachments || [])
                .filter(a => a.type && a.type.startsWith('image/'))
                .map(a => `https://m.314926.xyz/file/${a.name}/${a.filename}`),
            location: m.location?.placeholder,
            pinned: m.pinned,
            source: 'memos'
        }))
        .sort((a, b) => {
            if (a.pinned && !b.pinned) return -1;
            if (!a.pinned && b.pinned) return 1;
            return new Date(b.date).getTime() - new Date(a.date).getTime();
        });
}

// Transform TGTalk
function transformTGTalk(data) {
    return data.map(item => {
        // Parse HTML content
        const parser = new DOMParser();
        const doc = parser.parseFromString(item.text, 'text/html');
        
        // Extract tags from links like <a href="?q=%23%E6%97%A5%E5%B8%B8">#日常</a>
        const tags = [];
        doc.querySelectorAll('a[href^="?q=%23"]').forEach(link => {
            const tagText = link.textContent.trim();
            if (tagText.startsWith('#')) {
                tags.push(tagText.substring(1));
            }
        });
        
        // Process content: remove tag links but keep other content
        let content = item.text;
        // Remove tag links but keep the text
        content = content.replace(/<a href="\?q=%23[^"]+">([^<]+)<\/a>/g, '$1');
        // Convert <br/> to newlines for markdown
        content = content.replace(/<br\s*\/?>/gi, '\n');
        
        // Process images - filter out emoji images
        const images = [];
        if (item.image && Array.isArray(item.image)) {
            item.image.forEach(img => {
                // Skip telegram emoji images
                if (img && !img.includes('telegram.org/img/emoji')) {
                    // Ensure HTTPS
                    const imgUrl = img.startsWith('//') ? 'https:' + img : 
                                   img.startsWith('http') ? img : 'https://' + img;
                    images.push(imgUrl);
                }
            });
        }
        
        return {
            id: item.id,
            content: content,
            date: new Date(item.time).toISOString(),
            tags: tags,
            images: images,
            location: null,
            pinned: false,
            source: 'tgtalk',
            views: item.views
        };
    }).sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());
}

// Transform Jike RSS
function transformJike(items) {
    const result = [];
    items.forEach(item => {
        const title = item.querySelector('title')?.textContent || '';
        const description = item.querySelector('description')?.textContent || '';
        const pubDate = item.querySelector('pubDate')?.textContent || '';
        const link = item.querySelector('link')?.textContent || '';
        
        // Parse HTML description
        const parser = new DOMParser();
        const doc = parser.parseFromString(description, 'text/html');
        
        // Extract images
        const images = [];
        doc.querySelectorAll('img').forEach(img => {
            const src = img.getAttribute('src');
            if (src) images.push(src);
        });
        
        // Get text content
        let content = doc.body.textContent || description;
        content = content.replace(/<[^>]+>/g, '');
        
        result.push({
            id: link,
            content: content,
            date: new Date(pubDate).toISOString(),
            tags: [],
            images: images,
            location: null,
            pinned: false,
            source: 'jike'
        });
    });
    return result;
}

// Render Memos
function renderMemos() {
    const listContainer = document.getElementById('memos-list');
    
    let filteredMemos = memosData;
    if (currentFilter !== 'all') {
        filteredMemos = memosData.filter(m => m.tags && m.tags.includes(currentFilter));
    }
    
    if (filteredMemos.length === 0) {
        listContainer.innerHTML = `
            <div class="memos-empty">
                <iconify-icon icon="material-symbols:filter-list-off"></iconify-icon>
                <p>没有匹配该标签的动态</p>
            </div>
        `;
        return;
    }
    
    listContainer.innerHTML = filteredMemos.map(memo => renderMemoCard(memo)).join('');
    renderMarkdownContent();
}

// Render Single Memo Card
function renderMemoCard(memo) {
    const relativeTime = formatRelativeTime(memo.date);
    const imagesHtml = renderImages(memo.images, memo.id);
    const tagsHtml = renderTags(memo.tags);
    const locationHtml = memo.location ? `
        <span class="memo-location">
            <iconify-icon icon="material-symbols:location-on"></iconify-icon>
            ${escapeHtml(memo.location)}
        </span>
    ` : '';
    
    const sourceLabel = {
        'memos': 'Memos',
        'tgtalk': 'TGTalk',
        'jike': '即刻'
    }[memo.source] || memo.source;
    
    const sourceHtml = `
        <span class="memo-source">
            <iconify-icon icon="material-symbols:source"></iconify-icon>
            ${sourceLabel}
        </span>
    `;
    
    return `
        <div class="memo-card ${memo.pinned ? 'pinned' : ''}" data-tags="${memo.tags.join(',')}" data-source="${memo.source}">
            ${memo.pinned ? `
                <div class="memo-pin" title="置顶">
                    <iconify-icon icon="material-symbols:keep"></iconify-icon>
                </div>
            ` : ''}
            <div class="memo-content markdown-body" data-content="${escapeHtml(memo.content)}"></div>
            ${imagesHtml}
            ${tagsHtml}
            <div class="memo-meta">
                <span class="memo-time">
                    <iconify-icon icon="material-symbols:schedule"></iconify-icon>
                    <time datetime="${memo.date}" title="${new Date(memo.date).toLocaleString()}">${relativeTime}</time>
                </span>
                ${sourceHtml}
                ${locationHtml}
            </div>
        </div>
    `;
}

// Render Markdown Content
function renderMarkdownContent() {
    document.querySelectorAll('.memo-content[data-content]').forEach(el => {
        const content = el.getAttribute('data-content');
        if (content) {
            let html = marked.parse(content);
            html = html.replace(/<img([^>]+)>/g, '<img$1 onclick="openLightbox(this.src)" style="cursor: pointer;">');
            html = html.replace(/<a([^>]+)href=/g, '<a$1target="_blank" rel="noopener" href=');
            el.innerHTML = html;
            el.removeAttribute('data-content');
        }
    });
}

// Render Images
function renderImages(images, memoId) {
    if (!images || images.length === 0) return '';
    
    let layoutClass = 'grid';
    if (images.length === 1) layoutClass = 'single';
    else if (images.length === 2) layoutClass = 'double';
    else if (images.length === 3) layoutClass = 'triple';
    
    const imagesHtml = images.map((img, i) => `
        <img src="${escapeHtml(img)}" alt="Image ${i + 1}" loading="lazy" onclick="openLightbox('${escapeHtml(img)}')">
    `).join('');
    
    return `<div class="memo-images ${layoutClass}">${imagesHtml}</div>`;
}

// Render Tags
function renderTags(tags) {
    if (!tags || tags.length === 0) return '';
    
    const tagsHtml = tags.map(tag => `
        <span class="memo-tag" onclick="filterByTag('${escapeHtml(tag)}')">
            <iconify-icon icon="material-symbols:tag"></iconify-icon>
            ${escapeHtml(tag)}
        </span>
    `).join('');
    
    return `<div class="memo-tags">${tagsHtml}</div>`;
}

// Escape HTML
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Format Relative Time
function formatRelativeTime(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const diffInMinutes = Math.floor((now.getTime() - date.getTime()) / (1000 * 60));
    
    if (diffInMinutes < 1) return '刚刚';
    if (diffInMinutes < 60) return `${diffInMinutes} 分钟前`;
    
    const diffInHours = Math.floor(diffInMinutes / 60);
    if (diffInHours < 24) return `${diffInHours} 小时前`;
    
    const diffInDays = Math.floor(diffInHours / 24);
    if (diffInDays < 30) return `${diffInDays} 天前`;
    
    const diffInMonths = Math.floor(diffInDays / 30);
    if (diffInMonths < 12) return `${diffInMonths} 个月前`;
    
    const diffInYears = Math.floor(diffInDays / 365);
    return `${diffInYears} 年前`;
}

// Update Filter Tabs
function updateFilterTabs() {
    const filterContainer = document.getElementById('memos-filter');
    const tags = Array.from(allTags).sort();
    
    let filterHtml = `
        <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" data-filter="all" onclick="setFilter('all')">
            <iconify-icon icon="material-symbols:apps"></iconify-icon>
            <span>全部</span>
        </button>
    `;
    
    tags.forEach(tag => {
        const count = memosData.filter(m => m.tags && m.tags.includes(tag)).length;
        filterHtml += `
            <button class="filter-btn ${currentFilter === tag ? 'active' : ''}" data-filter="${escapeHtml(tag)}" onclick="setFilter('${escapeHtml(tag)}')">
                <iconify-icon icon="material-symbols:tag"></iconify-icon>
                <span>${escapeHtml(tag)} (${count})</span>
            </button>
        `;
    });
    
    filterContainer.innerHTML = filterHtml;
}

// Set Filter
function setFilter(filter) {
    currentFilter = filter;
    renderMemos();
    updateFilterTabs();
}

// Filter by Tag
function filterByTag(tag) {
    setFilter(tag);
    document.getElementById('memos-list').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Load More Memos
async function loadMoreMemos() {
    if (currentSource !== 'memos') return;
    
    const btn = document.querySelector('.load-more-btn');
    btn.disabled = true;
    btn.innerHTML = '<iconify-icon icon="material-symbols:sync" style="animation: spin 1s linear infinite;"></iconify-icon> 加载中...';
    
    await loadMemosData();
    
    btn.disabled = false;
    btn.innerHTML = '<iconify-icon icon="material-symbols:expand-more"></iconify-icon> 加载更多';
}

// Image Lightbox
function openLightbox(src) {
    const lightbox = document.getElementById('image-lightbox');
    const img = document.getElementById('lightbox-image');
    img.src = src;
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    const lightbox = document.getElementById('image-lightbox');
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
}

// Keyboard support
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
});

// Set header icons
document.getElementById("pathHome").setAttribute("d", IconList["home"]);
document.getElementById("themeSwitch").setAttribute("d", IconList["sun"]);

// Initialize - load data based on current source
document.addEventListener('DOMContentLoaded', () => {
    if (currentSource === 'memos') {
        loadMemosData();
    } else if (currentSource === 'tgtalk') {
        loadTGTalkData();
    } else if (currentSource === 'jike') {
        loadJikeData();
    } else {
        // Try to find matching loader function
        const loaderFunc = window[`load${currentSource.charAt(0).toUpperCase() + currentSource.slice(1)}Data`];
        if (loaderFunc) {
            loaderFunc();
        } else {
            loadMemosData();
        }
    }
});
</script>
