<style>
.postTitle{margin: auto 0;font-size:40px;font-weight:bold;}

/* 赞赏页面样式 */
.reward-header {
    margin-bottom: 24px;
    text-align: center;
}

.reward-header h1 {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 8px;
    color: var(--color-fg-default);
}

.reward-header p {
    color: var(--color-fg-muted);
    font-size: 14px;
}

/* 赞赏说明 */
.reward-intro {
    text-align: center;
    margin-bottom: 32px;
    padding: 20px;
    background-color: var(--color-canvas-subtle);
    border-radius: 12px;
    border: 1px solid var(--color-border-default);
}

.reward-intro p {
    margin: 0;
    line-height: 1.8;
    color: var(--color-fg-default);
    font-size: 15px;
}

/* 二维码区域 */
.reward-qrcode-section {
    margin-bottom: 40px;
}

.reward-qrcode-section h2 {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 20px;
    text-align: center;
    color: var(--color-fg-default);
}

.reward-qrcode-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 24px;
    max-width: 600px;
    margin: 0 auto;
}

.reward-qrcode-item {
    text-align: center;
    padding: 20px;
    background-color: var(--color-canvas-default);
    border: 1px solid var(--color-border-default);
    border-radius: 12px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.reward-qrcode-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
}

.reward-qrcode-item img {
    width: 100%;
    max-width: 200px;
    height: auto;
    border-radius: 8px;
    margin-bottom: 12px;
}

.reward-qrcode-item .qrcode-label {
    font-size: 16px;
    font-weight: 600;
    color: var(--color-fg-default);
}

.reward-qrcode-item .qrcode-hint {
    font-size: 13px;
    color: var(--color-fg-muted);
    margin-top: 4px;
}

/* 赞赏者列表 */
.reward-sponsors-section {
    margin-bottom: 40px;
}

.reward-sponsors-section h2 {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 20px;
    text-align: center;
    color: var(--color-fg-default);
}

.reward-sponsors-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    padding: 0;
    margin: 0;
    list-style: none;
}

.reward-sponsor-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background-color: var(--color-canvas-default);
    border: 1px solid var(--color-border-default);
    border-radius: 12px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    text-decoration: none;
    color: inherit;
}

.reward-sponsor-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
}

.reward-sponsor-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 2px solid var(--color-border-default);
}

.reward-sponsor-info {
    flex: 1;
    min-width: 0;
}

.reward-sponsor-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--color-fg-default);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.reward-sponsor-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--color-fg-muted);
}

.reward-sponsor-amount {
    font-weight: 600;
    color: var(--color-accent-emphasis);
}

/* 加载状态 */
.reward-loading {
    text-align: center;
    padding: 40px;
    color: var(--color-fg-muted);
}

.reward-error {
    text-align: center;
    padding: 40px;
    color: var(--color-danger-fg);
}

.reward-empty {
    text-align: center;
    padding: 40px;
    color: var(--color-fg-muted);
    font-style: italic;
}

/* 操作按钮 */
.reward-actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;

.reward-actions .btn {

    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;

    border: 1px solid var(--color-border-default);
    background-color: var(--color-canvas-default);
    color: var(--color-fg-default);
    cursor: pointer;
}

.reward-actions .btn:hover {
    background-color: var(--color-canvas-subtle);
    border-color: var(--color-border-muted);
    transform: translateY(-1px);
}

.reward-actions .btn-primary {
    background-color: var(--color-accent-emphasis);
    color: var(--color-fg-on-emphasis);
    border-color: var(--color-accent-emphasis);
}

.reward-actions .btn-primary:hover {
    background-color: var(--color-accent-muted);
    border-color: var(--color-accent-muted);
}

/* 响应式适配 */
@media (max-width: 768px) {
    .reward-header h1 {

    }

        grid-template-columns: 1fr;
        max-width: 300px;

@media (max-width: 600px) {

        font-size: 22px;
    }

    .reward-intro {
        padding: 16px;
    }

    .reward-sponsor-item {
        padding: 12px;
    }
}

function changeTheme(mode, icon, color, utheme){

}
function modeSwitch(){
    let currentMode=document.documentElement.getAttribute('data-color-mode');
    let newMode = currentMode === "light" ? "dark" : currentMode === "dark" ? "auto" : "light";
    localStorage.setItem("meek_theme", newMode);
    if(themeSettings[newMode]){
        changeTheme(...themeSettings[newMode]);
    }
}
function utterancesTheme(theme){

    const iframe=document.getElementsByClassName('utterances-frame')[0];
    iframe.contentWindow.postMessage(message,'https://utteranc.es');
}
if(themeSettings[theme]){changeTheme(...themeSettings[theme]);}

<script>
document.getElementById("pathHome").setAttribute("d", IconList["home"]);

// 赞赏者数据 URL
const SPONSORS_DATA_URL = 'https://cdn.jsdmirror.com/gh/Kemeow0815/sponsors@main/data/sponsors/sponsors.json';

// 加载赞赏者数据
async function loadSponsors() {
    const container = document.getElementById('reward-sponsors-container');

    try {
        const response = await fetch(SPONSORS_DATA_URL);
        if (!response.ok) {
            throw new Error('Failed to load sponsors data');
        }

        const data = await response.json();
        const sponsors = data.sponsors || [];

        if (sponsors.length === 0) {
            container.innerHTML = '<div class="reward-empty">暂无赞赏者，成为第一个支持我的人吧！</div>';
            return;
        }

        // 按日期倒序排列
        sponsors.sort((a, b) => new Date(b.date) - new Date(a.date));

        const listHtml = sponsors.map(sponsor => {
            const avatarUrl = sponsor.avatar || 'https://jsd.268682.xyz/gh/Kemeow0815/img@main/img/kemiao.gif';
            const sponsorUrl = sponsor.url || '#';
            const name = sponsor.name || '匿名';
            const date = sponsor.date || '';
            const amount = sponsor.amount || '';

            return `
                <a href="${sponsorUrl}" target="_blank" class="reward-sponsor-item">
                    <img src="${avatarUrl}" alt="${name}" class="reward-sponsor-avatar" onerror="this.src='https://jsd.268682.xyz/gh/Kemeow0815/img@main/img/kemiao.gif'">
                    <div class="reward-sponsor-info">
                        <div class="reward-sponsor-name">${name}</div>
                        <div class="reward-sponsor-meta">
                            <span class="reward-sponsor-amount">${amount}</span>
                            <span>${date}</span>
                        </div>
                    </div>
                </a>
            `;
        }).join('');

        container.innerHTML = `<div class="reward-sponsors-list">${listHtml}</div>`;

    } catch (error) {
        console.error('Load sponsors error:', error);
        container.innerHTML = '<div class="reward-error">加载友链失败</div>';
    }
}

// 页面加载完成后执行
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadSponsors);
} else {
    loadSponsors();
}
</script>
