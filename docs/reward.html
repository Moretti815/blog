        // 获取系统主题偏好
        function getSystemTheme() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        
        // 初始化主题：优先使用 localStorage，否则跟随系统
        let savedTheme = localStorage.getItem("meek_theme");
        let theme;
        if (savedTheme === null) {
            // 第一次访问，跟随系统
            theme = getSystemTheme();
            localStorage.setItem("meek_theme", theme);
        } else {
            theme = savedTheme;
        }
        document.documentElement.setAttribute("data-color-mode", theme);
    </script>

#footer {margin-top:64px; text-align: center;font-size: small;}

/* 加载动画样式 */
#preloader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: var(--color-canvas-default, #ffffff);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 1;
    visibility: visible;
    transition: opacity 0.5s ease, visibility 0.5s ease;
}

#preloader.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

#preloader img {
    width: 160px;
    height: 160px;
    object-fit: contain;
}

/* 暗色模式适配 */
[data-color-mode="dark"] #preloader {
    background-color: var(--color-canvas-default, #0d1117);
}

/* 移动端适配 */
@media (max-width: 768px) {
    #preloader img {
        width: 120px;
        height: 120px;
    }
}

/* 树枝背景样式 */
#branch-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
    overflow: hidden;
}

#branch-canvas {
    width: 100%;
    height: 100%;
}
</style>

<style>
.postTitle{margin: auto 0;font-size:40px;font-weight:bold;}

/* 赞赏页面主容器 */
.reward-container {

    border-bottom: 1px solid var(--color-border-default);
}

/* 页面头部 */
.reward-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
}

.reward-header-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background-color: var(--color-accent-emphasis);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-fg-on-emphasis);
}

.reward-header h1 {
    font-size: 24px;
    font-weight: bold;
    color: var(--color-fg-default);
    margin: 0;
}

/* 介绍区域 */
.reward-intro {
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--color-border-default);
}

.reward-intro p {
    margin: 0 0 8px 0;
    font-size: 16px;
    line-height: 1.7;
    color: var(--color-fg-default);
}

.reward-intro .reward-intro-sub {
    font-size: 14px;
    color: var(--color-fg-muted);
    margin: 0;
}

/* 支付方式区域 */
.reward-payment-section {
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--color-border-default);
}

.reward-section-title {
    font-size: 18px;
    font-weight: bold;
    color: var(--color-fg-default);
    margin-bottom: 16px;
}

.reward-payment-grid {
    display: flex;
    justify-content: center;
    gap: 48px;
    flex-wrap: wrap;
}

.reward-payment-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.reward-payment-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
}

.reward-payment-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--color-border-default);
}

.reward-payment-icon.alipay {
    background-color: #1677FF;
    color: white;
}

.reward-payment-icon.wechat {
    background-color: #07C160;
    color: white;
}



.reward-payment-info h3 {
    font-size: 16px;
    font-weight: 600;
    color: var(--color-fg-default);
    margin: 0 0 2px 0;
}

.reward-payment-info p {
    font-size: 13px;
    color: var(--color-fg-muted);
    margin: 0;
}

.reward-qrcode-wrapper {
    margin-left: 0;
}

.reward-qrcode {
    width: 160px;
    height: 160px;
    border-radius: 8px;
    border: 1px solid var(--color-border-default);
    overflow: hidden;
    background-color: var(--color-canvas-default);
}

.reward-qrcode img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.reward-qrcode a {
    display: block;
    width: 100%;
    height: 100%;
    text-decoration: none;
}

/* 其他支持方式 */
.reward-other-section {
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--color-border-default);
}

.reward-other-list {
    display: flex;
    flex-direction: column;
}

.reward-other-item {
    display: flex;
    flex-direction: column;
    padding: 12px 0;
    border-bottom: 1px solid var(--color-border-muted);
    transition: background-color 0.2s ease;
}

.reward-other-item:last-child {
    border-bottom: none;
}

.reward-other-item:hover {
    background-color: var(--color-canvas-subtle);
    margin: 0 -12px;
    padding-left: 12px;
    padding-right: 12px;
    border-radius: 6px;
}

.reward-other-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
}

.reward-other-icon {
    color: var(--color-accent-emphasis);
}

.reward-other-header span {
    font-weight: 600;
    color: var(--color-fg-default);
    font-size: 14px;
}

.reward-other-item p {
    margin: 0;
    font-size: 13px;
    color: var(--color-fg-muted);
    padding-left: 28px;
}

/* 赞赏者区域 */
.reward-sponsors-section {
    margin-bottom: 24px;
}

.reward-sponsors-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;

.reward-sponsors-header svg {

.reward-sponsors-header h2 {

    margin-bottom: 16px;
    line-height: 1.6;
}

.reward-submit-info a {
    color: var(--color-accent-emphasis);
    text-decoration: none;
    font-weight: 500;
}

.reward-submit-info a:hover {
    text-decoration: underline;
}

/* 赞赏者列表 */
.reward-sponsors-list {
    display: flex;
    flex-direction: column;
}

.reward-sponsor-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;

.reward-sponsor-item:last-child {

.reward-sponsor-avatar-placeholder {

.reward-sponsor-info {

    min-width: 0;

    margin-bottom: 2px;

    overflow: hidden;

.reward-sponsor-date {
    font-size: 12px;
    color: var(--color-fg-muted);
}

.reward-sponsor-amount {
    font-size: 13px;
    font-weight: 600;
    color: var(--color-accent-emphasis);
    flex-shrink: 0;
}

/* 加载状态 */
.reward-loading {
    text-align: center;
    padding: 32px;
    color: var(--color-fg-muted);
    font-size: 14px;
}

.reward-error {
    text-align: center;
    padding: 32px;
    color: var(--color-danger-fg);
    font-size: 14px;
}

.reward-empty {
    text-align: center;
    padding: 32px;
    color: var(--color-fg-muted);
    font-size: 14px;
    font-style: italic;
}

/* 操作按钮 */
.reward-actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 24px;

}

.reward-actions .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s ease;
    border: 1px solid var(--color-border-default);
    background-color: var(--color-canvas-default);
    color: var(--color-fg-default);
    cursor: pointer;
}

.reward-actions .btn:hover {
    background-color: var(--color-canvas-subtle);
    border-color: var(--color-border-muted);
    transform: translateY(-1px);
}

.reward-actions .btn-primary {
    background-color: var(--color-accent-emphasis);
    color: var(--color-fg-on-emphasis);
    border-color: var(--color-accent-emphasis);
}

.reward-actions .btn-primary:hover {
    background-color: var(--color-accent-muted);
    border-color: var(--color-accent-muted);
}

/* 响应式适配 */
@media (max-width: 768px) {
    .reward-container {
        padding: 16px;
    }

    .reward-header h1 {
        font-size: 20px;
    }

    .reward-payment-grid {
        grid-template-columns: 1fr;
    }

    .reward-qrcode-wrapper {
        margin-left: 0;
        margin-top: 12px;
    }

    .reward-qrcode {
        width: 140px;
        height: 140px;
    }
}

@media (max-width: 600px) {
    body {
        padding: 8px;
        min-width: auto;
        max-width: 100%;
    }

    .postTitle {
        font-size: 24px;
    }

    .reward-container {
        padding: 12px;
    }

    .reward-header {
        margin-bottom: 20px;
    }

    .reward-intro p {
        font-size: 15px;
    }

    .reward-payment-header {
        margin-bottom: 8px;
    }

    .reward-sponsor-item {
        padding: 10px 0;
    }

    .reward-sponsor-avatar,
    .reward-sponsor-avatar-placeholder {
        width: 36px;
        height: 36px;
    }
}
</style>

function getSystemTheme() {
    return systemThemeMediaQuery.matches ? 'dark' : 'light';
}

function startSystemThemeListener() {
    // 移除旧的监听器
    if (systemThemeListener) {
        systemThemeMediaQuery.removeEventListener('change', systemThemeListener);
    }
    // 添加新的监听器
    systemThemeListener = (e) => {
        let newSystemTheme = e.matches ? 'dark' : 'light';
        document.documentElement.setAttribute("data-color-mode", newSystemTheme);
        // 更新图标
        if (themeSettings[newSystemTheme]) {
            let icon = themeSettings[newSystemTheme][1];

            document.getElementById("themeSwitch").setAttribute("d", IconList[icon]);
            document.getElementById("themeSwitch").parentNode.style.color = color;
        }
    };
    systemThemeMediaQuery.addEventListener('change', systemThemeListener);
}

function stopSystemThemeListener() {
    if (systemThemeListener) {
        systemThemeMediaQuery.removeEventListener('change', systemThemeListener);
        systemThemeListener = null;
    }
}

function applyTheme(mode) {
    // 应用主题设置，更新图标和颜色
    if (themeSettings[mode]) {
        let icon = themeSettings[mode][1];
        let color = themeSettings[mode][2];
        document.getElementById("themeSwitch").setAttribute("d", IconList[icon]);
        document.getElementById("themeSwitch").parentNode.style.color = color;

function modeSwitch(){

        newMode = "auto";

    // 更新当前模式
    currentThemeMode = newMode;
    localStorage.setItem("meek_theme", newMode);
    
    if (newMode === "auto") {
        // 切换到 auto 模式，立即应用当前系统主题
        stopSystemThemeListener();

        document.documentElement.setAttribute("data-color-mode", systemTheme);
        applyTheme("auto");
        startSystemThemeListener();
    } else if (themeSettings[newMode]) {
        stopSystemThemeListener();

    }
}

// 树枝背景动画 - 参考 BackgrounRandom.astro
(function() {
    const canvas = document.getElementById('branch-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    
    const r180 = Math.PI;
    const r90 = Math.PI / 2;
    const r15 = Math.PI / 12;
    const MIN_BRANCH = 30;
    const len = 6;
    
    let steps = [];
    let prevSteps = [];
    let size = { width: window.innerWidth, height: window.innerHeight };
    
    function randomMiddle() {
        return Math.random() * 0.6 + 0.2;
    }
    
    function initCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = size.width + 'px';
        canvas.style.height = size.height + 'px';
        canvas.width = dpr * size.width;
        canvas.height = dpr * size.height;
        ctx.scale(dpr, dpr);
    }
    
    function polar2cart(x, y, r, theta) {
        const dx = r * Math.cos(theta);
        const dy = r * Math.sin(theta);
        return [x + dx, y + dy];
    }
    
    function step(x, y, rad, counter) {
        counter = counter || { value: 0 };
        const length = Math.random() * len;
        counter.value += 1;
        
        const [nx, ny] = polar2cart(x, y, length, rad);
        
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(nx, ny);
        ctx.stroke();
        
        const rad1 = rad + Math.random() * r15;
        const rad2 = rad - Math.random() * r15;
        
        if (nx < -100 || nx > size.width + 100 || ny < -100 || ny > size.height + 100) return;
        
        const rate = counter.value <= MIN_BRANCH ? 0.8 : 0.5;
        
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad1, counter); });
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad2, counter); });
    }
    
    function frame() {
        prevSteps = steps;
        steps = [];
        
        if (!prevSteps.length) return;
        
        prevSteps.forEach(function(i) {
            if (Math.random() < 0.5) steps.push(i);
            else i();
        });
        
        requestAnimationFrame(frame);
    }
    
    function getBranchColor() {
        const isDark = document.documentElement.getAttribute('data-color-mode') === 'dark';
        // 使用 CSS 变量获取主题色，适配明暗模式
        const style = getComputedStyle(document.documentElement);
        const accent = style.getPropertyValue('--color-accent-fg').trim() || (isDark ? '#58a6ff' : '#0969da');
        // 解析 HSL 并降低透明度
        if (accent.startsWith('#')) {
            const r = parseInt(accent.slice(1, 3), 16);
            const g = parseInt(accent.slice(3, 5), 16);
            const b = parseInt(accent.slice(5, 7), 16);
            return 'rgba(' + r + ', ' + g + ', ' + b + ', 0.12)';
        }
        return isDark ? 'rgba(88, 166, 255, 0.12)' : 'rgba(9, 105, 218, 0.12)';
    }
    
    function start() {
        const color = getBranchColor();
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 1;
        ctx.strokeStyle = color;
        prevSteps = [];
        steps = [
            function() { step(randomMiddle() * size.width, -5, r90); },
            function() { step(randomMiddle() * size.width, size.height + 5, -r90); },
            function() { step(-5, randomMiddle() * size.height, 0); },
            function() { step(size.width + 5, randomMiddle() * size.height, r180); }
        ];
        if (size.width < 500) steps = steps.slice(0, 2);
        requestAnimationFrame(frame);
    }
    
    initCanvas();
    start();
    
    // 窗口大小改变时重新绘制
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
            if (window.innerWidth === size.width) return;
            size.width = window.innerWidth;
            size.height = window.innerHeight;
            initCanvas();
            start();
        }, 200);
    });
    
    // 主题切换时更新颜色
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.attributeName === 'data-color-mode') {
                start();
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true });
})();

// SafeGo 外链中转处理

(function() {
    const SAFEGO_CONFIG = {
        enableBase64: true,
        goPagePath: 'https://moretti815.github.io/blog/go.html',
        domainWhitelist: ["moretti815.github.io", "github.com", "jsd.268682.xyz", "cdn.jsdmirror.com", "www.kemiaosw.top"],
        ignoreAttrs: ["data-fancybox"],
        enableTargetBlank: false
    };
    
    function encodeSafeUrl(url) {
        if (!SAFEGO_CONFIG.enableBase64) {
            return encodeURIComponent(url);
        }
        
        // Base64 encode with URL safe characters
        const base64 = btoa(encodeURIComponent(url).replace(/%([0-9A-F]{2})/g,
            function(_, p1) { return String.fromCharCode('0x' + p1); }
        ));
        
        // Replace URL unsafe characters
        return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    
    function isExternalLink(href) {
        if (!href || href.startsWith('#') || href.startsWith('javascript:') || href.startsWith('mailto:') || href.startsWith('tel:')) {
            return false;
        }
        
        // Relative links
        if (href.startsWith('/') && !href.startsWith('//')) {
            return false;
        }
        
        try {
            const url = new URL(href, window.location.href);
            const currentHost = window.location.hostname;
            
            // Same domain
            if (url.hostname === currentHost) {
                return false;
            }
            
            // Check whitelist
            for (let i = 0; i < SAFEGO_CONFIG.domainWhitelist.length; i++) {
                if (url.hostname.includes(SAFEGO_CONFIG.domainWhitelist[i])) {
                    return false;
                }
            }
            
            return true;
        } catch (e) {
            return false;
        }
    }
    
    function hasIgnoreAttr(element) {
        for (let i = 0; i < SAFEGO_CONFIG.ignoreAttrs.length; i++) {
            if (element.hasAttribute(SAFEGO_CONFIG.ignoreAttrs[i])) {
                return true;
            }
        }
        return false;
    }
    
    function processLinks() {
        const links = document.querySelectorAll('a[href]');
        
        links.forEach(function(link) {
            // Skip already processed
            if (link.hasAttribute('data-safego-processed')) {
                return;
            }
            
            const href = link.getAttribute('href');
            
            // Skip if has ignore attribute
            if (hasIgnoreAttr(link)) {
                link.setAttribute('data-safego-processed', 'true');
                return;
            }
            
            // Check if external link
            if (isExternalLink(href)) {
                const encodedUrl = encodeSafeUrl(href);
                // 将来源页 URL 附加到 go 链接中，解决 noopener 导致 referrer 为空的问题
                const fromUrl = encodeURIComponent(window.location.href);
                const goUrl = SAFEGO_CONFIG.goPagePath + '?u=' + encodedUrl + '&from=' + fromUrl;
                
                link.setAttribute('href', goUrl);
                link.setAttribute('data-safego-processed', 'true');
                link.setAttribute('rel', 'external nofollow noopener noreferrer');
                
                if (SAFEGO_CONFIG.enableTargetBlank) {
                    link.setAttribute('target', '_blank');
                }
            }
        });
    }
    
    // Process on DOM ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', processLinks);
    } else {
        processLinks();
    }
    
    // Process dynamically added links
    const observer = new MutationObserver(function(mutations) {
        let shouldProcess = false;
        mutations.forEach(function(mutation) {
            if (mutation.type === 'childList') {
                mutation.addedNodes.forEach(function(node) {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        if (node.tagName === 'A' || node.querySelectorAll) {
                            shouldProcess = true;
                        }
                    }
                });
            }
        });
        
        if (shouldProcess) {
            processLinks();
        }
    });
    
    observer.observe(document.body, { childList: true, subtree: true });
})();

async function loadSponsors() {

            throw new Error('Failed to load sponsors data');

        if (sponsors.length === 0) {
            container.innerHTML = '<div class="reward-empty">暂无赞赏者，成为第一个支持我的人吧！</div>';
            return;

        const listHtml = sponsors.map(sponsor => {
