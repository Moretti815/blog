        // 获取系统主题偏好
        function getSystemTheme() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        
        // 初始化主题：优先使用 localStorage，否则跟随系统
        let savedTheme = localStorage.getItem("meek_theme");
        let theme;
        if (savedTheme === null) {
            // 第一次访问，跟随系统
            theme = getSystemTheme();
            localStorage.setItem("meek_theme", theme);
        } else {
            theme = savedTheme;
        }
        document.documentElement.setAttribute("data-color-mode", theme);

<style>

<body><!-- 访客欢迎通知组件 -->
<script>
(function() {
    const VISIT_KEY = 'blog_welcome_shown';
    const VISIT_EXPIRY_KEY = 'blog_welcome_expiry';
    // 24小时的毫秒数
    const EXPIRY_TIME = 24 * 60 * 60 * 1000;
    let hasShownToast = false;
    
    function createWelcomeToast() {
        const toast = document.createElement('div');
        toast.id = 'welcome-toast';
        toast.className = 'welcome-toast';
        toast.innerHTML = `
            <div class="welcome-toast-inner">
                <div class="welcome-toast-content">
                    <div class="welcome-toast-icon">👋</div>
                    <div class="welcome-toast-body">
                        <p id="welcome-message" class="welcome-toast-title">正在加载...</p>
                        <p id="welcome-stats" class="welcome-toast-stats"></p>
                        <p class="welcome-toast-quote">在茫茫互联网的大海中 感谢遇见你🙏</p>
                        <div class="welcome-toast-links">
                            <a href="https://t.me/kemiaochat" target="_blank" rel="noopener noreferrer" class="welcome-toast-link welcome-toast-link-blue">
                                👆加群
                            </a>
                            <span class="welcome-toast-divider">|</span>
                            <a href="https://github.com/moretti815/blog/issues/2" class="welcome-toast-link welcome-toast-link-green">
                                📬订阅更新
                            </a>
                            <span class="welcome-toast-divider">|</span>
                            <a href="javascript:void(0)" onclick="copyRssLink()" class="welcome-toast-link welcome-toast-link-orange">
                                📋RSS
                            </a>
                        </div>
                        <p id="rss-copy-msg" class="welcome-toast-copy-msg hidden">已复制到剪贴板~</p>
                    </div>
                    <button onclick="closeWelcomeToast()" class="welcome-toast-close" aria-label="关闭">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(toast);
        return toast;
    }
    
    window.closeWelcomeToast = function() {
        const toast = document.getElementById('welcome-toast');
        if (toast) {
            toast.classList.remove('show');
            setTimeout(() => {
                toast.remove();
            }, 500);
        }
    };
    
    window.copyRssLink = async function() {
        const msg = document.getElementById('rss-copy-msg');
        const rssUrl = window.location.origin + '/rss.xml';
        try {
            await navigator.clipboard.writeText(rssUrl);
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 2000);
        } catch (e) {
            const input = document.createElement('input');
            input.value = rssUrl;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 2000);
        }
    };
    
    async function fetchLocation() {
        try {
            const response = await fetch('https://v2.xxapi.cn/api/ip');
            const data = await response.json();
            
            if (data.code === 200 && data.data) {
                const location = data.data;
                const locationText = `HI 来自${location.address}的朋友`;
                
                const messageEl = document.getElementById('welcome-message');
                if (messageEl) {
                    messageEl.textContent = locationText;
                }
            }
        } catch (error) {
            console.error('Failed to fetch location:', error);
            const messageEl = document.getElementById('welcome-message');
            if (messageEl) {
                messageEl.textContent = 'HI 来自远方的朋友';
            }
        }
    }
    
    async function fetchStats() {
        // 等待 Vercount 脚本加载完成
        let attempts = 0;
        const maxAttempts = 30; // 最多等待3秒
        
        while (attempts < maxAttempts) {
            const sitePvEl = document.getElementById('busuanzi_value_site_pv');
            if (sitePvEl && sitePvEl.textContent) {
                const pageviews = sitePvEl.textContent.trim();
                const statsText = `欢迎 我是 Moretti 你是本站迎来的第${pageviews}次访问`;
                
                const statsEl = document.getElementById('welcome-stats');
                if (statsEl) {
                    statsEl.textContent = statsText;
                }
                return;
            }
            await new Promise(resolve => setTimeout(resolve, 100));
            attempts++;
        }
        
        // 超时后显示默认文本
        const statsEl = document.getElementById('welcome-stats');
        if (statsEl) {
            statsEl.textContent = '欢迎 我是 Moretti';
        }
    }
    
    async function showWelcomeToast() {
        if (hasShownToast) return;
        
        const toast = createWelcomeToast();
        
        // 强制重绘以确保过渡动画生效
        toast.offsetHeight;
        
        setTimeout(() => {
            toast.classList.add('show');
        }, 100);
        
        hasShownToast = true;
        
        await Promise.all([fetchLocation(), fetchStats()]);
        
        // 5秒后自动关闭
        setTimeout(() => {
            closeWelcomeToast();
        }, 5000);
    }
    
    function shouldShowWelcome() {
        const now = Date.now();
        const expiry = localStorage.getItem(VISIT_EXPIRY_KEY);
        
        // 如果存在过期时间且未过期，则不显示
        if (expiry && now < parseInt(expiry)) {
            return false;
        }
        
        // 如果已过期或不存在，清除旧数据
        localStorage.removeItem(VISIT_KEY);
        localStorage.removeItem(VISIT_EXPIRY_KEY);
        return true;
    }
    
    function markAsVisited() {
        const now = Date.now();
        localStorage.setItem(VISIT_KEY, 'true');
        localStorage.setItem(VISIT_EXPIRY_KEY, (now + EXPIRY_TIME).toString());
    }
    
    // 等待页面加载完成后再显示
    function init() {
        if (shouldShowWelcome()) {
            markAsVisited();
            // 延迟显示，等待页面其他元素加载
            setTimeout(() => {
                showWelcomeToast();
            }, 1000);
        }
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>

<script>
(function() {
    // 回到顶部功能
    function backToTop() {
        window.scroll({ top: 0, behavior: 'smooth' });
    }

    // 滚动监听，控制按钮显示/隐藏
    function handleScroll() {
        const wrapper = document.getElementById('back-to-top-wrapper');
        if (!wrapper) return;

        // 当滚动超过 300px 时显示按钮
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        if (scrollTop > 300) {
            wrapper.classList.add('visible');
        } else {
            wrapper.classList.remove('visible');
        }
    }

    // 节流函数，优化性能
    function throttle(func, limit) {
        let inThrottle;
        return function() {
            const args = arguments;
            const context = this;
            if (!inThrottle) {
                func.apply(context, args);
                inThrottle = true;
                setTimeout(function() {
                    inThrottle = false;
                }, limit);
            }
        };
    }

    // 绑定滚动事件（节流处理，每 100ms 执行一次）
    window.addEventListener('scroll', throttle(handleScroll, 100));

    // 初始化一次
    handleScroll();

    // 暴露到全局
    window.backToTop = backToTop;
})();

(function() {
    const canvas = document.getElementById('branch-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    
    const r180 = Math.PI;
    const r90 = Math.PI / 2;
    const r15 = Math.PI / 12;
    const MIN_BRANCH = 30;
    const len = 6;
    
    let steps = [];
    let prevSteps = [];
    let size = { width: window.innerWidth, height: window.innerHeight };
    
    function randomMiddle() {
        return Math.random() * 0.6 + 0.2;
    }
    
    function initCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = size.width + 'px';
        canvas.style.height = size.height + 'px';
        canvas.width = dpr * size.width;
        canvas.height = dpr * size.height;
        ctx.scale(dpr, dpr);
    }
    
    function polar2cart(x, y, r, theta) {
        const dx = r * Math.cos(theta);
        const dy = r * Math.sin(theta);
        return [x + dx, y + dy];
    }
    
    function step(x, y, rad, counter) {
        counter = counter || { value: 0 };
        const length = Math.random() * len;
        counter.value += 1;
        
        const [nx, ny] = polar2cart(x, y, length, rad);
        
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(nx, ny);
        ctx.stroke();
        
        const rad1 = rad + Math.random() * r15;
        const rad2 = rad - Math.random() * r15;
        
        if (nx < -100 || nx > size.width + 100 || ny < -100 || ny > size.height + 100) return;
        
        const rate = counter.value <= MIN_BRANCH ? 0.8 : 0.5;
        
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad1, counter); });
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad2, counter); });
    }
    
    function frame() {
        prevSteps = steps;
        steps = [];
        
        if (!prevSteps.length) return;
        
        prevSteps.forEach(function(i) {
            if (Math.random() < 0.5) steps.push(i);
            else i();
        });
        
        requestAnimationFrame(frame);
    }
    
    function getBranchColor() {
        const isDark = document.documentElement.getAttribute('data-color-mode') === 'dark';

            const b = parseInt(accent.slice(5, 7), 16);
            return 'rgba(' + r + ', ' + g + ', ' + b + ', 0.12)';
        }
        return isDark ? 'rgba(88, 166, 255, 0.12)' : 'rgba(9, 105, 218, 0.12)';

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 1;
        ctx.strokeStyle = color;

            function() { step(randomMiddle() * size.width, -5, r90); },
            function() { step(randomMiddle() * size.width, size.height + 5, -r90); },
            function() { step(-5, randomMiddle() * size.height, 0); },
            function() { step(size.width + 5, randomMiddle() * size.height, r180); }
        ];

        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
            if (window.innerWidth === size.width) return;
            size.width = window.innerWidth;
            size.height = window.innerHeight;
            initCanvas();
            start();
        }, 200);
    });
    
    // 主题切换时更新颜色
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.attributeName === 'data-color-mode') {
                start();
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true });
})();

// SafeGo 外链中转处理

(function() {
    const SAFEGO_CONFIG = {
        enableBase64: true,
        goPagePath: 'https://blog.2005815.xyz/go.html',
        domainWhitelist: ["moretti815.github.io", "github.com", "jsd.268682.xyz", "cdn.jsdmirror.com", "www.kemiaosw.top", "blog.2005815.xyz"],
        ignoreAttrs: ["data-fancybox"],
        enableTargetBlank: true
    };
    
    function encodeSafeUrl(url) {
        if (!SAFEGO_CONFIG.enableBase64) {
            return encodeURIComponent(url);
        }
        
        // Base64 encode with URL safe characters
        const base64 = btoa(encodeURIComponent(url).replace(/%([0-9A-F]{2})/g,
            function(_, p1) { return String.fromCharCode('0x' + p1); }
        ));
        
        // Replace URL unsafe characters
        return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    
    function isExternalLink(href) {
        if (!href || href.startsWith('#') || href.startsWith('javascript:') || href.startsWith('mailto:') || href.startsWith('tel:')) {
            return false;
        }
        
        // Relative links
        if (href.startsWith('/') && !href.startsWith('//')) {
            return false;
        }
        
        try {
            const url = new URL(href, window.location.href);
            const currentHost = window.location.hostname;
            
            // Same domain
            if (url.hostname === currentHost) {
                return false;
            }
            
            // Check whitelist
            for (let i = 0; i < SAFEGO_CONFIG.domainWhitelist.length; i++) {
                if (url.hostname.includes(SAFEGO_CONFIG.domainWhitelist[i])) {
                    return false;
                }
            }
            
            return true;
        } catch (e) {
            return false;
        }
    }
    
    function hasIgnoreAttr(element) {
        for (let i = 0; i < SAFEGO_CONFIG.ignoreAttrs.length; i++) {
            if (element.hasAttribute(SAFEGO_CONFIG.ignoreAttrs[i])) {
                return true;
            }
        }
        return false;
    }
    
    function processLinks() {
        const links = document.querySelectorAll('a[href]');
        
        links.forEach(function(link) {
            // Skip already processed
            if (link.hasAttribute('data-safego-processed')) {
                return;
            }
            
            const href = link.getAttribute('href');
            
            // Skip if has ignore attribute
            if (hasIgnoreAttr(link)) {
                link.setAttribute('data-safego-processed', 'true');
                return;
            }
            
            // Check if external link
            if (isExternalLink(href)) {
                const encodedUrl = encodeSafeUrl(href);
                // 将来源页 URL 附加到 go 链接中，解决 noopener 导致 referrer 为空的问题
                const fromUrl = encodeURIComponent(window.location.href);
                const goUrl = SAFEGO_CONFIG.goPagePath + '?u=' + encodedUrl + '&from=' + fromUrl;
                
                link.setAttribute('href', goUrl);
                link.setAttribute('data-safego-processed', 'true');
                link.setAttribute('rel', 'external nofollow noopener noreferrer');
                
                if (SAFEGO_CONFIG.enableTargetBlank) {
                    link.setAttribute('target', '_blank');
                }
            }
        });
    }
    
    // Process on DOM ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', processLinks);
    } else {
        processLinks();
    }
    
    // Process dynamically added links
    const observer = new MutationObserver(function(mutations) {
        let shouldProcess = false;
        mutations.forEach(function(mutation) {
            if (mutation.type === 'childList') {
                mutation.addedNodes.forEach(function(node) {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        if (node.tagName === 'A' || node.querySelectorAll) {
                            shouldProcess = true;
                        }
                    }
                });
            }
        });
        
        if (shouldProcess) {
            processLinks();
        }
    });
    
    observer.observe(document.body, { childList: true, subtree: true });
})();

</script>

<script>
document.getElementById("pathHome").setAttribute("d", IconList["home"]);

// 友链数据 URL
const FRIENDS_DATA_URL = 'https://jsd.268682.xyz/gh/Kemeow0815/friends@output/v2/data.json';
const LATENCY_DATA_URL = 'https://clink.268682.xyz/result.json';

// 缓存配置
const CACHE_KEY = 'friendsDataCache';
const CACHE_EXPIRATION = 30 * 60 * 1000; // 30分钟

// 获取缓存数据
function getCachedData() {
    try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
            const { data, timestamp } = JSON.parse(cached);
            if (Date.now() - timestamp < CACHE_EXPIRATION) {
                return data;
            }
        }
    } catch (e) {
        console.error('Cache read error:', e);
    }
    return null;
}

// 设置缓存数据
function setCachedData(data) {
    try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({
            data: data,
            timestamp: Date.now()
        }));
    } catch (e) {
        console.error('Cache write error:', e);
    }
}

// 格式化日期
function formatDate(dateStr) {
    if (!dateStr) return '';
    const date = new Date(dateStr);
    if (isNaN(date.getTime())) return dateStr;
    return `${date.getMonth() + 1}/${date.getDate()}`;
}

// 创建友链卡片 HTML
function createFriendCard(friend, latencyStatus) {
    const url = friend.url || '#';
    const icon = friend.icon || '';
    const snapshot = friend.snapshot || '';
    const title = friend.title || 'Unknown';
    const description = friend.description || '';
    const posts = friend.posts || [];
    const labels = friend.labels || [];

    let statusClass = 'status-tag-red';
    let statusText = 'ERR';

    if (latencyStatus) {
        if (latencyStatus.latency === -1) {
            statusText = 'ERR';
        } else {
            const latency = latencyStatus.latency;
            statusText = latency < 1 ? Math.round(latency * 1000) + ' MS' : latency.toFixed(1) + ' S';
            if (latency <= 2) {
                statusClass = 'status-tag-green';
            } else if (latency <= 5) {
                statusClass = 'status-tag-light-yellow';
            } else if (latency <= 10) {
                statusClass = 'status-tag-dark-yellow';
            }
        }
    }

    // 生成标签 HTML
    const labelsHtml = labels.map(label => {
        const color = label.color || '666666';
        return `<span class="flink-label" style="background-color: #${color};">${label.name}</span>`;
    }).join('');

    // 生成文章列表 HTML
    const postsHtml = posts.slice(0, 3).map(post => {
        const postDate = formatDate(post.published);
        return `<a href="${post.link}" target="_blank" class="flink-post-item" title="${post.title}">${post.title}<span class="flink-post-date">${postDate}</span></a>`;
    }).join('');

    return `
        <a href="${url}" target="_blank" class="flink-list-item" data-url="${url.replace(/\/$/, '')}">
            <div class="status-tag ${statusClass}">${statusText}</div>
            ${labelsHtml ? `<div class="flink-labels">${labelsHtml}</div>` : ''}
            <img class="flink-snapshot" src="${snapshot}" alt="${title}" loading="lazy" onerror="this.src='${icon}'">
            <div class="flink-content">
                <img class="flink-avatar" src="${icon}" alt="${title}" loading="lazy">
                <div class="flink-info">
                    <div class="flink-name">${title}</div>
                    <div class="flink-desc">${description}</div>
                </div>
            </div>
            ${postsHtml ? `<div class="flink-posts">${postsHtml}</div>` : ''}
        </a>
    `;
}

// 渲染友链列表
function renderFriends(friendsData, latencyData) {
    const container = document.getElementById('friends-container');
    if (!friendsData || !friendsData.content || friendsData.content.length === 0) {
        container.innerHTML = '<div class="flink-error">暂无友链</div>';
        return;
    }

    const latencyMap = {};
    if (latencyData && latencyData.link_status) {
        latencyData.link_status.forEach(item => {
            const key = item.link.replace(/\/$/, '');
            latencyMap[key] = item;
        });
    }

    const friendsHtml = friendsData.content.map(friend => {
        const urlKey = (friend.url || '').replace(/\/$/, '');
        const latencyStatus = latencyMap[urlKey];
        return createFriendCard(friend, latencyStatus);
    }).join('');

    container.innerHTML = `<div class="flink-list">${friendsHtml}</div>`;
}

// 加载延迟数据并应用
function loadLatencyData() {
    fetch(LATENCY_DATA_URL)
        .then(response => response.json())
        .then(data => {
            document.querySelectorAll('.flink-list-item').forEach(card => {
                const link = card.getAttribute('data-url');
                if (!link) return;

                const status = data.link_status?.find(item =>
                    item.link.replace(/\/$/, '') === link
                );

                if (status) {
                    const statusTag = card.querySelector('.status-tag');
                    if (!statusTag) return;

                    let statusText = 'ERR';
                    let statusClass = 'status-tag-red';

                    if (status.latency === -1) {
                        statusText = 'ERR';
                    } else {
                        const latency = status.latency;
                        statusText = latency < 1 ? Math.round(latency * 1000) + ' MS' : latency.toFixed(1) + ' S';
                        if (latency <= 2) {
                            statusClass = 'status-tag-green';
                        } else if (latency <= 5) {
                            statusClass = 'status-tag-light-yellow';
                        } else if (latency <= 10) {
                            statusClass = 'status-tag-dark-yellow';
                        }
                    }

                    statusTag.textContent = statusText;
                    statusTag.className = `status-tag ${statusClass}`;
                }
            });

            // 缓存延迟数据
            try {
                localStorage.setItem('latencyDataCache', JSON.stringify({
                    data: data,
                    timestamp: Date.now()
                }));
            } catch (e) {
                console.error('Latency cache error:', e);
            }
        })
        .catch(error => {
            console.error('Latency data fetch error:', error);
        });
}

// 加载友链数据
function loadFriendsData() {
    const cachedData = getCachedData();

    if (cachedData) {
        renderFriends(cachedData, null);
        // 后台更新延迟数据
        loadLatencyData();
    }

    // 获取最新数据
    fetch(FRIENDS_DATA_URL)
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            setCachedData(data);
            renderFriends(data, null);
            loadLatencyData();
        })
        .catch(error => {
            console.error('Friends data fetch error:', error);
            if (!cachedData) {
                document.getElementById('friends-container').innerHTML =
                    '<div class="flink-error">加载友链失败</div>';
            }
        });
}

// 页面加载完成后执行
document.addEventListener('DOMContentLoaded', loadFriendsData);
</script>
