};

// 系统主题监听器
let systemThemeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
let systemThemeListener = null;

function getSystemTheme() {
    return systemThemeMediaQuery.matches ? 'dark' : 'light';
}

function startSystemThemeListener() {
    // 移除旧的监听器
    if (systemThemeListener) {
        systemThemeMediaQuery.removeEventListener('change', systemThemeListener);
    }
    // 添加新的监听器
    systemThemeListener = (e) => {
        let newSystemTheme = e.matches ? 'dark' : 'light';
        document.documentElement.setAttribute("data-color-mode", newSystemTheme);
        // 更新图标
        if (themeSettings[newSystemTheme]) {
            let icon = themeSettings[newSystemTheme][1];
            let color = themeSettings[newSystemTheme][2];
            document.getElementById("themeSwitch").setAttribute("d", IconList[icon]);
            document.getElementById("themeSwitch").parentNode.style.color = color;
        }
    };
    systemThemeMediaQuery.addEventListener('change', systemThemeListener);
}

function stopSystemThemeListener() {
    if (systemThemeListener) {
        systemThemeMediaQuery.removeEventListener('change', systemThemeListener);
        systemThemeListener = null;
    }
}

function applyTheme(mode) {
    // 应用主题设置，更新图标和颜色
    if (themeSettings[mode]) {
        let icon = themeSettings[mode][1];
        let color = themeSettings[mode][2];
        document.getElementById("themeSwitch").setAttribute("d", IconList[icon]);
        document.getElementById("themeSwitch").parentNode.style.color = color;
    }
}

function changeTheme(mode, icon, color, utheme){
    document.documentElement.setAttribute("data-color-mode", mode);
    document.getElementById("themeSwitch").setAttribute("d", value=IconList[icon]);
    document.getElementById("themeSwitch").parentNode.style.color = color;
    if(utterancesLoad==1){utterancesTheme(utheme);}
}

function modeSwitch(){
    let newMode;
    
    // 循环：light -> dark -> auto -> light
    if (currentThemeMode === "light") {
        newMode = "dark";
    } else if (currentThemeMode === "dark") {
        newMode = "auto";
    } else {
        newMode = "light";
    }
    
    // 更新当前模式
    currentThemeMode = newMode;
    localStorage.setItem("meek_theme", newMode);
    
    if (newMode === "auto") {
        // 切换到 auto 模式，立即应用当前系统主题
        stopSystemThemeListener();
        let systemTheme = getSystemTheme();
        document.documentElement.setAttribute("data-color-mode", systemTheme);
        applyTheme("auto");
        startSystemThemeListener();
    } else if (themeSettings[newMode]) {
        stopSystemThemeListener();
        changeTheme(...themeSettings[newMode]);
    }
}

// 树枝背景动画 - 参考 BackgrounRandom.astro
(function() {
    const canvas = document.getElementById('branch-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    
    const r180 = Math.PI;
    const r90 = Math.PI / 2;
    const r15 = Math.PI / 12;
    const MIN_BRANCH = 30;
    const len = 6;
    
    let steps = [];
    let prevSteps = [];
    let size = { width: window.innerWidth, height: window.innerHeight };
    
    function randomMiddle() {
        return Math.random() * 0.6 + 0.2;
    }
    
    function initCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = size.width + 'px';
        canvas.style.height = size.height + 'px';
        canvas.width = dpr * size.width;
        canvas.height = dpr * size.height;
        ctx.scale(dpr, dpr);
    }
    
    function polar2cart(x, y, r, theta) {
        const dx = r * Math.cos(theta);
        const dy = r * Math.sin(theta);
        return [x + dx, y + dy];
    }
    
    function step(x, y, rad, counter) {
        counter = counter || { value: 0 };
        const length = Math.random() * len;
        counter.value += 1;
        
        const [nx, ny] = polar2cart(x, y, length, rad);
        
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(nx, ny);
        ctx.stroke();
        
        const rad1 = rad + Math.random() * r15;
        const rad2 = rad - Math.random() * r15;
        
        if (nx < -100 || nx > size.width + 100 || ny < -100 || ny > size.height + 100) return;
        
        const rate = counter.value <= MIN_BRANCH ? 0.8 : 0.5;
        
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad1, counter); });
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad2, counter); });
    }
    
    function frame() {
        prevSteps = steps;
        steps = [];
        
        if (!prevSteps.length) return;
        
        prevSteps.forEach(function(i) {
            if (Math.random() < 0.5) steps.push(i);
            else i();
        });
        
        requestAnimationFrame(frame);
    }
    
    function getBranchColor() {
        const isDark = document.documentElement.getAttribute('data-color-mode') === 'dark';
        // 使用 CSS 变量获取主题色，适配明暗模式
        const style = getComputedStyle(document.documentElement);
        const accent = style.getPropertyValue('--color-accent-fg').trim() || (isDark ? '#58a6ff' : '#0969da');
        // 解析 HSL 并降低透明度
        if (accent.startsWith('#')) {
            const r = parseInt(accent.slice(1, 3), 16);
            const g = parseInt(accent.slice(3, 5), 16);
            const b = parseInt(accent.slice(5, 7), 16);
            return 'rgba(' + r + ', ' + g + ', ' + b + ', 0.12)';
        }
        return isDark ? 'rgba(88, 166, 255, 0.12)' : 'rgba(9, 105, 218, 0.12)';
    }
    
    function start() {
        const color = getBranchColor();
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 1;
        ctx.strokeStyle = color;
        prevSteps = [];
        steps = [
            function() { step(randomMiddle() * size.width, -5, r90); },
            function() { step(randomMiddle() * size.width, size.height + 5, -r90); },
            function() { step(-5, randomMiddle() * size.height, 0); },
            function() { step(size.width + 5, randomMiddle() * size.height, r180); }
        ];
        if (size.width < 500) steps = steps.slice(0, 2);
        requestAnimationFrame(frame);
    }
    
    initCanvas();
    start();
    
    // 窗口大小改变时重新绘制
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
            if (window.innerWidth === size.width) return;
            size.width = window.innerWidth;
            size.height = window.innerHeight;
            initCanvas();
            start();
        }, 200);
    });
    
    // 主题切换时更新颜色
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.attributeName === 'data-color-mode') {
                start();
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true });
})();

// SafeGo 外链中转处理

(function() {
    const SAFEGO_CONFIG = {
        enableBase64: true,
        goPagePath: 'https://moretti815.github.io/blog/go.html',
        domainWhitelist: ["moretti815.github.io", "github.com", "jsd.268682.xyz", "cdn.jsdmirror.com", "www.kemiaosw.top"],
        ignoreAttrs: ["data-fancybox"]
    };
    
    function encodeSafeUrl(url) {
        if (!SAFEGO_CONFIG.enableBase64) {
            return encodeURIComponent(url);
        }
        
        // Base64 encode with URL safe characters
        const base64 = btoa(encodeURIComponent(url).replace(/%([0-9A-F]{2})/g,
            function(_, p1) { return String.fromCharCode('0x' + p1); }
        ));
        
        // Replace URL unsafe characters
        return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    
    function isExternalLink(href) {
        if (!href || href.startsWith('#') || href.startsWith('javascript:') || href.startsWith('mailto:')) {
            return false;
        }
        
        // Relative links
        if (href.startsWith('/') && !href.startsWith('//')) {
            return false;
        }
        
        try {
            const url = new URL(href, window.location.href);
            const currentHost = window.location.hostname;
            
            // Same domain
            if (url.hostname === currentHost) {
                return false;
            }
            
            // Check whitelist
            for (let i = 0; i < SAFEGO_CONFIG.domainWhitelist.length; i++) {
                if (url.hostname.includes(SAFEGO_CONFIG.domainWhitelist[i])) {
                    return false;
                }
            }
            
            return true;
        } catch (e) {
            return false;
        }
    }
    
    function hasIgnoreAttr(element) {
        for (let i = 0; i < SAFEGO_CONFIG.ignoreAttrs.length; i++) {
            if (element.hasAttribute(SAFEGO_CONFIG.ignoreAttrs[i])) {
                return true;
            }
        }
        return false;
    }
    
    function processLinks() {
        const links = document.querySelectorAll('a[href]');
        
        links.forEach(function(link) {
            // Skip already processed
            if (link.hasAttribute('data-safego-processed')) {
                return;
            }
            
            const href = link.getAttribute('href');
            
            // Skip if has ignore attribute
            if (hasIgnoreAttr(link)) {
                link.setAttribute('data-safego-processed', 'true');
                return;
            }
            
            // Check if external link
            if (isExternalLink(href)) {
                const encodedUrl = encodeSafeUrl(href);
                const goUrl = SAFEGO_CONFIG.goPagePath + '?u=' + encodedUrl;
                
                link.setAttribute('href', goUrl);
                link.setAttribute('data-safego-processed', 'true');
                link.setAttribute('target', '_blank');
                link.setAttribute('rel', 'noopener noreferrer');
                
                // 点击时记录来源页面到 localStorage（同源共享）
                link.addEventListener('click', function() {
                    try {
                        localStorage.setItem('safego_source', window.location.href);
                        localStorage.setItem('safego_source_time', Date.now());
                    } catch (e) {}
                });
            }
        });
    }
    
    // Process on DOM ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', processLinks);
    } else {
        processLinks();
    }
    
    // Process dynamically added links
    const observer = new MutationObserver(function(mutations) {
        let shouldProcess = false;
        mutations.forEach(function(mutation) {
            if (mutation.type === 'childList') {
                mutation.addedNodes.forEach(function(node) {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        if (node.tagName === 'A' || node.querySelectorAll) {
                            shouldProcess = true;
                        }
                    }
                });
            }
        });
        
        if (shouldProcess) {
            processLinks();
        }
    });
    
    observer.observe(document.body, { childList: true, subtree: true });
})();

</script>

<script>
document.getElementById("pathHome").setAttribute("d", IconList["home"]);

// 友链数据 URL
const FRIENDS_DATA_URL = 'https://jsd.268682.xyz/gh/Kemeow0815/friends@output/v2/data.json';
const LATENCY_DATA_URL = 'https://clink.268682.xyz/result.json';

// 缓存配置
const CACHE_KEY = 'friendsDataCache';
const CACHE_EXPIRATION = 30 * 60 * 1000; // 30分钟

// 获取缓存数据
function getCachedData() {
    try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
            const { data, timestamp } = JSON.parse(cached);
            if (Date.now() - timestamp < CACHE_EXPIRATION) {
                return data;
            }
        }
    } catch (e) {
        console.error('Cache read error:', e);
    }
    return null;
}

// 设置缓存数据
function setCachedData(data) {
    try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({
            data: data,
            timestamp: Date.now()
        }));
    } catch (e) {
        console.error('Cache write error:', e);
    }
}

// 格式化日期
function formatDate(dateStr) {
    if (!dateStr) return '';
    const date = new Date(dateStr);
    if (isNaN(date.getTime())) return dateStr;
    return `${date.getMonth() + 1}/${date.getDate()}`;
}

// 创建友链卡片 HTML
function createFriendCard(friend, latencyStatus) {
    const url = friend.url || '#';
    const icon = friend.icon || '';
    const snapshot = friend.snapshot || '';
    const title = friend.title || 'Unknown';
    const description = friend.description || '';
    const posts = friend.posts || [];
    const labels = friend.labels || [];

    let statusClass = 'status-tag-red';
    let statusText = 'ERR';

    if (latencyStatus) {
        if (latencyStatus.latency === -1) {
            statusText = 'ERR';
        } else {
            const latency = latencyStatus.latency;
            statusText = latency < 1 ? Math.round(latency * 1000) + ' MS' : latency.toFixed(1) + ' S';
            if (latency <= 2) {
                statusClass = 'status-tag-green';
            } else if (latency <= 5) {
                statusClass = 'status-tag-light-yellow';
            } else if (latency <= 10) {
                statusClass = 'status-tag-dark-yellow';
            }
        }
    }

    // 生成标签 HTML
    const labelsHtml = labels.map(label => {
        const color = label.color || '666666';
        return `<span class="flink-label" style="background-color: #${color};">${label.name}</span>`;
    }).join('');

    // 生成文章列表 HTML
    const postsHtml = posts.slice(0, 3).map(post => {
        const postDate = formatDate(post.published);
        return `<a href="${post.link}" target="_blank" class="flink-post-item" title="${post.title}">${post.title}<span class="flink-post-date">${postDate}</span></a>`;
    }).join('');

    return `
        <a href="${url}" target="_blank" class="flink-list-item" data-url="${url.replace(/\/$/, '')}">
            <div class="status-tag ${statusClass}">${statusText}</div>
            ${labelsHtml ? `<div class="flink-labels">${labelsHtml}</div>` : ''}
            <img class="flink-snapshot" src="${snapshot}" alt="${title}" loading="lazy" onerror="this.src='${icon}'">
            <div class="flink-content">
                <img class="flink-avatar" src="${icon}" alt="${title}" loading="lazy">
                <div class="flink-info">
                    <div class="flink-name">${title}</div>
                    <div class="flink-desc">${description}</div>
                </div>
            </div>
            ${postsHtml ? `<div class="flink-posts">${postsHtml}</div>` : ''}
        </a>
    `;
}

// 渲染友链列表
function renderFriends(friendsData, latencyData) {
    const container = document.getElementById('friends-container');
    if (!friendsData || !friendsData.content || friendsData.content.length === 0) {
        container.innerHTML = '<div class="flink-error">暂无友链</div>';
        return;
    }

    const latencyMap = {};
    if (latencyData && latencyData.link_status) {
        latencyData.link_status.forEach(item => {
            const key = item.link.replace(/\/$/, '');
            latencyMap[key] = item;
        });
    }

    const friendsHtml = friendsData.content.map(friend => {
        const urlKey = (friend.url || '').replace(/\/$/, '');
        const latencyStatus = latencyMap[urlKey];
        return createFriendCard(friend, latencyStatus);
    }).join('');

    container.innerHTML = `<div class="flink-list">${friendsHtml}</div>`;
}

// 加载延迟数据并应用
function loadLatencyData() {
    fetch(LATENCY_DATA_URL)
        .then(response => response.json())
        .then(data => {
            document.querySelectorAll('.flink-list-item').forEach(card => {
                const link = card.getAttribute('data-url');
                if (!link) return;

                const status = data.link_status?.find(item =>
                    item.link.replace(/\/$/, '') === link
                );

                if (status) {
                    const statusTag = card.querySelector('.status-tag');
                    if (!statusTag) return;

                    let statusText = 'ERR';
                    let statusClass = 'status-tag-red';

                    if (status.latency === -1) {
                        statusText = 'ERR';
                    } else {
                        const latency = status.latency;
                        statusText = latency < 1 ? Math.round(latency * 1000) + ' MS' : latency.toFixed(1) + ' S';
                        if (latency <= 2) {
                            statusClass = 'status-tag-green';
                        } else if (latency <= 5) {
                            statusClass = 'status-tag-light-yellow';
                        } else if (latency <= 10) {
                            statusClass = 'status-tag-dark-yellow';
                        }
                    }

                    statusTag.textContent = statusText;
                    statusTag.className = `status-tag ${statusClass}`;
                }
            });

            // 缓存延迟数据
            try {
                localStorage.setItem('latencyDataCache', JSON.stringify({
                    data: data,
                    timestamp: Date.now()
                }));
            } catch (e) {
                console.error('Latency cache error:', e);
            }
        })
        .catch(error => {
            console.error('Latency data fetch error:', error);
        });
}

// 加载友链数据
function loadFriendsData() {
    const cachedData = getCachedData();

    if (cachedData) {
        renderFriends(cachedData, null);
        // 后台更新延迟数据
        loadLatencyData();
    }

    // 获取最新数据
    fetch(FRIENDS_DATA_URL)
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            setCachedData(data);
            renderFriends(data, null);
            loadLatencyData();
        })
        .catch(error => {
            console.error('Friends data fetch error:', error);
            if (!cachedData) {
                document.getElementById('friends-container').innerHTML =
                    '<div class="flink-error">加载友链失败</div>';
            }
        });
}

// 页面加载完成后执行
document.addEventListener('DOMContentLoaded', loadFriendsData);
</script>
