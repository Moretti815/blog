<body><!-- 访客欢迎通知组件 -->
<script>
(function() {
    const VISIT_KEY = 'blog_welcome_shown';
    const VISIT_EXPIRY_KEY = 'blog_welcome_expiry';
    // 24小时的毫秒数
    const EXPIRY_TIME = 24 * 60 * 60 * 1000;
    let hasShownToast = false;
    
    function createWelcomeToast() {
        const toast = document.createElement('div');
        toast.id = 'welcome-toast';
        toast.className = 'welcome-toast';
        toast.innerHTML = `
            <div class="welcome-toast-inner">
                <div class="welcome-toast-content">
                    <div class="welcome-toast-icon">👋</div>
                    <div class="welcome-toast-body">
                        <p id="welcome-message" class="welcome-toast-title">正在加载...</p>
                        <p id="welcome-stats" class="welcome-toast-stats"></p>
                        <p class="welcome-toast-quote">在茫茫互联网的大海中 感谢遇见你🙏</p>
                        <div class="welcome-toast-links">
                            <a href="https://t.me/kemiaochat" target="_blank" rel="noopener noreferrer" class="welcome-toast-link welcome-toast-link-blue">
                                👆加群
                            </a>
                            <span class="welcome-toast-divider">|</span>
                            <a href="https://github.com/moretti815/blog/issues/2" class="welcome-toast-link welcome-toast-link-green">
                                📬订阅更新
                            </a>
                            <span class="welcome-toast-divider">|</span>
                            <a href="javascript:void(0)" onclick="copyRssLink()" class="welcome-toast-link welcome-toast-link-orange">
                                📋RSS
                            </a>
                        </div>
                        <p id="rss-copy-msg" class="welcome-toast-copy-msg hidden">已复制到剪贴板~</p>
                    </div>
                    <button onclick="closeWelcomeToast()" class="welcome-toast-close" aria-label="关闭">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(toast);
        return toast;
    }
    
    window.closeWelcomeToast = function() {
        const toast = document.getElementById('welcome-toast');
        if (toast) {
            toast.classList.remove('show');
            setTimeout(() => {
                toast.remove();
            }, 500);
        }
    };
    
    window.copyRssLink = async function() {
        const msg = document.getElementById('rss-copy-msg');
        const rssUrl = window.location.origin + '/rss.xml';
        try {
            await navigator.clipboard.writeText(rssUrl);
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 2000);
        } catch (e) {
            const input = document.createElement('input');
            input.value = rssUrl;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 2000);
        }
    };
    
    async function fetchLocation() {
        try {
            const response = await fetch('https://v2.xxapi.cn/api/ip');
            const data = await response.json();
            
            if (data.code === 200 && data.data) {
                const location = data.data;
                const locationText = `HI 来自${location.address}的朋友`;
                
                const messageEl = document.getElementById('welcome-message');
                if (messageEl) {
                    messageEl.textContent = locationText;
                }
            }
        } catch (error) {
            console.error('Failed to fetch location:', error);
            const messageEl = document.getElementById('welcome-message');
            if (messageEl) {
                messageEl.textContent = 'HI 来自远方的朋友';
            }
        }
    }
    
    async function fetchStats() {
        // 等待 Vercount 脚本加载完成
        let attempts = 0;
        const maxAttempts = 30; // 最多等待3秒
        
        while (attempts < maxAttempts) {
            const sitePvEl = document.getElementById('busuanzi_value_site_pv');
            if (sitePvEl && sitePvEl.textContent) {
                const pageviews = sitePvEl.textContent.trim();
                const statsText = `欢迎 我是 Moretti 你是本站迎来的第${pageviews}次访问`;
                
                const statsEl = document.getElementById('welcome-stats');
                if (statsEl) {
                    statsEl.textContent = statsText;
                }
                return;
            }
            await new Promise(resolve => setTimeout(resolve, 100));
            attempts++;
        }
        
        // 超时后显示默认文本
        const statsEl = document.getElementById('welcome-stats');
        if (statsEl) {
            statsEl.textContent = '欢迎 我是 Moretti';
        }
    }
    
    async function showWelcomeToast() {
        if (hasShownToast) return;
        
        const toast = createWelcomeToast();
        
        // 强制重绘以确保过渡动画生效
        toast.offsetHeight;
        
        setTimeout(() => {
            toast.classList.add('show');
        }, 100);
        
        hasShownToast = true;
        
        await Promise.all([fetchLocation(), fetchStats()]);
        
        // 5秒后自动关闭
        setTimeout(() => {
            closeWelcomeToast();
        }, 5000);
    }
    
    function shouldShowWelcome() {
        const now = Date.now();
        const expiry = localStorage.getItem(VISIT_EXPIRY_KEY);
        
        // 如果存在过期时间且未过期，则不显示
        if (expiry && now < parseInt(expiry)) {
            return false;
        }
        
        // 如果已过期或不存在，清除旧数据
        localStorage.removeItem(VISIT_KEY);
        localStorage.removeItem(VISIT_EXPIRY_KEY);
        return true;
    }
    
    function markAsVisited() {
        const now = Date.now();
        localStorage.setItem(VISIT_KEY, 'true');
        localStorage.setItem(VISIT_EXPIRY_KEY, (now + EXPIRY_TIME).toString());
    }
    
    // 等待页面加载完成后再显示
    function init() {
        if (shouldShowWelcome()) {
            markAsVisited();
            // 延迟显示，等待页面其他元素加载
            setTimeout(() => {
                showWelcomeToast();
            }, 1000);
        }
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>

    // 回到顶部功能
    function backToTop() {
        window.scroll({ top: 0, behavior: 'smooth' });
    }

    // 滚动监听，控制按钮显示/隐藏
    function handleScroll() {
        const wrapper = document.getElementById('back-to-top-wrapper');
        if (!wrapper) return;

        // 当滚动超过 300px 时显示按钮
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        if (scrollTop > 300) {
            wrapper.classList.add('visible');
        } else {
            wrapper.classList.remove('visible');
        }
    }

    // 节流函数，优化性能
    function throttle(func, limit) {
        let inThrottle;
        return function() {
            const args = arguments;
            const context = this;
            if (!inThrottle) {
                func.apply(context, args);
                inThrottle = true;
                setTimeout(function() {
                    inThrottle = false;
                }, limit);
            }
        };
    }

    // 创建节流的滚动处理函数
    const throttledHandleScroll = throttle(handleScroll, 100);

    // 绑定滚动事件（节流处理，每 100ms 执行一次）
    window.addEventListener('scroll', throttledHandleScroll);

    // 初始化一次
    handleScroll();

    // 暴露到全局，供 PJAX 使用
    window.backToTop = backToTop;
    window.handleScroll = handleScroll;
    window.throttledHandleScroll = throttledHandleScroll;
})();

    }
    
    // Utility: Execute scripts in container
    function executeScripts(container) {
        const scripts = container.querySelectorAll('script');
        scripts.forEach(oldScript => {
            const newScript = document.createElement('script');
            // Copy attributes
            Array.from(oldScript.attributes).forEach(attr => {
                newScript.setAttribute(attr.name, attr.value);
            });
            // Copy content
            newScript.textContent = oldScript.textContent;
            // Replace
            oldScript.parentNode.replaceChild(newScript, oldScript);
        });
    }
    
    // Utility: Update elements that need refresh
    function updatePage(doc, url) {
        const newContent = doc.querySelector(PJAX_CONFIG.container);
        const currentContent = document.querySelector(PJAX_CONFIG.container);
        
        if (!newContent || !currentContent) {
            console.warn('PJAX: Content container not found');
            return false;
        }
        
        // Update content
        currentContent.innerHTML = newContent.innerHTML;
        
        // Execute scripts in new content
        executeScripts(currentContent);
        
        // Update title
        const newTitle = doc.querySelector('title');
        if (newTitle) {
            document.title = newTitle.textContent;
        }
        
        // Update meta tags (description, og:*, etc.)
        const metaSelectors = ['meta[name="description"]', 'meta[property^="og:"]', 'meta[name="twitter:"]'];
        metaSelectors.forEach(selector => {
            const newMeta = doc.querySelector(selector);
            const currentMeta = document.querySelector(selector);
            if (newMeta && currentMeta) {
                currentMeta.content = newMeta.content;
            }
        });
        
        // Update header if it exists in both pages
        const newHeader = doc.querySelector('#header');
        const currentHeader = document.querySelector('#header');
        if (newHeader && currentHeader) {
            currentHeader.innerHTML = newHeader.innerHTML;
            executeScripts(currentHeader);
        }
        
        // Update footer if it exists in both pages
        const newFooter = doc.querySelector('#footer');
        const currentFooter = document.querySelector('#footer');
        if (newFooter && currentFooter) {
            currentFooter.innerHTML = newFooter.innerHTML;
            executeScripts(currentFooter);
        }
        
        // Update body classes and attributes
        const newBody = doc.body;
        const currentBody = document.body;
        
        // Copy data attributes from new body
        Array.from(newBody.attributes).forEach(attr => {
            if (attr.name.startsWith('data-')) {

        showLoading();
        
        // Check cache
        if (PJAX_CONFIG.cache && pageCache.has(url)) {

            if (Date.now() - cached.time < 5 * 60 * 1000) { // 5 minutes cache
                updatePage(cached.doc, url);
                if (pushState) {
                    history.pushState({ url: url }, '', url);
                }
                currentUrl = url;
                isLoading = false;
                hideLoading();
                return;
            }
            pageCache.delete(url);
        }

            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',

                }
                currentUrl = url;

        } finally {

    function showLoading() {

        const preloader = document.getElementById('preloader');
        if (preloader) {
            preloader.style.display = 'flex';
            preloader.classList.remove('hidden');

    }
    
    // Hide loading indicator
    function hideLoading() {

        if (preloader) {
            preloader.classList.add('hidden');
            setTimeout(() => {
                if (!isLoading) {
                    preloader.style.display = 'none';
                }
            }, 500);
        }

    // Handle link clicks
    function handleClick(event) {
        const link = event.target.closest('a');
        if (!link) return;
        
        // Check if link matches PJAX selector
        if (!link.matches(PJAX_CONFIG.selector)) return;
        
        // Skip if modifier keys are pressed
        if (event.ctrlKey || event.metaKey || event.shiftKey || event.altKey) return;
        
        // Skip if it's the same page
        if (link.href === currentUrl) {
            event.preventDefault();
            return;
        }
        
        event.preventDefault();
        loadPage(link.href);
    }
    
    // Handle popstate (back/forward buttons)
    function handlePopState(event) {
        if (event.state && event.state.url) {
            loadPage(event.state.url, false);
        }
    }
    
    // Initialize PJAX
    function init() {
        // Don't initialize if browser doesn't support required features
        if (!window.history || !window.history.pushState) return;
        
        // Add click listener to document
        document.addEventListener('click', handleClick);
        
        // Handle back/forward buttons
        window.addEventListener('popstate', handlePopState);

        history.replaceState({ url: location.href }, '', location.href);

function modeSwitch(){
    let newMode;
    
    // 循环：light -> dark -> auto -> light
    if (currentThemeMode === "light") {
        newMode = "dark";
    } else if (currentThemeMode === "dark") {
        newMode = "auto";
    } else {
        newMode = "light";
    }
    
    // 更新当前模式
    currentThemeMode = newMode;
    localStorage.setItem("meek_theme", newMode);
    
    if (newMode === "auto") {
        // 切换到 auto 模式，立即应用当前系统主题
        stopSystemThemeListener();
        let systemTheme = getSystemTheme();
        document.documentElement.setAttribute("data-color-mode", systemTheme);
        applyTheme("auto");
        startSystemThemeListener();
    } else if (themeSettings[newMode]) {
        stopSystemThemeListener();
        changeTheme(...themeSettings[newMode]);
    }
}

    const minDisplayTime = 500;

    let hidden = false;

    function hidePreloader() {
        if (hidden) return;
        hidden = true;

        const elapsedTime = Date.now() - startTime;
        const remainingTime = Math.max(0, minDisplayTime - elapsedTime);

        setTimeout(function() {
            preloader.classList.add('hidden');
            preloader.style.display = 'none';

                if (preloader.parentNode) {

            }, 500); // 与 CSS transition 时间一致
        }, remainingTime);
    }

    // 页面加载完成后隐藏动画
    if (document.readyState === 'complete') {
        hidePreloader();

// 树枝背景动画 - 参考 BackgrounRandom.astro
(function() {
    const canvas = document.getElementById('branch-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    
    const r180 = Math.PI;
    const r90 = Math.PI / 2;
    const r15 = Math.PI / 12;
    const MIN_BRANCH = 30;
    const len = 6;
    
    let steps = [];
    let prevSteps = [];
    let size = { width: window.innerWidth, height: window.innerHeight };
    
    function randomMiddle() {
        return Math.random() * 0.6 + 0.2;
    }
    
    function initCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = size.width + 'px';
        canvas.style.height = size.height + 'px';
        canvas.width = dpr * size.width;
        canvas.height = dpr * size.height;
        ctx.scale(dpr, dpr);
    }
    
    function polar2cart(x, y, r, theta) {
        const dx = r * Math.cos(theta);
        const dy = r * Math.sin(theta);
        return [x + dx, y + dy];
    }
    
    function step(x, y, rad, counter) {
        counter = counter || { value: 0 };
        const length = Math.random() * len;
        counter.value += 1;
        
        const [nx, ny] = polar2cart(x, y, length, rad);
        
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(nx, ny);
        ctx.stroke();
        
        const rad1 = rad + Math.random() * r15;
        const rad2 = rad - Math.random() * r15;
        
        if (nx < -100 || nx > size.width + 100 || ny < -100 || ny > size.height + 100) return;
        
        const rate = counter.value <= MIN_BRANCH ? 0.8 : 0.5;
        
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad1, counter); });
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad2, counter); });
    }
    
    function frame() {
        prevSteps = steps;
        steps = [];
        
        if (!prevSteps.length) return;
        
        prevSteps.forEach(function(i) {
            if (Math.random() < 0.5) steps.push(i);
            else i();
        });
        
        requestAnimationFrame(frame);
    }
    
    function getBranchColor() {
        const isDark = document.documentElement.getAttribute('data-color-mode') === 'dark';
        // 使用 CSS 变量获取主题色，适配明暗模式
        const style = getComputedStyle(document.documentElement);
        const accent = style.getPropertyValue('--color-accent-fg').trim() || (isDark ? '#58a6ff' : '#0969da');
        // 解析 HSL 并降低透明度
        if (accent.startsWith('#')) {
            const r = parseInt(accent.slice(1, 3), 16);
            const g = parseInt(accent.slice(3, 5), 16);
            const b = parseInt(accent.slice(5, 7), 16);
            return 'rgba(' + r + ', ' + g + ', ' + b + ', 0.12)';
        }
        return isDark ? 'rgba(88, 166, 255, 0.12)' : 'rgba(9, 105, 218, 0.12)';
    }
    
    function start() {
        const color = getBranchColor();
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 1;
        ctx.strokeStyle = color;
        prevSteps = [];
        steps = [
            function() { step(randomMiddle() * size.width, -5, r90); },
            function() { step(randomMiddle() * size.width, size.height + 5, -r90); },
            function() { step(-5, randomMiddle() * size.height, 0); },
            function() { step(size.width + 5, randomMiddle() * size.height, r180); }
        ];
        if (size.width < 500) steps = steps.slice(0, 2);
        requestAnimationFrame(frame);
    }
    
    initCanvas();
    start();
    
    // 窗口大小改变时重新绘制
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
            if (window.innerWidth === size.width) return;
            size.width = window.innerWidth;
            size.height = window.innerHeight;
            initCanvas();
            start();
        }, 200);
    });
    
    // 主题切换时更新颜色
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.attributeName === 'data-color-mode') {
                start();
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true });
})();

// SafeGo 外链中转处理

(function() {
    const SAFEGO_CONFIG = {
        enableBase64: true,
        goPagePath: 'https://blog.2005815.xyz/go.html',
        domainWhitelist: ["moretti815.github.io", "github.com", "jsd.268682.xyz", "jsd.liiiu.cn", "www.kemiaosw.top", "blog.2005815.xyz"],
        ignoreAttrs: ["data-fancybox"],
        enableTargetBlank: true
    };
    
    function encodeSafeUrl(url) {
        if (!SAFEGO_CONFIG.enableBase64) {
            return encodeURIComponent(url);
        }
        
        // Base64 encode with URL safe characters
        const base64 = btoa(encodeURIComponent(url).replace(/%([0-9A-F]{2})/g,
            function(_, p1) { return String.fromCharCode('0x' + p1); }
        ));
        
        // Replace URL unsafe characters
        return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    
    function isExternalLink(href) {
        if (!href || href.startsWith('#') || href.startsWith('javascript:') || href.startsWith('mailto:') || href.startsWith('tel:')) {
            return false;
        }
        
        // Relative links
        if (href.startsWith('/') && !href.startsWith('//')) {
            return false;
        }
        
        try {
            const url = new URL(href, window.location.href);
            const currentHost = window.location.hostname;
            
            // Same domain
            if (url.hostname === currentHost) {
                return false;
            }
            
            // Check whitelist
            for (let i = 0; i < SAFEGO_CONFIG.domainWhitelist.length; i++) {
                if (url.hostname.includes(SAFEGO_CONFIG.domainWhitelist[i])) {
                    return false;
                }
            }
            
            return true;
        } catch (e) {
            return false;
        }
    }
    
    function hasIgnoreAttr(element) {
        for (let i = 0; i < SAFEGO_CONFIG.ignoreAttrs.length; i++) {
            if (element.hasAttribute(SAFEGO_CONFIG.ignoreAttrs[i])) {
                return true;
            }
        }
        return false;
    }
    
    function processLinks() {
        const links = document.querySelectorAll('a[href]');
        
        links.forEach(function(link) {
            // Skip already processed
            if (link.hasAttribute('data-safego-processed')) {
                return;
            }
            
            const href = link.getAttribute('href');
            
            // Skip if has ignore attribute
            if (hasIgnoreAttr(link)) {
                link.setAttribute('data-safego-processed', 'true');
                return;
            }
            
            // Check if external link
            if (isExternalLink(href)) {
                const encodedUrl = encodeSafeUrl(href);
                // 将来源页 URL 附加到 go 链接中，解决 noopener 导致 referrer 为空的问题
                const fromUrl = encodeURIComponent(window.location.href);
                const goUrl = SAFEGO_CONFIG.goPagePath + '?u=' + encodedUrl + '&from=' + fromUrl;
                
                link.setAttribute('href', goUrl);
                link.setAttribute('data-safego-processed', 'true');
                link.setAttribute('rel', 'external nofollow noopener noreferrer');
                
                if (SAFEGO_CONFIG.enableTargetBlank) {
                    link.setAttribute('target', '_blank');
                }
            }
        });
    }
    
    // Process on DOM ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', processLinks);
    } else {
        processLinks();
    }
    
    // Process dynamically added links
    const observer = new MutationObserver(function(mutations) {
        let shouldProcess = false;
        mutations.forEach(function(mutation) {
            if (mutation.type === 'childList') {
                mutation.addedNodes.forEach(function(node) {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        if (node.tagName === 'A' || node.querySelectorAll) {
                            shouldProcess = true;
                        }
                    }
                });
            }
        });
        
        if (shouldProcess) {
            processLinks();
        }
    });
    
    observer.observe(document.body, { childList: true, subtree: true });
})();
