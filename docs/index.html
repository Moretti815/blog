        // 获取系统主题偏好
        function getSystemTheme() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        
        // 初始化主题：优先使用 localStorage，否则跟随系统
        let savedTheme = localStorage.getItem("meek_theme");
        let theme;
        if (savedTheme === null) {
            // 第一次访问，跟随系统
            theme = getSystemTheme();
            localStorage.setItem("meek_theme", theme);
        } else {
            theme = savedTheme;
        }
        document.documentElement.setAttribute("data-color-mode", theme);
    </script>

<body><!-- 访客欢迎通知组件 -->
<script>
(function() {
    const VISIT_KEY = 'blog_welcome_shown';
    const VISIT_EXPIRY_KEY = 'blog_welcome_expiry';
    // 24小时的毫秒数
    const EXPIRY_TIME = 24 * 60 * 60 * 1000;
    let hasShownToast = false;
    
    function createWelcomeToast() {
        const toast = document.createElement('div');
        toast.id = 'welcome-toast';
        toast.className = 'welcome-toast';
        toast.innerHTML = `
            <div class="welcome-toast-inner">
                <div class="welcome-toast-content">
                    <div class="welcome-toast-icon">👋</div>
                    <div class="welcome-toast-body">
                        <p id="welcome-message" class="welcome-toast-title">正在加载...</p>
                        <p id="welcome-stats" class="welcome-toast-stats"></p>
                        <p class="welcome-toast-quote">在茫茫互联网的大海中 感谢遇见你🙏</p>
                        <div class="welcome-toast-links">
                            <a href="https://t.me/kemiaochat" target="_blank" rel="noopener noreferrer" class="welcome-toast-link welcome-toast-link-blue">
                                👆加群
                            </a>
                            <span class="welcome-toast-divider">|</span>
                            <a href="https://github.com/moretti815/blog/issues/2" class="welcome-toast-link welcome-toast-link-green">
                                📬订阅更新
                            </a>
                            <span class="welcome-toast-divider">|</span>
                            <a href="javascript:void(0)" onclick="copyRssLink()" class="welcome-toast-link welcome-toast-link-orange">
                                📋RSS
                            </a>
                        </div>
                        <p id="rss-copy-msg" class="welcome-toast-copy-msg hidden">已复制到剪贴板~</p>
                    </div>
                    <button onclick="closeWelcomeToast()" class="welcome-toast-close" aria-label="关闭">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(toast);
        return toast;
    }
    
    window.closeWelcomeToast = function() {
        const toast = document.getElementById('welcome-toast');
        if (toast) {
            toast.classList.remove('show');
            setTimeout(() => {
                toast.remove();
            }, 500);
        }
    };
    
    window.copyRssLink = async function() {
        const msg = document.getElementById('rss-copy-msg');
        const rssUrl = window.location.origin + '/rss.xml';
        try {
            await navigator.clipboard.writeText(rssUrl);
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 2000);
        } catch (e) {
            const input = document.createElement('input');
            input.value = rssUrl;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 2000);
        }
    };
    
    async function fetchLocation() {
        try {
            const response = await fetch('https://v2.xxapi.cn/api/ip');
            const data = await response.json();
            
            if (data.code === 200 && data.data) {
                const location = data.data;
                const locationText = `HI 来自${location.address}的朋友`;
                
                const messageEl = document.getElementById('welcome-message');
                if (messageEl) {
                    messageEl.textContent = locationText;
                }
            }
        } catch (error) {
            console.error('Failed to fetch location:', error);
            const messageEl = document.getElementById('welcome-message');
            if (messageEl) {
                messageEl.textContent = 'HI 来自远方的朋友';
            }
        }
    }
    
    async function fetchStats() {
        // 等待 Vercount 脚本加载完成
        let attempts = 0;
        const maxAttempts = 30; // 最多等待3秒
        
        while (attempts < maxAttempts) {
            const sitePvEl = document.getElementById('busuanzi_value_site_pv');
            if (sitePvEl && sitePvEl.textContent) {
                const pageviews = sitePvEl.textContent.trim();
                const statsText = `欢迎 我是 Moretti 你是本站迎来的第${pageviews}次访问`;
                
                const statsEl = document.getElementById('welcome-stats');
                if (statsEl) {
                    statsEl.textContent = statsText;
                }
                return;
            }
            await new Promise(resolve => setTimeout(resolve, 100));
            attempts++;
        }
        
        // 超时后显示默认文本
        const statsEl = document.getElementById('welcome-stats');
        if (statsEl) {
            statsEl.textContent = '欢迎 我是 Moretti';
        }
    }
    
    async function showWelcomeToast() {
        if (hasShownToast) return;
        
        const toast = createWelcomeToast();
        
        // 强制重绘以确保过渡动画生效
        toast.offsetHeight;
        
        setTimeout(() => {
            toast.classList.add('show');
        }, 100);
        
        hasShownToast = true;
        
        await Promise.all([fetchLocation(), fetchStats()]);
        
        // 5秒后自动关闭
        setTimeout(() => {
            closeWelcomeToast();
        }, 5000);
    }
    
    function shouldShowWelcome() {
        const now = Date.now();
        const expiry = localStorage.getItem(VISIT_EXPIRY_KEY);
        
        // 如果存在过期时间且未过期，则不显示
        if (expiry && now < parseInt(expiry)) {
            return false;
        }
        
        // 如果已过期或不存在，清除旧数据
        localStorage.removeItem(VISIT_KEY);
        localStorage.removeItem(VISIT_EXPIRY_KEY);
        return true;
    }
    
    function markAsVisited() {
        const now = Date.now();
        localStorage.setItem(VISIT_KEY, 'true');
        localStorage.setItem(VISIT_EXPIRY_KEY, (now + EXPIRY_TIME).toString());
    }
    
    // 等待页面加载完成后再显示
    function init() {
        if (shouldShowWelcome()) {
            markAsVisited();
            // 延迟显示，等待页面其他元素加载
            setTimeout(() => {
                showWelcomeToast();
            }, 1000);
        }
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>

<script>
(function() {
    // 回到顶部功能
    function backToTop() {
        window.scroll({ top: 0, behavior: 'smooth' });
    }

    // 滚动监听，控制按钮显示/隐藏
    function handleScroll() {
        const wrapper = document.getElementById('back-to-top-wrapper');
        if (!wrapper) return;

        // 当滚动超过 300px 时显示按钮
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        if (scrollTop > 300) {
            wrapper.classList.add('visible');
        } else {
            wrapper.classList.remove('visible');
        }
    }

    // 节流函数，优化性能
    function throttle(func, limit) {
        let inThrottle;
        return function() {
            const args = arguments;
            const context = this;
            if (!inThrottle) {
                func.apply(context, args);
                inThrottle = true;
                setTimeout(function() {
                    inThrottle = false;
                }, limit);
            }
        };
    }

    // 绑定滚动事件（节流处理，每 100ms 执行一次）
    window.addEventListener('scroll', throttle(handleScroll, 100));

    // 初始化一次
    handleScroll();

    // 暴露到全局
    window.backToTop = backToTop;
})();

// 系统主题监听器
let systemThemeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
let systemThemeListener = null;

function getSystemTheme() {
    return systemThemeMediaQuery.matches ? 'dark' : 'light';
}

function startSystemThemeListener() {
    // 移除旧的监听器
    if (systemThemeListener) {
        systemThemeMediaQuery.removeEventListener('change', systemThemeListener);
    }
    // 添加新的监听器
    systemThemeListener = (e) => {
        let newSystemTheme = e.matches ? 'dark' : 'light';
        document.documentElement.setAttribute("data-color-mode", newSystemTheme);
        // 更新图标
        if (themeSettings[newSystemTheme]) {
            let icon = themeSettings[newSystemTheme][1];
            let color = themeSettings[newSystemTheme][2];
            document.getElementById("themeSwitch").setAttribute("d", IconList[icon]);
            document.getElementById("themeSwitch").parentNode.style.color = color;
        }
    };
    systemThemeMediaQuery.addEventListener('change', systemThemeListener);
}

function stopSystemThemeListener() {
    if (systemThemeListener) {
        systemThemeMediaQuery.removeEventListener('change', systemThemeListener);
        systemThemeListener = null;
    }
}

function applyTheme(mode) {
    // 应用主题设置，更新图标和颜色
    if (themeSettings[mode]) {
        let icon = themeSettings[mode][1];
        let color = themeSettings[mode][2];
        document.getElementById("themeSwitch").setAttribute("d", IconList[icon]);
        document.getElementById("themeSwitch").parentNode.style.color = color;
    }
}

function changeTheme(mode, icon, color, utheme){
    document.documentElement.setAttribute("data-color-mode", mode);
    document.getElementById("themeSwitch").setAttribute("d", value=IconList[icon]);
    document.getElementById("themeSwitch").parentNode.style.color = color;
    if(utterancesLoad==1){utterancesTheme(utheme);}
}

function modeSwitch(){
    let newMode;
    
    // 循环：light -> dark -> auto -> light
    if (currentThemeMode === "light") {
        newMode = "dark";
    } else if (currentThemeMode === "dark") {
        newMode = "auto";
    } else {
        newMode = "light";
    }
    
    // 更新当前模式
    currentThemeMode = newMode;
    localStorage.setItem("meek_theme", newMode);
    
    if (newMode === "auto") {
        // 切换到 auto 模式，立即应用当前系统主题
        stopSystemThemeListener();
        let systemTheme = getSystemTheme();
        document.documentElement.setAttribute("data-color-mode", systemTheme);
        applyTheme("auto");
        startSystemThemeListener();
    } else if (themeSettings[newMode]) {
        stopSystemThemeListener();
        changeTheme(...themeSettings[newMode]);
    }
}

function utterancesTheme(theme){

// 树枝背景动画 - 参考 BackgrounRandom.astro
(function() {
    const canvas = document.getElementById('branch-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    
    const r180 = Math.PI;
    const r90 = Math.PI / 2;
    const r15 = Math.PI / 12;
    const MIN_BRANCH = 30;
    const len = 6;
    
    let steps = [];
    let prevSteps = [];
    let size = { width: window.innerWidth, height: window.innerHeight };
    
    function randomMiddle() {
        return Math.random() * 0.6 + 0.2;
    }
    
    function initCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = size.width + 'px';
        canvas.style.height = size.height + 'px';
        canvas.width = dpr * size.width;
        canvas.height = dpr * size.height;
        ctx.scale(dpr, dpr);
    }
    
    function polar2cart(x, y, r, theta) {
        const dx = r * Math.cos(theta);
        const dy = r * Math.sin(theta);
        return [x + dx, y + dy];
    }
    
    function step(x, y, rad, counter) {
        counter = counter || { value: 0 };
        const length = Math.random() * len;
        counter.value += 1;
        
        const [nx, ny] = polar2cart(x, y, length, rad);
        
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(nx, ny);
        ctx.stroke();
        
        const rad1 = rad + Math.random() * r15;
        const rad2 = rad - Math.random() * r15;
        
        if (nx < -100 || nx > size.width + 100 || ny < -100 || ny > size.height + 100) return;
        
        const rate = counter.value <= MIN_BRANCH ? 0.8 : 0.5;
        
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad1, counter); });
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad2, counter); });
    }
    
    function frame() {
        prevSteps = steps;
        steps = [];
        
        if (!prevSteps.length) return;
        
        prevSteps.forEach(function(i) {
            if (Math.random() < 0.5) steps.push(i);
            else i();
        });
        
        requestAnimationFrame(frame);
    }
    
    function getBranchColor() {
        const isDark = document.documentElement.getAttribute('data-color-mode') === 'dark';
        // 使用 CSS 变量获取主题色，适配明暗模式
        const style = getComputedStyle(document.documentElement);
        const accent = style.getPropertyValue('--color-accent-fg').trim() || (isDark ? '#58a6ff' : '#0969da');
        // 解析 HSL 并降低透明度
        if (accent.startsWith('#')) {
            const r = parseInt(accent.slice(1, 3), 16);
            const g = parseInt(accent.slice(3, 5), 16);
            const b = parseInt(accent.slice(5, 7), 16);
            return 'rgba(' + r + ', ' + g + ', ' + b + ', 0.12)';
        }
        return isDark ? 'rgba(88, 166, 255, 0.12)' : 'rgba(9, 105, 218, 0.12)';
    }
    
    function start() {
        const color = getBranchColor();
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 1;
        ctx.strokeStyle = color;
        prevSteps = [];
        steps = [
            function() { step(randomMiddle() * size.width, -5, r90); },
            function() { step(randomMiddle() * size.width, size.height + 5, -r90); },
            function() { step(-5, randomMiddle() * size.height, 0); },
            function() { step(size.width + 5, randomMiddle() * size.height, r180); }
        ];
        if (size.width < 500) steps = steps.slice(0, 2);
        requestAnimationFrame(frame);
    }
    
    initCanvas();
    start();
    
    // 窗口大小改变时重新绘制
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
            if (window.innerWidth === size.width) return;
            size.width = window.innerWidth;
            size.height = window.innerHeight;
            initCanvas();
            start();
        }, 200);
    });
    
    // 主题切换时更新颜色
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.attributeName === 'data-color-mode') {
                start();
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true });
})();

// SafeGo 外链中转处理

(function() {
    const SAFEGO_CONFIG = {
        enableBase64: true,
        goPagePath: 'https://blog.2005815.xyz/go.html',
        domainWhitelist: ["moretti815.github.io", "github.com", "jsd.268682.xyz", "jsd.liiiu.cn", "www.kemiaosw.top", "blog.2005815.xyz"],
        ignoreAttrs: ["data-fancybox"],
        enableTargetBlank: true
    };
    
    function encodeSafeUrl(url) {
        if (!SAFEGO_CONFIG.enableBase64) {
            return encodeURIComponent(url);
        }
        
        // Base64 encode with URL safe characters
        const base64 = btoa(encodeURIComponent(url).replace(/%([0-9A-F]{2})/g,
            function(_, p1) { return String.fromCharCode('0x' + p1); }
        ));
        
        // Replace URL unsafe characters
        return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    
    function isExternalLink(href) {
        if (!href || href.startsWith('#') || href.startsWith('javascript:') || href.startsWith('mailto:') || href.startsWith('tel:')) {
            return false;
        }
        
        // Relative links
        if (href.startsWith('/') && !href.startsWith('//')) {
            return false;
        }
        
        try {
            const url = new URL(href, window.location.href);
            const currentHost = window.location.hostname;
            
            // Same domain
            if (url.hostname === currentHost) {
                return false;
            }
            
            // Check whitelist
            for (let i = 0; i < SAFEGO_CONFIG.domainWhitelist.length; i++) {
                if (url.hostname.includes(SAFEGO_CONFIG.domainWhitelist[i])) {
                    return false;
                }
            }
            
            return true;
        } catch (e) {
            return false;
        }
    }
    
    function hasIgnoreAttr(element) {
        for (let i = 0; i < SAFEGO_CONFIG.ignoreAttrs.length; i++) {
            if (element.hasAttribute(SAFEGO_CONFIG.ignoreAttrs[i])) {
                return true;
            }
        }
        return false;
    }
    
    function processLinks() {
        const links = document.querySelectorAll('a[href]');
        
        links.forEach(function(link) {
            // Skip already processed
            if (link.hasAttribute('data-safego-processed')) {
                return;
            }
            
            const href = link.getAttribute('href');
            
            // Skip if has ignore attribute
            if (hasIgnoreAttr(link)) {
                link.setAttribute('data-safego-processed', 'true');
                return;
            }
            
            // Check if external link
            if (isExternalLink(href)) {
                const encodedUrl = encodeSafeUrl(href);
                // 将来源页 URL 附加到 go 链接中，解决 noopener 导致 referrer 为空的问题
                const fromUrl = encodeURIComponent(window.location.href);
                const goUrl = SAFEGO_CONFIG.goPagePath + '?u=' + encodedUrl + '&from=' + fromUrl;
                
                link.setAttribute('href', goUrl);
                link.setAttribute('data-safego-processed', 'true');
                link.setAttribute('rel', 'external nofollow noopener noreferrer');
                
                if (SAFEGO_CONFIG.enableTargetBlank) {
                    link.setAttribute('target', '_blank');
                }
            }
        });
    }
    
    // Process on DOM ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', processLinks);
    } else {
        processLinks();
    }
    
    // Process dynamically added links
    const observer = new MutationObserver(function(mutations) {
        let shouldProcess = false;
        mutations.forEach(function(mutation) {
            if (mutation.type === 'childList') {
                mutation.addedNodes.forEach(function(node) {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        if (node.tagName === 'A' || node.querySelectorAll) {
                            shouldProcess = true;
                        }
                    }
                });
            }
        });
        
        if (shouldProcess) {
            processLinks();
        }
    });
    
    observer.observe(document.body, { childList: true, subtree: true });
})();

// Memos Timeline

const MEMOS_API_URL = 'https://mastodon-api.20050815.xyz/';
const MEMOS_API_TYPE = 'json';
const MEMOS_TIMELINE_ENABLED = true;
const MEMOS_TIMELINE_LIMIT = 5;
const MEMOS_PAGE_URL = 'https://blog.2005815.xyz/memos.html';

let memosCarouselInterval = null;
let currentMemoIndex = 0;
let publicMemos = [];

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatMemoContent(memo) {
    let text = memo.content || '';
    
    // Check for images in markdown format ![alt](url) or HTML <img> tags
    const hasMarkdownImage = /!\[.*?\]\(.*?\)/.test(text);
    const hasHtmlImage = /<img[^>]+src\s*=\s*["'][^"']+["'][^>]*>/i.test(text);
    
    // Replace markdown images with placeholder [📷]
    text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(match, alt, url) {
        return `<span class="memos-img-placeholder">📷</span>`;
    });
    
    // Replace HTML img tags with placeholder
    text = text.replace(/<img[^>]+src\s*=\s*["']([^"']+)["'][^>]*>/gi, function(match, url) {
        return `<span class="memos-img-placeholder">📷</span>`;
    });
    
    // Strip remaining HTML tags
    text = text.replace(/<[^>]*>/g, '');
    
    // Handle regular markdown links [text](url) - keep the text
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1');
    
    // Truncate text
    if (text.length > 60) {
        text = text.substring(0, 60) + '...';
    }
    
    // Check for resources (attachments)
    const hasResourceImage = memo.resources && memo.resources.some(r => r.type && r.type.startsWith('image/'));
    
    const hasImage = hasMarkdownImage || hasHtmlImage || hasResourceImage;
    
    return {
        text: text,
        hasImage: hasImage
    };
}

function renderMemoItem(memo, index) {
    const contentEl = document.getElementById('memos-timeline-content');
    const formatted = formatMemoContent(memo);
    
    contentEl.innerHTML = `
        <span class="memos-item memos-item-slide" style="animation: memos-slideIn 0.5s ease;">
            <span class="memos-item-text">${formatted.text}</span>
            ${formatted.hasImage ? '<span class="memos-item-image"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>图片</span>' : ''}
        </span>
    `;
}

function startCarousel() {
    if (publicMemos.length <= 1) return;
    
    if (memosCarouselInterval) {
        clearInterval(memosCarouselInterval);
    }
    
    memosCarouselInterval = setInterval(() => {
        currentMemoIndex = (currentMemoIndex + 1) % publicMemos.length;
        renderMemoItem(publicMemos[currentMemoIndex], currentMemoIndex);
    }, 4000); // 每4秒切换
}

async function loadMemosTimeline() {
    const container = document.getElementById('memos-timeline');
    const contentEl = document.getElementById('memos-timeline-content');
    
    if (!container || !contentEl) return;
    
    // Check if timeline is enabled
    if (!MEMOS_TIMELINE_ENABLED) {
        container.style.display = 'none';
        return;
    }
    
    try {
        const response = await fetch(`${MEMOS_API_URL}?limit=${MEMOS_TIMELINE_LIMIT}&_t=${Date.now()}`);
        if (!response.ok) throw new Error('Failed to fetch');
        
        // Parse data based on API type
        let memos = [];
        
        if (MEMOS_API_TYPE === 'memos') {
            const data = await response.json();
            memos = data.memos || [];
            // Filter only public memos
            publicMemos = memos.filter(m => m.visibility === 'PUBLIC');
        } else if (MEMOS_API_TYPE === 'json') {
            // TGTalk or Mastodon format
            const data = await response.json();
            if (data.success && data.data) {
                // Check if it's Mastodon format (has id, text, image fields)
                if (data.data.length > 0 && data.data[0].id && data.data[0].time) {
                    publicMemos = transformMastodonForTimeline(data.data);
                } else {
                    publicMemos = transformTGTalkForTimeline(data.data);
                }
            }
        } else if (MEMOS_API_TYPE === 'rss') {
            // Jike RSS format
            const rssText = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(rssText, 'text/xml');
            const items = xmlDoc.querySelectorAll('item');
            publicMemos = transformJikeForTimeline(items);
        }
        
        if (publicMemos.length === 0) {
            contentEl.innerHTML = '<span class="memos-loading">暂无动态</span>';
            return;
        }
        
        // Display first memo
        currentMemoIndex = 0;
        renderMemoItem(publicMemos[0], 0);
        
        // Start carousel
        startCarousel();
        
        // Click to navigate
        container.addEventListener('click', () => {
            window.location.href = MEMOS_PAGE_URL;
        });
        
        // Pause on hover
        container.addEventListener('mouseenter', () => {
            if (memosCarouselInterval) {
                clearInterval(memosCarouselInterval);
                memosCarouselInterval = null;
            }
        });
        
        container.addEventListener('mouseleave', () => {
            startCarousel();
        });
        
    } catch (error) {
        console.error('Failed to load memos:', error);
        contentEl.innerHTML = '<span class="memos-loading">加载失败</span>';
    }
}

// Transform Mastodon data for timeline
function transformMastodonForTimeline(data) {
    return data.slice(0, MEMOS_TIMELINE_LIMIT).map(item => {
        let text = item.text || '';
        
        // Remove HTML tags for display
        text = text.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
        
        // Truncate text
        if (text.length > 60) {
            text = text.substring(0, 60) + '...';
        }
        
        // Check for images
        const hasImage = item.image && item.image.length > 0;
        
        return {
            content: text,
            resources: hasImage ? [{ type: 'image/jpeg' }] : []
        };
    });
}

// Transform TGTalk data for timeline
function transformTGTalkForTimeline(data) {
    return data.slice(0, MEMOS_TIMELINE_LIMIT).map(item => {
        let text = item.text || '';
        
        // Remove HTML tags for display
        text = text.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
        
        // Truncate text
        if (text.length > 60) {
            text = text.substring(0, 60) + '...';
        }
        
        // Check for images
        const hasImage = item.image && item.image.some(img => 
            img && !img.includes('telegram.org/img/emoji')
        );
        
        return {
            content: text,
            resources: hasImage ? [{ type: 'image/jpeg' }] : []
        };
    });
}

// Transform Jike RSS data for timeline
function transformJikeForTimeline(items) {
    const result = [];
    let count = 0;
    items.forEach(item => {
        if (count >= MEMOS_TIMELINE_LIMIT) return;
        
        const description = item.querySelector('description')?.textContent || '';
        
        // Parse HTML description
        const parser = new DOMParser();
        const doc = parser.parseFromString(description, 'text/html');
        
        // Check for images
        const hasImage = doc.querySelector('img') !== null;
        
        // Get text content
        let text = doc.body.textContent || description;
        text = text.replace(/<[^>]+>/g, '').trim();
        
        // Truncate text
        if (text.length > 60) {
            text = text.substring(0, 60) + '...';
        }
        
        result.push({
            content: text,
            resources: hasImage ? [{ type: 'image/jpeg' }] : []
        });
        count++;
    });
    return result;
}

// Initialize
document.addEventListener('DOMContentLoaded', loadMemosTimeline);
