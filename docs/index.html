var utterancesLoad=0;

let themeSettings={
    "dark": ["dark","moon","#00f0ff","dark-blue"],
    "light": ["light","sun","#ff5000","github-light"],
    "auto": ["auto","sync","","preferred-color-scheme"]
};

// 当前主题模式：light / dark / auto
let currentThemeMode = theme;

// 系统主题监听器
let systemThemeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
let systemThemeListener = null;

function getSystemTheme() {
    return systemThemeMediaQuery.matches ? 'dark' : 'light';
}

function startSystemThemeListener() {
    // 移除旧的监听器
    if (systemThemeListener) {
        systemThemeMediaQuery.removeEventListener('change', systemThemeListener);
    }
    // 添加新的监听器
    systemThemeListener = (e) => {
        let newSystemTheme = e.matches ? 'dark' : 'light';
        document.documentElement.setAttribute("data-color-mode", newSystemTheme);
        // 更新图标
        if (themeSettings[newSystemTheme]) {
            let icon = themeSettings[newSystemTheme][1];
            let color = themeSettings[newSystemTheme][2];
            document.getElementById("themeSwitch").setAttribute("d", IconList[icon]);
            document.getElementById("themeSwitch").parentNode.style.color = color;
        }
    };
    systemThemeMediaQuery.addEventListener('change', systemThemeListener);
}

function stopSystemThemeListener() {
    if (systemThemeListener) {
        systemThemeMediaQuery.removeEventListener('change', systemThemeListener);
        systemThemeListener = null;
    }
}

function applyTheme(mode) {
    // 应用主题设置，更新图标和颜色
    if (themeSettings[mode]) {
        let icon = themeSettings[mode][1];
        let color = themeSettings[mode][2];
        document.getElementById("themeSwitch").setAttribute("d", IconList[icon]);
        document.getElementById("themeSwitch").parentNode.style.color = color;
    }
}

function changeTheme(mode, icon, color, utheme){
    document.documentElement.setAttribute("data-color-mode", mode);
    document.getElementById("themeSwitch").setAttribute("d", value=IconList[icon]);
    document.getElementById("themeSwitch").parentNode.style.color = color;
    if(utterancesLoad==1){utterancesTheme(utheme);}
}

function modeSwitch(){
    let newMode;
    
    // 循环：light -> dark -> auto -> light
    if (currentThemeMode === "light") {
        newMode = "dark";
    } else if (currentThemeMode === "dark") {
        newMode = "auto";
    } else {
        newMode = "light";
    }
    
    // 更新当前模式
    currentThemeMode = newMode;
    localStorage.setItem("meek_theme", newMode);
    
    if (newMode === "auto") {
        // 切换到 auto 模式，立即应用当前系统主题
        stopSystemThemeListener();
        let systemTheme = getSystemTheme();
        document.documentElement.setAttribute("data-color-mode", systemTheme);
        applyTheme("auto");
        startSystemThemeListener();
    } else if (themeSettings[newMode]) {
        stopSystemThemeListener();
        changeTheme(...themeSettings[newMode]);
    }
}

function utterancesTheme(theme){
    const message={type:'set-theme',theme: theme};
    const iframe=document.getElementsByClassName('utterances-frame')[0];
    iframe.contentWindow.postMessage(message,'https://utteranc.es');
}

// 初始化主题
if (theme === "auto") {
    // 如果是 auto 模式，应用当前系统主题并启动监听
    let systemTheme = getSystemTheme();
    document.documentElement.setAttribute("data-color-mode", systemTheme);
    applyTheme("auto");
    startSystemThemeListener();
} else if (themeSettings[theme]) {
    changeTheme(...themeSettings[theme]);
}

// 加载动画控制
(function() {
    const preloader = document.getElementById('preloader');
    if (!preloader) return;
    
    // 最小显示时间（毫秒）- 确保动画至少显示一段时间，避免闪烁
    const minDisplayTime = 500;
    const startTime = Date.now();
    
    function hidePreloader() {
        const elapsedTime = Date.now() - startTime;
        const remainingTime = Math.max(0, minDisplayTime - elapsedTime);
        
        setTimeout(function() {
            preloader.classList.add('hidden');
            
            // 动画完全结束后移除元素
            setTimeout(function() {
                if (preloader.parentNode) {
                    preloader.parentNode.removeChild(preloader);
                }
            }, 500); // 与 CSS transition 时间一致
        }, remainingTime);
    }
    
    // 页面加载完成后隐藏动画
    if (document.readyState === 'complete') {
        hidePreloader();
    } else {
        window.addEventListener('load', hidePreloader);
    }
})();

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatMemoContent(memo) {
    let text = memo.content || '';
    
    // Strip HTML tags and markdown
    text = text.replace(/<[^>]*>/g, '').replace(/!\[.*?\]\(.*?\)/g, '[图片]').replace(/\[.*?\]\(.*?\)/g, '$1');
    
    // Truncate text
    if (text.length > 60) {
        text = text.substring(0, 60) + '...';
    }
    
    const hasImage = memo.resources && memo.resources.some(r => r.type && r.type.startsWith('image/'));
    
    return {
        text: escapeHtml(text),
        hasImage: hasImage
    };
}

        <span class="memos-item memos-item-slide" style="animation: memos-slideIn 0.5s ease;">
            <span class="memos-item-text">${formatted.text}</span>
            ${formatted.hasImage ? '<span class="memos-item-image"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>图片</span>' : ''}
        </span>
    `;
}

function startCarousel() {
    if (publicMemos.length <= 1) return;
    
    if (memosCarouselInterval) {
        clearInterval(memosCarouselInterval);
    }
    
    memosCarouselInterval = setInterval(() => {
        currentMemoIndex = (currentMemoIndex + 1) % publicMemos.length;
        renderMemoItem(publicMemos[currentMemoIndex], currentMemoIndex);
    }, 4000); // 每4秒切换
}

async function loadMemosTimeline() {
    const container = document.getElementById('memos-timeline');
    const contentEl = document.getElementById('memos-timeline-content');
    
    if (!container || !contentEl) return;
    
    try {
        const response = await fetch(`${MEMOS_API_URL}?limit=5&_t=${Date.now()}`);
        if (!response.ok) throw new Error('Failed to fetch');
        
        const data = await response.json();
        const memos = data.memos || [];
        
        if (memos.length === 0) {
            contentEl.innerHTML = '<span class="memos-loading">暂无动态</span>';
            return;
        }
        
        // Filter only public memos
        publicMemos = memos.filter(m => m.visibility === 'PUBLIC');
        
        if (publicMemos.length === 0) {
            contentEl.innerHTML = '<span class="memos-loading">暂无公开动态</span>';
            return;
        }
        
        // Display first memo
        currentMemoIndex = 0;
        renderMemoItem(publicMemos[0], 0);
        
        // Start carousel
        startCarousel();
        
        // Click to navigate
        container.addEventListener('click', () => {
            window.location.href = MEMOS_PAGE_URL;
        });
        
        // Pause on hover
        container.addEventListener('mouseenter', () => {
            if (memosCarouselInterval) {
                clearInterval(memosCarouselInterval);
                memosCarouselInterval = null;
            }
        });
        
        container.addEventListener('mouseleave', () => {
            startCarousel();
        });
        
    } catch (error) {
        console.error('Failed to load memos:', error);
        contentEl.innerHTML = '<span class="memos-loading">加载失败</span>';
    }
}

// Initialize
document.addEventListener('DOMContentLoaded', loadMemosTimeline);
</script>


</html>
