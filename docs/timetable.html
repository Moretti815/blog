        // 获取系统主题偏好
        function getSystemTheme() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        
        // 初始化主题：优先使用 localStorage，否则跟随系统
        let savedTheme = localStorage.getItem("meek_theme");
        let theme;
        if (savedTheme === null) {
            // 第一次访问，跟随系统
            theme = getSystemTheme();
            localStorage.setItem("meek_theme", theme);
        } else {
            theme = savedTheme;
        }
        document.documentElement.setAttribute("data-color-mode", theme);
    </script>

<body><!-- 访客欢迎通知组件 -->
<script>
(function() {
    const VISIT_KEY = 'blog_welcome_shown';
    const VISIT_EXPIRY_KEY = 'blog_welcome_expiry';
    // 24小时的毫秒数
    const EXPIRY_TIME = 24 * 60 * 60 * 1000;
    let hasShownToast = false;
    
    function createWelcomeToast() {
        const toast = document.createElement('div');
        toast.id = 'welcome-toast';
        toast.className = 'welcome-toast';
        toast.innerHTML = `
            <div class="welcome-toast-inner">
                <div class="welcome-toast-content">
                    <div class="welcome-toast-icon">👋</div>
                    <div class="welcome-toast-body">
                        <p id="welcome-message" class="welcome-toast-title">正在加载...</p>
                        <p id="welcome-stats" class="welcome-toast-stats"></p>
                        <p class="welcome-toast-quote">在茫茫互联网的大海中 感谢遇见你🙏</p>
                        <div class="welcome-toast-links">
                            <a href="https://t.me/kemiaochat" target="_blank" rel="noopener noreferrer" class="welcome-toast-link welcome-toast-link-blue">
                                👆加群
                            </a>
                            <span class="welcome-toast-divider">|</span>
                            <a href="https://github.com/moretti815/blog/issues/2" class="welcome-toast-link welcome-toast-link-green">
                                📬订阅更新
                            </a>
                            <span class="welcome-toast-divider">|</span>
                            <a href="javascript:void(0)" onclick="copyRssLink()" class="welcome-toast-link welcome-toast-link-orange">
                                📋RSS
                            </a>
                        </div>
                        <p id="rss-copy-msg" class="welcome-toast-copy-msg hidden">已复制到剪贴板~</p>
                    </div>
                    <button onclick="closeWelcomeToast()" class="welcome-toast-close" aria-label="关闭">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(toast);
        return toast;
    }
    
    window.closeWelcomeToast = function() {
        const toast = document.getElementById('welcome-toast');
        if (toast) {
            toast.classList.remove('show');
            setTimeout(() => {
                toast.remove();
            }, 500);
        }
    };
    
    window.copyRssLink = async function() {
        const msg = document.getElementById('rss-copy-msg');
        const rssUrl = window.location.origin + '/rss.xml';
        try {
            await navigator.clipboard.writeText(rssUrl);
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 2000);
        } catch (e) {
            const input = document.createElement('input');
            input.value = rssUrl;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 2000);
        }
    };
    
    async function fetchLocation() {
        try {
            const response = await fetch('https://v2.xxapi.cn/api/ip');
            const data = await response.json();
            
            if (data.code === 200 && data.data) {
                const location = data.data;
                const locationText = `HI 来自${location.address}的朋友`;
                
                const messageEl = document.getElementById('welcome-message');
                if (messageEl) {
                    messageEl.textContent = locationText;
                }
            }
        } catch (error) {
            console.error('Failed to fetch location:', error);
            const messageEl = document.getElementById('welcome-message');
            if (messageEl) {
                messageEl.textContent = 'HI 来自远方的朋友';
            }
        }
    }
    
    async function fetchStats() {
        // 等待 Vercount 脚本加载完成
        let attempts = 0;
        const maxAttempts = 30; // 最多等待3秒
        
        while (attempts < maxAttempts) {
            const sitePvEl = document.getElementById('busuanzi_value_site_pv');
            if (sitePvEl && sitePvEl.textContent) {
                const pageviews = sitePvEl.textContent.trim();
                const statsText = `欢迎 我是 Moretti 你是本站迎来的第${pageviews}次访问`;
                
                const statsEl = document.getElementById('welcome-stats');
                if (statsEl) {
                    statsEl.textContent = statsText;
                }
                return;
            }
            await new Promise(resolve => setTimeout(resolve, 100));
            attempts++;
        }
        
        // 超时后显示默认文本
        const statsEl = document.getElementById('welcome-stats');
        if (statsEl) {
            statsEl.textContent = '欢迎 我是 Moretti';
        }
    }
    
    async function showWelcomeToast() {
        if (hasShownToast) return;
        
        const toast = createWelcomeToast();
        
        // 强制重绘以确保过渡动画生效
        toast.offsetHeight;
        
        setTimeout(() => {
            toast.classList.add('show');
        }, 100);
        
        hasShownToast = true;
        
        await Promise.all([fetchLocation(), fetchStats()]);
        
        // 5秒后自动关闭
        setTimeout(() => {
            closeWelcomeToast();
        }, 5000);
    }
    
    function shouldShowWelcome() {
        const now = Date.now();
        const expiry = localStorage.getItem(VISIT_EXPIRY_KEY);
        
        // 如果存在过期时间且未过期，则不显示
        if (expiry && now < parseInt(expiry)) {
            return false;
        }
        
        // 如果已过期或不存在，清除旧数据
        localStorage.removeItem(VISIT_KEY);
        localStorage.removeItem(VISIT_EXPIRY_KEY);
        return true;
    }
    
    function markAsVisited() {
        const now = Date.now();
        localStorage.setItem(VISIT_KEY, 'true');
        localStorage.setItem(VISIT_EXPIRY_KEY, (now + EXPIRY_TIME).toString());
    }
    
    // 等待页面加载完成后再显示
    function init() {
        if (shouldShowWelcome()) {
            markAsVisited();
            // 延迟显示，等待页面其他元素加载
            setTimeout(() => {
                showWelcomeToast();
            }, 1000);
        }
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>

<script>
(function() {
    // 回到顶部功能
    function backToTop() {
        window.scroll({ top: 0, behavior: 'smooth' });
    }

    // 滚动监听，控制按钮显示/隐藏
    function handleScroll() {
        const wrapper = document.getElementById('back-to-top-wrapper');
        if (!wrapper) return;

        // 当滚动超过 300px 时显示按钮
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        if (scrollTop > 300) {
            wrapper.classList.add('visible');
        } else {
            wrapper.classList.remove('visible');
        }
    }

    // 节流函数，优化性能
    function throttle(func, limit) {
        let inThrottle;
        return function() {
            const args = arguments;
            const context = this;
            if (!inThrottle) {
                func.apply(context, args);
                inThrottle = true;
                setTimeout(function() {
                    inThrottle = false;
                }, limit);
            }
        };
    }

    // 绑定滚动事件（节流处理，每 100ms 执行一次）
    window.addEventListener('scroll', throttle(handleScroll, 100));

    // 初始化一次
    handleScroll();

    // 暴露到全局
    window.backToTop = backToTop;
})();

// 树枝背景动画 - 参考 BackgrounRandom.astro
(function() {
    const canvas = document.getElementById('branch-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    
    const r180 = Math.PI;
    const r90 = Math.PI / 2;
    const r15 = Math.PI / 12;
    const MIN_BRANCH = 30;
    const len = 6;
    
    let steps = [];
    let prevSteps = [];
    let size = { width: window.innerWidth, height: window.innerHeight };
    
    function randomMiddle() {
        return Math.random() * 0.6 + 0.2;
    }
    
    function initCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = size.width + 'px';
        canvas.style.height = size.height + 'px';
        canvas.width = dpr * size.width;
        canvas.height = dpr * size.height;
        ctx.scale(dpr, dpr);
    }
    
    function polar2cart(x, y, r, theta) {
        const dx = r * Math.cos(theta);
        const dy = r * Math.sin(theta);
        return [x + dx, y + dy];
    }
    
    function step(x, y, rad, counter) {
        counter = counter || { value: 0 };
        const length = Math.random() * len;
        counter.value += 1;
        
        const [nx, ny] = polar2cart(x, y, length, rad);
        
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(nx, ny);
        ctx.stroke();
        
        const rad1 = rad + Math.random() * r15;
        const rad2 = rad - Math.random() * r15;
        
        if (nx < -100 || nx > size.width + 100 || ny < -100 || ny > size.height + 100) return;
        
        const rate = counter.value <= MIN_BRANCH ? 0.8 : 0.5;
        
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad1, counter); });
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad2, counter); });
    }
    
    function frame() {
        prevSteps = steps;
        steps = [];
        
        if (!prevSteps.length) return;
        
        prevSteps.forEach(function(i) {
            if (Math.random() < 0.5) steps.push(i);
            else i();
        });
        
        requestAnimationFrame(frame);
    }
    
    function getBranchColor() {
        const isDark = document.documentElement.getAttribute('data-color-mode') === 'dark';
        // 使用 CSS 变量获取主题色，适配明暗模式
        const style = getComputedStyle(document.documentElement);
        const accent = style.getPropertyValue('--color-accent-fg').trim() || (isDark ? '#58a6ff' : '#0969da');
        // 解析 HSL 并降低透明度
        if (accent.startsWith('#')) {
            const r = parseInt(accent.slice(1, 3), 16);
            const g = parseInt(accent.slice(3, 5), 16);
            const b = parseInt(accent.slice(5, 7), 16);
            return 'rgba(' + r + ', ' + g + ', ' + b + ', 0.12)';
        }
        return isDark ? 'rgba(88, 166, 255, 0.12)' : 'rgba(9, 105, 218, 0.12)';
    }
    
    function start() {
        const color = getBranchColor();
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 1;
        ctx.strokeStyle = color;
        prevSteps = [];
        steps = [
            function() { step(randomMiddle() * size.width, -5, r90); },
            function() { step(randomMiddle() * size.width, size.height + 5, -r90); },
            function() { step(-5, randomMiddle() * size.height, 0); },
            function() { step(size.width + 5, randomMiddle() * size.height, r180); }
        ];
        if (size.width < 500) steps = steps.slice(0, 2);
        requestAnimationFrame(frame);
    }
    
    initCanvas();
    start();
    
    // 窗口大小改变时重新绘制
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
            if (window.innerWidth === size.width) return;
            size.width = window.innerWidth;
            size.height = window.innerHeight;
            initCanvas();
            start();
        }, 200);
    });
    
    // 主题切换时更新颜色
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.attributeName === 'data-color-mode') {
                start();
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true });
})();

        }
        
        try {
            const url = new URL(href, window.location.href);
            const currentHost = window.location.hostname;
            
            // Same domain
            if (url.hostname === currentHost) {
                return false;
            }
            
            // Check whitelist
            for (let i = 0; i < SAFEGO_CONFIG.domainWhitelist.length; i++) {
                if (url.hostname.includes(SAFEGO_CONFIG.domainWhitelist[i])) {
                    return false;
                }
            }
            
            return true;
        } catch (e) {
            return false;
        }
    }
    
    function hasIgnoreAttr(element) {
        for (let i = 0; i < SAFEGO_CONFIG.ignoreAttrs.length; i++) {
            if (element.hasAttribute(SAFEGO_CONFIG.ignoreAttrs[i])) {
                return true;
            }
        }
        return false;
    }
    
    function processLinks() {
        const links = document.querySelectorAll('a[href]');
        
        links.forEach(function(link) {
            // Skip already processed
            if (link.hasAttribute('data-safego-processed')) {
                return;
            }
            
            const href = link.getAttribute('href');
            
            // Skip if has ignore attribute
            if (hasIgnoreAttr(link)) {
                link.setAttribute('data-safego-processed', 'true');
                return;
            }
            
            // Check if external link
            if (isExternalLink(href)) {
                const encodedUrl = encodeSafeUrl(href);
                // 将来源页 URL 附加到 go 链接中，解决 noopener 导致 referrer 为空的问题
                const fromUrl = encodeURIComponent(window.location.href);
                const goUrl = SAFEGO_CONFIG.goPagePath + '?u=' + encodedUrl + '&from=' + fromUrl;
                
                link.setAttribute('href', goUrl);
                link.setAttribute('data-safego-processed', 'true');
                link.setAttribute('rel', 'external nofollow noopener noreferrer');
                
                if (SAFEGO_CONFIG.enableTargetBlank) {
                    link.setAttribute('target', '_blank');
                }
            }
        });
    }
    
    // Process on DOM ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', processLinks);
    } else {
        processLinks();
    }
    
    // Process dynamically added links
    const observer = new MutationObserver(function(mutations) {
        let shouldProcess = false;
        mutations.forEach(function(mutation) {
            if (mutation.type === 'childList') {
                mutation.addedNodes.forEach(function(node) {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        if (node.tagName === 'A' || node.querySelectorAll) {
                            shouldProcess = true;
                        }
                    }
                });
            }
        });
        
        if (shouldProcess) {
            processLinks();
        }
    });
    
    observer.observe(document.body, { childList: true, subtree: true });
})();

</script>

<script>
// Timetable Data URL
const TIMETABLE_DATA_URL = 'https://blog.2005815.xyz/%E5%A4%A7%E4%B8%89%E4%B8%8B.json';

// State
let timetableData = null;
let currentWeek = 1;
let maxWeek = 1;
let actualCurrentWeek = 1;

// Weekday labels
const WEEKDAY_LABELS = {
    1: '周一',
    2: '周二',
    3: '周三',
    4: '周四',
    5: '周五',
    6: '周六',
    7: '周日'
};

// Initialize
document.addEventListener('DOMContentLoaded', initTimetable);

// Set header icons
document.getElementById("pathHome").setAttribute("d", IconList["home"]);
document.getElementById("themeSwitch").setAttribute("d", IconList["sun"]);

async function initTimetable() {
    try {
        const response = await fetch(TIMETABLE_DATA_URL + '?_t=' + Date.now());
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        timetableData = await response.json();
        
        // Calculate current week
        actualCurrentWeek = resolveCurrentWeek(timetableData.settings.startDate, timetableData.settings.maxWeek);
        maxWeek = timetableData.settings.maxWeek;
        
        // Get week from URL
        const urlParams = new URLSearchParams(window.location.search);
        const requestedWeek = parseInt(urlParams.get('week'));
        if (requestedWeek && requestedWeek >= 1 && requestedWeek <= maxWeek) {
            currentWeek = requestedWeek;
        } else {
            currentWeek = actualCurrentWeek;
        }
        
        renderTimetable();
    } catch (error) {
        console.error('Failed to load timetable:', error);
        document.getElementById('timetable-desktop').innerHTML = `
            <div class="timetable-error">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M12.884 2.532c-.346-.654-1.422-.654-1.768 0l-9 17A1 1 0 0 0 3 21h18a.998.998 0 0 0 .883-1.467zM13 18h-2v-2h2zm-2-4V9h2l.001 5z"/>
                </svg>
                <p>加载课程表失败</p>
            </div>
        `;
    }
}

function resolveCurrentWeek(startDateText, maxWeek) {
    const startDate = parseDate(startDateText);
    if (!startDate) return 1;
    
    const now = new Date();
    const msPerDay = 24 * 60 * 60 * 1000;
    const diffDays = Math.floor((now.getTime() - startDate.getTime()) / msPerDay);
    const week = Math.floor(diffDays / 7) + 1;
    
    if (week < 1) return 1;
    if (week > maxWeek) return maxWeek;
    return week;
}

function parseDate(ymd) {
    const parts = ymd.split('-').map(Number);
    if (parts.length !== 3 || parts.some(isNaN)) return null;
    return new Date(parts[0], parts[1] - 1, parts[2]);
}

function shouldShowWeekend(week) {
    const weekendConfig = timetableData.settings.weekendDisplay;
    if (!weekendConfig || !weekendConfig.enabled) {
        return {
            showSat: timetableData.settings.showSat,
            showSun: timetableData.settings.showSun
        };
    }
    
    const showSat = weekendConfig.weeks.includes(week) && weekendConfig.days.includes('sat');
    const showSun = weekendConfig.weeks.includes(week) && weekendConfig.days.includes('sun');
    
    return { showSat, showSun };
}

function renderTimetable() {
    if (!timetableData) return;
    
    const settings = timetableData.settings;
    const { showSat, showSun } = shouldShowWeekend(currentWeek);
    
    // Update header info
    document.getElementById('table-name').textContent = settings.tableName || '课程表';
    document.getElementById('max-week').textContent = '共 ' + maxWeek + ' 周';
    document.getElementById('week-display').textContent = '第 ' + currentWeek;
    
    // Update current week badge
    const badge = document.getElementById('current-week-badge');
    if (currentWeek === actualCurrentWeek) {
        badge.style.display = 'inline-flex';
    } else {
        badge.style.display = 'none';
    }
    
    // Update navigation buttons
    document.getElementById('prev-week').disabled = currentWeek <= 1;
    document.getElementById('next-week').disabled = currentWeek >= maxWeek;
    
    // Build day columns
    const dayColumns = [
        { day: 1, label: WEEKDAY_LABELS[1] },
        { day: 2, label: WEEKDAY_LABELS[2] },
        { day: 3, label: WEEKDAY_LABELS[3] },
        { day: 4, label: WEEKDAY_LABELS[4] },
        { day: 5, label: WEEKDAY_LABELS[5] }
    ];
    if (showSat) dayColumns.push({ day: 6, label: WEEKDAY_LABELS[6] });
    if (showSun) dayColumns.push({ day: 7, label: WEEKDAY_LABELS[7] });
    
    // Build node rows (show every 2 nodes)
    const nodeRows = timetableData.timeTable
        .filter(item => item.node % 2 === 1)
        .map(item => ({
            node: item.node,
            startTime: item.startTime,
            endTime: timetableData.timeTable.find(n => n.node === Math.min(item.node + 1, timetableData.timeTable.length))?.endTime || item.endTime
        }));
    
    // Build course map
    const courseMap = new Map(timetableData.courses.map(c => [c.id, c]));
    
    // Group courses by day
    const coursesByDay = {};
    dayColumns.forEach(col => coursesByDay[col.day] = []);
    
    timetableData.schedules.forEach(schedule => {
        if (schedule.day < 1 || schedule.day > 7) return;
        if (currentWeek < schedule.startWeek || currentWeek > schedule.endWeek) return;
        if (!(schedule.day in coursesByDay)) return;
        
        const course = courseMap.get(schedule.id);
        const courseName = course?.courseName || '未知课程 #' + schedule.id;
        const color = parseColor(course?.color) || generateColor(courseName, schedule.id);
        
        coursesByDay[schedule.day].push({
            ...schedule,
            courseName,
            color,
            endNode: Math.min(schedule.startNode + schedule.step - 1, timetableData.timeTable.length)
        });
    });
    
    // Sort courses by start node
    Object.keys(coursesByDay).forEach(day => {
        coursesByDay[day].sort((a, b) => a.startNode - b.startNode);
    });
    
    // Render desktop table
    renderDesktopTable(dayColumns, nodeRows, coursesByDay);
    
    // Render mobile cards
    renderMobileCards(dayColumns, coursesByDay, nodeRows);
    
    // Update URL
    updateUrl();
}

function renderDesktopTable(dayColumns, nodeRows, coursesByDay) {
    const headerRow = document.getElementById('table-header');
    headerRow.innerHTML = '<th>节次</th>';
    dayColumns.forEach(day => {
        headerRow.innerHTML += `<th>${day.label}</th>`;
    });
    
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    
    nodeRows.forEach(row => {
        const tr = document.createElement('tr');
        
        // Node cell
        tr.innerHTML = `
            <td class="node-cell">
                <div class="node-info">
                    <div class="node-number">第 ${row.node}-${Math.min(row.node + 1, row.node + 1)}</div>
                    <div class="node-time">${row.startTime} - ${row.endTime}</div>
                </div>
            </td>
        `;
        
        // Day cells
        dayColumns.forEach(day => {
            // 修改过滤逻辑：显示在当前行范围内的课程
            const courses = coursesByDay[day.day].filter(c => {
                const courseStart = c.startNode;
                const courseEnd = c.endNode || courseStart;
                const rowStart = row.node;
                const rowEnd = row.node + 1;
                // 课程与当前行有重叠
                return courseStart <= rowEnd && courseEnd >= rowStart;
            });
            let cellHtml = '';
            
            if (courses.length > 0) {
                courses.forEach(course => {
                    // 计算课程跨越的节数
                    const step = course.step || 1;
                    const isStartRow = course.startNode === row.node || (course.startNode % 2 === 0 && course.startNode === row.node - 1);
                    
                    cellHtml += `
                        <div class="course-card" style="border-color: ${course.color}; background: color-mix(in srgb, ${course.color} 10%, var(--color-canvas-subtle)); ${step > 2 ? 'min-height: 80px;' : ''}">
                            <div class="course-name">${escapeHtml(course.courseName)} ${step > 2 ? '<span style="font-size: 11px; opacity: 0.8;">(' + course.startNode + '-' + course.endNode + '节)</span>' : ''}</div>
                            <div class="course-details">
                                <div>${course.startWeek}-${course.endWeek} 周</div>
                                <div>教室: ${escapeHtml(course.room || '未填写')}</div>
                                <div>教师: ${escapeHtml(course.teacher || '未填写')}</div>
                            </div>
                        </div>
                    `;
                });
            } else {
                cellHtml = '<div class="empty-cell">—</div>';
            }
            
            tr.innerHTML += `<td>${cellHtml}</td>`;
        });
        
        tbody.appendChild(tr);
    });
}

function renderMobileCards(dayColumns, coursesByDay, nodeRows) {
    const container = document.getElementById('timetable-mobile');
    container.innerHTML = '';
    
    dayColumns.forEach(day => {
        const courses = coursesByDay[day.day];
        
        const dayCard = document.createElement('div');
        dayCard.className = 'day-card';
        
        let contentHtml = `
            <div class="day-card-header">
                <h3 class="day-card-title">${day.label}</h3>
            </div>
            <div class="day-card-content">
        `;
        
        if (courses.length > 0) {
            courses.forEach(course => {
                // 计算课程的实际结束时间
                const step = course.step || 1;
                const endNode = course.endNode || course.startNode;
                const startNodeInfo = nodeRows.find(n => n.node === course.startNode);
                const endNodeInfo = nodeRows.find(n => n.node === endNode) || startNodeInfo;
                const timeText = startNodeInfo && endNodeInfo 
                    ? `${startNodeInfo.startTime} - ${endNodeInfo.endTime}` 
                    : '';
                
                contentHtml += `
                    <div class="mobile-course-card" style="border-color: ${course.color}; background: color-mix(in srgb, ${course.color} 10%, var(--color-canvas-subtle))">
                        <div class="mobile-course-name">${escapeHtml(course.courseName)} ${step > 2 ? '<span style="font-size: 12px; opacity: 0.8;">(' + course.startNode + '-' + endNode + '节)</span>' : ''}</div>
                        <div class="mobile-course-details">
                            <div>时间: ${timeText}</div>
                            <div>周: ${course.startWeek}-${course.endWeek}</div>
                            <div>教室: ${escapeHtml(course.room || '未填写')}</div>
                            <div>教师: ${escapeHtml(course.teacher || '未填写')}</div>
                        </div>
                    </div>
                `;
            });
        } else {
            contentHtml += '<div class="day-card-empty">本周暂无课程</div>';
        }
        
        contentHtml += '</div>';
        dayCard.innerHTML = contentHtml;
        container.appendChild(dayCard);
    });
}

function parseColor(raw) {
    if (!raw || !raw.startsWith('#') || raw.length !== 9) return null;
    const r = raw.slice(3, 5);
    const g = raw.slice(5, 7);
    const b = raw.slice(7, 9);
    return `#${r}${g}${b}`;
}

function generateColor(courseName, courseId) {
    const seed = hashText(`${courseName}-${courseId}`);
    const hue = seed % 360;
    return `hsl(${hue} 78% 68%)`;
}

function hashText(input) {
    let hash = 0;
    for (let i = 0; i < input.length; i++) {
        hash = (hash * 31 + input.charCodeAt(i)) | 0;
    }
    return Math.abs(hash);
}

function goToPreviousWeek() {
    if (currentWeek > 1) {
        currentWeek--;
        renderTimetable();
    }
}

function goToNextWeek() {
    if (currentWeek < maxWeek) {
        currentWeek++;
        renderTimetable();
    }
}

function updateUrl() {
    const url = new URL(window.location.href);
    url.searchParams.set('week', currentWeek);
    window.history.replaceState({}, '', url);
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
