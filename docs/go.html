        // 获取系统主题偏好
        function getSystemTheme() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        
        // 初始化主题：优先使用 localStorage，否则跟随系统
        let savedTheme = localStorage.getItem("meek_theme");
        let theme;
        if (savedTheme === null) {
            // 第一次访问，跟随系统
            theme = getSystemTheme();
            localStorage.setItem("meek_theme", theme);
        } else {
            theme = savedTheme;
        }
        document.documentElement.setAttribute("data-color-mode", theme);
    </script>

<style type="text/css">
/* 中转页专用样式 */
.go-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 200px);
    padding: 20px;
    flex-direction: column;
}

.go-avatar-placeholder,
.go-avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    margin-bottom: 16px;
    display: block;
}

.go-avatar {

}

.go-avatar-placeholder {

}

}

}

.go-loading {
    position: relative;
    text-align: center;
    padding: 28px;
    border-radius: 26px;

}

.go-loading:hover {
    box-shadow: 0 22px 46px rgba(0, 0, 0, 0.28);
}

@keyframes go-fadein {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.go-content {
    margin-bottom: 18px;
}

.go-url-text {
    margin-bottom: 12px;
    font-size: 15px;
    letter-spacing: 0.4px;
    color: var(--color-fg-default, #efefef);
}

.go-jump-url {

    display: block;
    margin-top: 5px;
    margin-bottom: 22px;
    padding: 16px 68px 16px 16px;
    border-radius: 18px;
    min-height: 58px;
    text-align: left;

    line-height: 1.6;
    font-size: 15px;

.go-jump-url-text {

    word-break: break-all;
    overflow-wrap: anywhere;

    -webkit-line-clamp: 2;
}

.go-copy-btn-container {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
}

.go-copy-toast {
    position: absolute;
    top: -34px;
    right: 0;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(6px);
    pointer-events: none;

.go-button:hover {

.go-button:active {

.go-cancel-button {

<script>
(function() {
    // 配置
    const SAFEGO_CONFIG = {
        countdown: 5,
        enableBase64: true,
        avatar: 'https://jsd.268682.xyz/gh/Kemeow0815/img@main/img/kemiao.gif',
        urlParamName: 'u'
    };

    let countdown = SAFEGO_CONFIG.countdown;
    let jumpUrl = '';
    let countdownInterval = null;
    let copyToastTimer = null;

    // 获取 URL 参数
    function getQueryString(name) {
        var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
        var r = window.location.search.substr(1).match(reg);
        return r ? decodeURI(r[2]) : null;
    }

    // Base64 解码
    function decodeSafeUrl(paramStr) {
        if (!paramStr) return paramStr;
        var base64 = paramStr.replace(/-/g, "+").replace(/_/g, "/");
        var paddingLength = (4 - (base64.length % 4)) % 4;
        if (paddingLength) {
            base64 += "=".repeat(paddingLength);
        }
        return decodeURIComponent(atob(base64).split("").map(function (char) {
            return "%" + ("00" + char.charCodeAt(0).toString(16)).slice(-2);
        }).join(""));
    }

    // 加载头像
    function loadAvatar() {
        const avatarImg = document.getElementById('go-avatar');
        const placeholder = document.querySelector('.go-avatar-placeholder');
        if (!SAFEGO_CONFIG.avatar) {
            placeholder.style.display = 'none';
            return;
        }
        const img = new Image();
        img.onload = function() {
            avatarImg.src = SAFEGO_CONFIG.avatar;
            avatarImg.style.display = 'block';
            placeholder.style.display = 'none';
        };
        img.onerror = function() {
            placeholder.style.display = 'none';
        };
        img.src = SAFEGO_CONFIG.avatar;
    }

    // 更新复制提示
    function updateCopyToast(state, message) {
        const loadingEl = document.getElementById('go-loading');
        const toastEl = document.getElementById('go-copy-toast');
        if (!loadingEl || !toastEl) return;

        loadingEl.setAttribute('data-copy-state', state);
        toastEl.textContent = message;

        if (copyToastTimer) {
            clearTimeout(copyToastTimer);
        }
        if (state === 'success' || state === 'error') {
            copyToastTimer = setTimeout(function() {
                loadingEl.setAttribute('data-copy-state', 'idle');
            }, 1600);
        }
    }

    // 复制到剪贴板
    function goCopyToClipboard() {
        const urlText = document.getElementById('go-jump-url-text').textContent;
        if (!urlText) {
            updateCopyToast('error', 'Nothing to copy');
            return;
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(urlText).then(function() {
                updateCopyToast('success', 'Copied');
            }).catch(function() {
                fallbackCopy(urlText);
            });
        } else {
            fallbackCopy(urlText);
        }
    }

    // 备用复制方法
    function fallbackCopy(text) {
        const tempInput = document.createElement('input');
        tempInput.value = text;
        document.body.appendChild(tempInput);
        tempInput.select();
        tempInput.setSelectionRange(0, text.length);
        try {
            document.execCommand('copy');
            updateCopyToast('success', 'Copied');
        } catch (e) {
            updateCopyToast('error', 'Copy failed');
        }
        document.body.removeChild(tempInput);
    }

    // 更新倒计时
    function updateCountdown() {
        const countdownEl = document.getElementById('go-countdown');
        const progressEl = document.getElementById('go-progress');
        const countdownTextEl = document.getElementById('go-countdown-text');

        if (countdown < 0) {
            if (countdownTextEl) {
                countdownTextEl.innerHTML = '请自行确认链接安全后再继续跳转';
            }
            if (progressEl) {
                progressEl.style.width = '100%';
            }
            return;
        }

        if (countdownEl) {
            countdownEl.textContent = countdown;
        }
        if (progressEl && SAFEGO_CONFIG.countdown > 0) {
            progressEl.style.width = (countdown / SAFEGO_CONFIG.countdown * 100) + '%';
        }

        if (countdown === 0) {
            goJump();
        } else {
            countdown--;
        }
    }

    // 开始倒计时
    function startCountdown() {
        updateCountdown();
        countdownInterval = setInterval(updateCountdown, 1000);
    }

    // 跳转
    function goJump() {
        if (countdownInterval) {
            clearInterval(countdownInterval);
        }
        if (jumpUrl) {
            window.location.href = jumpUrl;
        }
    }

    // 返回
    function goBack() {
        if (countdownInterval) {
            clearInterval(countdownInterval);
        }
        // 优先使用 document.referrer 返回来源页面
        if (document.referrer && document.referrer !== window.location.href) {
            window.location.href = document.referrer;
        } else if (window.history.length > 1) {
            window.history.back();
        } else {
            window.location.href = 'https://moretti815.github.io/blog';
        }
    }

    // 初始化
    function init() {
        // 获取跳转链接
        jumpUrl = getQueryString(SAFEGO_CONFIG.urlParamName);

        if (SAFEGO_CONFIG.enableBase64 && jumpUrl) {
            try {
                jumpUrl = decodeSafeUrl(jumpUrl);
            } catch (e) {
                jumpUrl = null;
            }
        }

        // 验证 URL
        const urlReg = /^(http|https):\/\//i;
        if (!jumpUrl || !urlReg.test(jumpUrl)) {
            document.title = 'Invalid parameter';
            jumpUrl = 'https://moretti815.github.io/blog';
        }

        // 显示 URL
        document.getElementById('go-jump-url-text').textContent = jumpUrl;

        // 加载头像
        loadAvatar();

        // 等待加载动画完成后开始倒计时
        waitForPreloader();
    }

    // 等待加载动画
    function waitForPreloader() {
        const preloader = document.getElementById('preloader');

        // 如果没有加载动画或已隐藏，直接开始倒计时
        if (!preloader || preloader.classList.contains('hidden') || preloader.style.display === 'none') {
            startCountdown();
            return;
        }

        let countdownStarted = false;
        
        function startCountdownOnce() {
            if (!countdownStarted) {
                countdownStarted = true;
                startCountdown();
            }
        }

        // 监听加载动画隐藏（属性变化）
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.type === 'attributes') {
                    if (preloader.classList.contains('hidden') || preloader.style.display === 'none' || preloader.style.opacity === '0') {
                        observer.disconnect();
                        startCountdownOnce();
                    }
                }
            });
        });

        observer.observe(preloader, {
            attributes: true,
            attributeFilter: ['class', 'style']
        });

        // 监听加载动画被移除
        const parentObserver = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.type === 'childList') {
                    mutation.removedNodes.forEach(function(node) {
                        if (node.id === 'preloader') {
                            parentObserver.disconnect();
                            startCountdownOnce();
                        }
                    });
                }
            });
        });

        if (preloader.parentNode) {
            parentObserver.observe(preloader.parentNode, { childList: true });
        }

        // 备用方案：最多等待 2 秒
        setTimeout(function() {
            observer.disconnect();
            parentObserver.disconnect();
            startCountdownOnce();
        }, 2000);
    }

    // 页面加载完成后初始化
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

    // 暴露全局函数
    window.goJump = goJump;
    window.goBack = goBack;
    window.goCopyToClipboard = goCopyToClipboard;
})();
</script>

var utterancesLoad=0;

let themeSettings={
    "dark": ["dark","moon","#00f0ff","dark-blue"],
    "light": ["light","sun","#ff5000","github-light"],
    "auto": ["auto","sync","","preferred-color-scheme"]
};

// 当前主题模式：light / dark / auto
let currentThemeMode = theme;

// 系统主题监听器
let systemThemeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
let systemThemeListener = null;

function getSystemTheme() {
    return systemThemeMediaQuery.matches ? 'dark' : 'light';
}

function startSystemThemeListener() {
    // 移除旧的监听器
    if (systemThemeListener) {
        systemThemeMediaQuery.removeEventListener('change', systemThemeListener);
    }
    // 添加新的监听器
    systemThemeListener = (e) => {
        let newSystemTheme = e.matches ? 'dark' : 'light';
        document.documentElement.setAttribute("data-color-mode", newSystemTheme);
        // 更新图标
        if (themeSettings[newSystemTheme]) {
            let icon = themeSettings[newSystemTheme][1];
            let color = themeSettings[newSystemTheme][2];
            document.getElementById("themeSwitch").setAttribute("d", IconList[icon]);
            document.getElementById("themeSwitch").parentNode.style.color = color;
        }
    };
    systemThemeMediaQuery.addEventListener('change', systemThemeListener);
}

function stopSystemThemeListener() {
    if (systemThemeListener) {
        systemThemeMediaQuery.removeEventListener('change', systemThemeListener);
        systemThemeListener = null;
    }
}

function applyTheme(mode) {
    // 应用主题设置，更新图标和颜色
    if (themeSettings[mode]) {
        let icon = themeSettings[mode][1];
        let color = themeSettings[mode][2];
        document.getElementById("themeSwitch").setAttribute("d", IconList[icon]);
        document.getElementById("themeSwitch").parentNode.style.color = color;
    }
}

function changeTheme(mode, icon, color, utheme){
    document.documentElement.setAttribute("data-color-mode", mode);
    document.getElementById("themeSwitch").setAttribute("d", value=IconList[icon]);
    document.getElementById("themeSwitch").parentNode.style.color = color;
    if(utterancesLoad==1){utterancesTheme(utheme);}
}

function modeSwitch(){
    let newMode;
    
    // 循环：light -> dark -> auto -> light
    if (currentThemeMode === "light") {
        newMode = "dark";
    } else if (currentThemeMode === "dark") {
        newMode = "auto";
    } else {
        newMode = "light";
    }
    
    // 更新当前模式
    currentThemeMode = newMode;
    localStorage.setItem("meek_theme", newMode);
    
    if (newMode === "auto") {
        // 切换到 auto 模式，立即应用当前系统主题
        stopSystemThemeListener();
        let systemTheme = getSystemTheme();
        document.documentElement.setAttribute("data-color-mode", systemTheme);
        applyTheme("auto");
        startSystemThemeListener();
    } else if (themeSettings[newMode]) {
        stopSystemThemeListener();
        changeTheme(...themeSettings[newMode]);
    }
}

function utterancesTheme(theme){
    const message={type:'set-theme',theme: theme};
    const iframe=document.getElementsByClassName('utterances-frame')[0];
    iframe.contentWindow.postMessage(message,'https://utteranc.es');
}

// 初始化主题
if (theme === "auto") {
    // 如果是 auto 模式，应用当前系统主题并启动监听
    let systemTheme = getSystemTheme();
    document.documentElement.setAttribute("data-color-mode", systemTheme);
    applyTheme("auto");
    startSystemThemeListener();
} else if (themeSettings[theme]) {
    changeTheme(...themeSettings[theme]);

    const minDisplayTime = 500;
    const startTime = Date.now();
    
    function hidePreloader() {

        const remainingTime = Math.max(0, minDisplayTime - elapsedTime);
        
        setTimeout(function() {
            preloader.classList.add('hidden');
            
            // 动画完全结束后移除元素
            setTimeout(function() {
                if (preloader.parentNode) {
                    preloader.parentNode.removeChild(preloader);
                }
            }, 500); // 与 CSS transition 时间一致
        }, remainingTime);
    }
    
    // 页面加载完成后隐藏动画
    if (document.readyState === 'complete') {
        hidePreloader();
    } else {
        window.addEventListener('load', hidePreloader);

// 树枝背景动画 - 参考 BackgrounRandom.astro
(function() {
    const canvas = document.getElementById('branch-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    
    const r180 = Math.PI;
    const r90 = Math.PI / 2;
    const r15 = Math.PI / 12;
    const MIN_BRANCH = 30;
    const len = 6;
    
    let steps = [];
    let prevSteps = [];
    let size = { width: window.innerWidth, height: window.innerHeight };
    
    function randomMiddle() {
        return Math.random() * 0.6 + 0.2;
    }
    
    function initCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = size.width + 'px';
        canvas.style.height = size.height + 'px';
        canvas.width = dpr * size.width;
        canvas.height = dpr * size.height;
        ctx.scale(dpr, dpr);
    }
    
    function polar2cart(x, y, r, theta) {
        const dx = r * Math.cos(theta);
        const dy = r * Math.sin(theta);
        return [x + dx, y + dy];
    }
    
    function step(x, y, rad, counter) {
        counter = counter || { value: 0 };
        const length = Math.random() * len;
        counter.value += 1;
        
        const [nx, ny] = polar2cart(x, y, length, rad);
        
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(nx, ny);
        ctx.stroke();
        
        const rad1 = rad + Math.random() * r15;
        const rad2 = rad - Math.random() * r15;
        
        if (nx < -100 || nx > size.width + 100 || ny < -100 || ny > size.height + 100) return;
        
        const rate = counter.value <= MIN_BRANCH ? 0.8 : 0.5;
        
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad1, counter); });
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad2, counter); });
    }
    
    function frame() {
        prevSteps = steps;
        steps = [];
        
        if (!prevSteps.length) return;
        
        prevSteps.forEach(function(i) {
            if (Math.random() < 0.5) steps.push(i);
            else i();
        });
        
        requestAnimationFrame(frame);
    }
    
    function getBranchColor() {
        const isDark = document.documentElement.getAttribute('data-color-mode') === 'dark';
        // 使用 CSS 变量获取主题色，适配明暗模式
        const style = getComputedStyle(document.documentElement);
        const accent = style.getPropertyValue('--color-accent-fg').trim() || (isDark ? '#58a6ff' : '#0969da');
        // 解析 HSL 并降低透明度
        if (accent.startsWith('#')) {
            const r = parseInt(accent.slice(1, 3), 16);
            const g = parseInt(accent.slice(3, 5), 16);
            const b = parseInt(accent.slice(5, 7), 16);
            return 'rgba(' + r + ', ' + g + ', ' + b + ', 0.12)';
        }
        return isDark ? 'rgba(88, 166, 255, 0.12)' : 'rgba(9, 105, 218, 0.12)';
    }
    
    function start() {
        const color = getBranchColor();
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 1;
        ctx.strokeStyle = color;
        prevSteps = [];
        steps = [
            function() { step(randomMiddle() * size.width, -5, r90); },
            function() { step(randomMiddle() * size.width, size.height + 5, -r90); },
            function() { step(-5, randomMiddle() * size.height, 0); },
            function() { step(size.width + 5, randomMiddle() * size.height, r180); }
        ];
        if (size.width < 500) steps = steps.slice(0, 2);
        requestAnimationFrame(frame);
    }
    
    initCanvas();
    start();
    
    // 窗口大小改变时重新绘制
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
            if (window.innerWidth === size.width) return;
            size.width = window.innerWidth;
            size.height = window.innerHeight;
            initCanvas();
            start();
        }, 200);
    });
    
    // 主题切换时更新颜色
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.attributeName === 'data-color-mode') {
                start();
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true });
})();

// SafeGo 外链中转处理

(function() {
    const SAFEGO_CONFIG = {
        enableBase64: true,
        goPagePath: 'https://moretti815.github.io/blog/go.html',
        domainWhitelist: ["moretti815.github.io", "github.com", "jsd.268682.xyz", "cdn.jsdmirror.com", "www.kemiaosw.top"],
        ignoreAttrs: ["data-fancybox"],
        urlParamName: 'u'
    };

    function encodeSafeUrl(url) {
        if (!SAFEGO_CONFIG.enableBase64) {
            return encodeURIComponent(url);
        }
        const base64 = btoa(encodeURIComponent(url).replace(/%([0-9A-F]{2})/g,
            function(_, p1) { return String.fromCharCode('0x' + p1); }
        ));
        return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function isExternalLink(href) {
        if (!href || href.startsWith('#') || href.startsWith('javascript:') || href.startsWith('mailto:')) {
            return false;
        }
        if (href.startsWith('/') && !href.startsWith('//')) {
            return false;
        }
        try {
            const url = new URL(href, window.location.href);
            const currentHost = window.location.hostname;
            if (url.hostname === currentHost) {
                return false;
            }
            for (let i = 0; i < SAFEGO_CONFIG.domainWhitelist.length; i++) {
                if (url.hostname.includes(SAFEGO_CONFIG.domainWhitelist[i])) {
                    return false;
                }
            }
            return true;
        } catch (e) {
            return false;
        }
    }

    function hasIgnoreAttr(element) {
        for (let i = 0; i < SAFEGO_CONFIG.ignoreAttrs.length; i++) {
            if (element.hasAttribute(SAFEGO_CONFIG.ignoreAttrs[i])) {
                return true;
            }
        }
        return false;
    }

    function processLinks() {
        const links = document.querySelectorAll('a[href]');
        links.forEach(function(link) {
            if (link.hasAttribute('data-safego-processed')) {
                return;
            }
            const href = link.getAttribute('href');
            if (hasIgnoreAttr(link)) {
                link.setAttribute('data-safego-processed', 'true');
                return;
            }
            if (isExternalLink(href)) {
                const encodedUrl = encodeSafeUrl(href);
                const goUrl = SAFEGO_CONFIG.goPagePath + '?' + SAFEGO_CONFIG.urlParamName + '=' + encodedUrl;
                link.setAttribute('href', goUrl);
                link.setAttribute('data-safego-processed', 'true');
                // 不设置 target="_blank"，在当前页打开中转页，以便正确返回
            }
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', processLinks);
    } else {
        processLinks();
    }

    const observer = new MutationObserver(function(mutations) {
        let shouldProcess = false;
        mutations.forEach(function(mutation) {
            if (mutation.type === 'childList') {
                mutation.addedNodes.forEach(function(node) {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        if (node.tagName === 'A' || node.querySelectorAll) {
                            shouldProcess = true;
                        }
                    }
                });
            }
        });
        if (shouldProcess) {
            processLinks();
        }
    });

    observer.observe(document.body, { childList: true, subtree: true });
})();
