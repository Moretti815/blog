<script>
(function() {
    'use strict';
    
    // PJAX Configuration
    const PJAX_CONFIG = {
        selector: 'a[href^="https://blog.2005815.xyz"]:not([data-pjax-disable]):not([href*=".pdf"]):not([href*=".zip"]):not([href*=".rar"]):not([target="_blank"])',
        container: '#content',
        timeout: 10000,
        cache: true,
        cacheLimit: 10
    };
    
    // Cache storage
    const pageCache = new Map();
    
    // Current state
    let isLoading = false;
    let currentUrl = location.href;
    
    // Utility: Parse HTML string
    function parseHTML(html) {
        const parser = new DOMParser();
        return parser.parseFromString(html, 'text/html');
    }
    
    // Utility: Execute scripts in container
    function executeScripts(container) {
        const scripts = container.querySelectorAll('script');
        scripts.forEach(oldScript => {
            const newScript = document.createElement('script');
            // Copy attributes
            Array.from(oldScript.attributes).forEach(attr => {
                newScript.setAttribute(attr.name, attr.value);
            });
            // Copy content
            newScript.textContent = oldScript.textContent;
            // Replace
            oldScript.parentNode.replaceChild(newScript, oldScript);
        });
    }
    
    // Utility: Update elements that need refresh
    function updatePage(doc, url) {
        const newContent = doc.querySelector(PJAX_CONFIG.container);
        const currentContent = document.querySelector(PJAX_CONFIG.container);
        
        if (!newContent || !currentContent) {
            console.warn('PJAX: Content container not found');
            return false;
        }
        
        // Update content
        currentContent.innerHTML = newContent.innerHTML;
        
        // Execute scripts in new content
        executeScripts(currentContent);
        
        // Update title
        const newTitle = doc.querySelector('title');
        if (newTitle) {
            document.title = newTitle.textContent;
        }
        
        // Update meta tags (description, og:*, etc.)
        const metaSelectors = ['meta[name="description"]', 'meta[property^="og:"]', 'meta[name="twitter:"]'];
        metaSelectors.forEach(selector => {
            const newMeta = doc.querySelector(selector);
            const currentMeta = document.querySelector(selector);
            if (newMeta && currentMeta) {
                currentMeta.content = newMeta.content;
            }
        });
        
        // Update header if it exists in both pages
        const newHeader = doc.querySelector('#header');
        const currentHeader = document.querySelector('#header');
        if (newHeader && currentHeader) {
            currentHeader.innerHTML = newHeader.innerHTML;
            executeScripts(currentHeader);
        }
        
        // Update footer if it exists in both pages
        const newFooter = doc.querySelector('#footer');
        const currentFooter = document.querySelector('#footer');
        if (newFooter && currentFooter) {
            currentFooter.innerHTML = newFooter.innerHTML;
            executeScripts(currentFooter);
        }
        
        // Update body classes and attributes
        const newBody = doc.body;
        const currentBody = document.body;
        
        // Copy data attributes from new body
        Array.from(newBody.attributes).forEach(attr => {
            if (attr.name.startsWith('data-')) {
                currentBody.setAttribute(attr.name, attr.value);
            }
        });
        
        // Trigger custom event for page-specific initialization
        window.dispatchEvent(new CustomEvent('pjax:complete', { detail: { url: url } }));
        
        return true;
    }
    
    // Load page via AJAX
    async function loadPage(url, pushState = true) {
        if (isLoading || url === currentUrl) return;
        
        isLoading = true;
        
        // Show loading indicator
        showLoading();
        
        // Check cache
        if (PJAX_CONFIG.cache && pageCache.has(url)) {
            const cached = pageCache.get(url);
            if (Date.now() - cached.time < 5 * 60 * 1000) { // 5 minutes cache
                updatePage(cached.doc, url);
                if (pushState) {
                    history.pushState({ url: url }, '', url);
                }
                currentUrl = url;
                isLoading = false;
                hideLoading();
                return;
            }
            pageCache.delete(url);
        }
        
        try {
            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'X-PJAX': 'true'
                },
                credentials: 'same-origin'
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const html = await response.text();
            const doc = parseHTML(html);
            
            // Cache the page
            if (PJAX_CONFIG.cache) {
                if (pageCache.size >= PJAX_CONFIG.cacheLimit) {
                    const firstKey = pageCache.keys().next().value;
                    pageCache.delete(firstKey);
                }
                pageCache.set(url, { doc: doc, time: Date.now() });
            }
            
            // Update page
            if (updatePage(doc, url)) {
                if (pushState) {
                    history.pushState({ url: url }, '', url);
                }
                currentUrl = url;
                
                // Scroll to top
                window.scrollTo(0, 0);
            } else {
                // Fallback to normal navigation
                location.href = url;
            }
            
        } catch (error) {
            console.error('PJAX load error:', error);
            // Fallback to normal navigation
            location.href = url;
        } finally {
            isLoading = false;
            hideLoading();
        }
    }
    
    // Show loading indicator
    function showLoading() {
        // Use existing preloader if available
        const preloader = document.getElementById('preloader');
        if (preloader) {
            preloader.style.display = 'flex';
            preloader.classList.remove('hidden');
        }
    }
    
    // Hide loading indicator
    function hideLoading() {
        const preloader = document.getElementById('preloader');
        if (preloader) {
            preloader.classList.add('hidden');
            setTimeout(() => {
                if (!isLoading) {
                    preloader.style.display = 'none';
                }
            }, 500);
        }
    }
    
    // Handle link clicks
    function handleClick(event) {
        const link = event.target.closest('a');
        if (!link) return;
        
        // Check if link matches PJAX selector
        if (!link.matches(PJAX_CONFIG.selector)) return;
        
        // Skip if modifier keys are pressed
        if (event.ctrlKey || event.metaKey || event.shiftKey || event.altKey) return;
        
        // Skip if it's the same page
        if (link.href === currentUrl) {
            event.preventDefault();
            return;
        }
        
        event.preventDefault();
        loadPage(link.href);
    }
    
    // Handle popstate (back/forward buttons)
    function handlePopState(event) {
        if (event.state && event.state.url) {
            loadPage(event.state.url, false);
        }
    }
    
    // Initialize PJAX
    function init() {
        // Don't initialize if browser doesn't support required features
        if (!window.history || !window.history.pushState) return;
        
        // Add click listener to document
        document.addEventListener('click', handleClick);
        
        // Handle back/forward buttons
        window.addEventListener('popstate', handlePopState);
        
        // Save initial state
        history.replaceState({ url: location.href }, '', location.href);
        
        console.log('%c PJAX initialized ', 'padding:2px 5px;background:#0969da;color:#fff;border-radius:3px');
    }
    
    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    
    // Expose PJAX API
    window.PJAX = {
        load: loadPage,
        reload: function() { loadPage(currentUrl, false); },
        clearCache: function() { pageCache.clear(); },
        config: PJAX_CONFIG
    };
})();
</script>

<script>

window.addEventListener('pjax:complete', function(event) {
    const url = event.detail.url;

    const themeSwitch = document.getElementById('themeSwitch');
    if (themeSwitch && typeof IconList !== 'undefined') {
        const currentMode = document.documentElement.getAttribute('data-color-mode');
        if (currentMode === 'dark') {
            themeSwitch.setAttribute('d', IconList['moon']);
            themeSwitch.parentNode.style.color = '#00f0ff';
        } else {

    }

(function() {
    const canvas = document.getElementById('branch-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    
    const r180 = Math.PI;
    const r90 = Math.PI / 2;
    const r15 = Math.PI / 12;
    const MIN_BRANCH = 30;
    const len = 6;
    
    let steps = [];
    let prevSteps = [];
    let size = { width: window.innerWidth, height: window.innerHeight };
    
    function randomMiddle() {
        return Math.random() * 0.6 + 0.2;
    }
    
    function initCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = size.width + 'px';
        canvas.style.height = size.height + 'px';
        canvas.width = dpr * size.width;
        canvas.height = dpr * size.height;
        ctx.scale(dpr, dpr);
    }
    
    function polar2cart(x, y, r, theta) {
        const dx = r * Math.cos(theta);
        const dy = r * Math.sin(theta);
        return [x + dx, y + dy];
    }
    
    function step(x, y, rad, counter) {
        counter = counter || { value: 0 };
        const length = Math.random() * len;
        counter.value += 1;
        
        const [nx, ny] = polar2cart(x, y, length, rad);
        
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(nx, ny);
        ctx.stroke();
        
        const rad1 = rad + Math.random() * r15;
        const rad2 = rad - Math.random() * r15;
        
        if (nx < -100 || nx > size.width + 100 || ny < -100 || ny > size.height + 100) return;
        
        const rate = counter.value <= MIN_BRANCH ? 0.8 : 0.5;
        
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad1, counter); });
        if (Math.random() < rate) steps.push(function() { step(nx, ny, rad2, counter); });
    }
    
    function frame() {
        prevSteps = steps;
        steps = [];
        
        if (!prevSteps.length) return;
        
        prevSteps.forEach(function(i) {
            if (Math.random() < 0.5) steps.push(i);
            else i();
        });
        
        requestAnimationFrame(frame);
    }
    
    function getBranchColor() {
        const isDark = document.documentElement.getAttribute('data-color-mode') === 'dark';
        // 使用 CSS 变量获取主题色，适配明暗模式
        const style = getComputedStyle(document.documentElement);
        const accent = style.getPropertyValue('--color-accent-fg').trim() || (isDark ? '#58a6ff' : '#0969da');
        // 解析 HSL 并降低透明度
        if (accent.startsWith('#')) {
            const r = parseInt(accent.slice(1, 3), 16);
            const g = parseInt(accent.slice(3, 5), 16);
            const b = parseInt(accent.slice(5, 7), 16);
            return 'rgba(' + r + ', ' + g + ', ' + b + ', 0.12)';
        }
        return isDark ? 'rgba(88, 166, 255, 0.12)' : 'rgba(9, 105, 218, 0.12)';
    }
    
    function start() {
        const color = getBranchColor();
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 1;
        ctx.strokeStyle = color;
        prevSteps = [];
        steps = [
            function() { step(randomMiddle() * size.width, -5, r90); },
            function() { step(randomMiddle() * size.width, size.height + 5, -r90); },
            function() { step(-5, randomMiddle() * size.height, 0); },
            function() { step(size.width + 5, randomMiddle() * size.height, r180); }
        ];
        if (size.width < 500) steps = steps.slice(0, 2);
        requestAnimationFrame(frame);
    }
    
    initCanvas();
    start();
    
    // 窗口大小改变时重新绘制
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
            if (window.innerWidth === size.width) return;
            size.width = window.innerWidth;
            size.height = window.innerHeight;
            initCanvas();
            start();
        }, 200);
    });
    
    // 主题切换时更新颜色
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.attributeName === 'data-color-mode') {
                start();
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true });
})();

(function() {
    const SAFEGO_CONFIG = {
        enableBase64: true,
        goPagePath: 'https://blog.2005815.xyz/go.html',
        domainWhitelist: ["moretti815.github.io", "github.com", "jsd.268682.xyz", "jsd.liiiu.cn", "www.kemiaosw.top", "blog.2005815.xyz"],
        ignoreAttrs: ["data-fancybox"],
        enableTargetBlank: true
    };
    
    function encodeSafeUrl(url) {
        if (!SAFEGO_CONFIG.enableBase64) {
            return encodeURIComponent(url);
        }
        
        // Base64 encode with URL safe characters
        const base64 = btoa(encodeURIComponent(url).replace(/%([0-9A-F]{2})/g,
            function(_, p1) { return String.fromCharCode('0x' + p1); }
        ));
        
        // Replace URL unsafe characters
        return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    
    function isExternalLink(href) {
        if (!href || href.startsWith('#') || href.startsWith('javascript:') || href.startsWith('mailto:') || href.startsWith('tel:')) {
            return false;
        }
        
        // Relative links
        if (href.startsWith('/') && !href.startsWith('//')) {
            return false;
        }
        
        try {
            const url = new URL(href, window.location.href);
            const currentHost = window.location.hostname;
            
            // Same domain
            if (url.hostname === currentHost) {
                return false;
            }
            
            // Check whitelist
            for (let i = 0; i < SAFEGO_CONFIG.domainWhitelist.length; i++) {
                if (url.hostname.includes(SAFEGO_CONFIG.domainWhitelist[i])) {
                    return false;
                }
            }
            
            return true;
        } catch (e) {
            return false;
        }
    }
    
    function hasIgnoreAttr(element) {
        for (let i = 0; i < SAFEGO_CONFIG.ignoreAttrs.length; i++) {
            if (element.hasAttribute(SAFEGO_CONFIG.ignoreAttrs[i])) {
                return true;
            }
        }
        return false;
    }
    
    function processLinks() {
        const links = document.querySelectorAll('a[href]');
        
        links.forEach(function(link) {
            // Skip already processed
            if (link.hasAttribute('data-safego-processed')) {
                return;
            }
            
            const href = link.getAttribute('href');
            
            // Skip if has ignore attribute
            if (hasIgnoreAttr(link)) {
                link.setAttribute('data-safego-processed', 'true');
                return;
            }
            
            // Check if external link
            if (isExternalLink(href)) {
                const encodedUrl = encodeSafeUrl(href);
                // 将来源页 URL 附加到 go 链接中，解决 noopener 导致 referrer 为空的问题
                const fromUrl = encodeURIComponent(window.location.href);
                const goUrl = SAFEGO_CONFIG.goPagePath + '?u=' + encodedUrl + '&from=' + fromUrl;
                
                link.setAttribute('href', goUrl);
                link.setAttribute('data-safego-processed', 'true');
                link.setAttribute('rel', 'external nofollow noopener noreferrer');
                
                if (SAFEGO_CONFIG.enableTargetBlank) {
                    link.setAttribute('target', '_blank');
                }
            }
        });
    }
    
    // Process on DOM ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', processLinks);
    } else {
        processLinks();
    }
    
    // Process dynamically added links
    const observer = new MutationObserver(function(mutations) {
        let shouldProcess = false;
        mutations.forEach(function(mutation) {
            if (mutation.type === 'childList') {
                mutation.addedNodes.forEach(function(node) {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        if (node.tagName === 'A' || node.querySelectorAll) {
                            shouldProcess = true;
                        }
                    }
                });
            }
        });
        
        if (shouldProcess) {
            processLinks();
        }
    });
    
    observer.observe(document.body, { childList: true, subtree: true });
})();

(function() {

        countdownTime: 5,
        enableBase64: true
    };

    let countdown = SAFEGO_CONFIG.countdownTime;

        if (preloader && preloader.parentNode) {
            preloader.parentNode.removeChild(preloader);
        }

    function getQueryString(name) {
        var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
        var r = window.location.search.substr(1).match(reg);
        return r ? decodeURIComponent(r[2]) : null;
    }
    
    function decodeSafeUrlParam(paramStr) {
        if (!paramStr) return paramStr;
        var base64 = paramStr.replace(/-/g, "+").replace(/_/g, "/");
        var paddingLength = (4 - (base64.length % 4)) % 4;
        if (paddingLength) {
            base64 += "=".repeat(paddingLength);
        }
        return decodeURIComponent(atob(base64).split("").map(function(char) {
            return "%" + ("00" + char.charCodeAt(0).toString(16)).slice(-2);
        }).join(""));
    }
    
    function initUrl() {
        jumpUrl = getQueryString('u');
        
        if (SAFEGO_CONFIG.enableBase64 && jumpUrl) {
            try {
                jumpUrl = decodeSafeUrlParam(jumpUrl);
            } catch (e) {
                jumpUrl = null;
            }
        }
        
        var urlReg = /^(http|https|thunder|qqdl|ed2k|Flashget|qbrowser|ftp|rtsp|mms):\/\//i;
        if (!jumpUrl || !urlReg.test(jumpUrl)) {
            document.title = 'Parameter Error';
            jumpUrl = 'https://blog.2005815.xyz';
        }
        
        document.getElementById('jump-url-text').textContent = jumpUrl;
    }
    
    function updateCountdown() {
        var countdownEl = document.getElementById('countdown');
        var progressEl = document.getElementById('progress');
        
        if (countdown <= 0) {
            jumpNow();
            return;
        }
        
        countdownEl.textContent = countdown;
        
        if (progressEl && SAFEGO_CONFIG.countdownTime > 0) {
            var percent = (countdown / SAFEGO_CONFIG.countdownTime) * 100;
            progressEl.style.width = percent + '%';
        }
        
        countdown--;
    }
    
    function startCountdown() {
        // 先更新一次显示
        updateCountdown();
        
        if (countdown > 0) {
            countdownInterval = setInterval(updateCountdown, 1000);
        }
    }
    
    function jumpNow() {
        if (countdownInterval) {
            clearInterval(countdownInterval);
            countdownInterval = null;
        }
        window.location.href = jumpUrl;
    }
    
    function goBack() {
        if (countdownInterval) {
            clearInterval(countdownInterval);
            countdownInterval = null;
        }

        // 优先使用 URL 参数中的 from 返回来源页（解决 noopener 导致 referrer 为空的问题）
        var fromUrl = getQueryString('from');
        if (fromUrl && fromUrl !== window.location.href) {
            window.location.href = fromUrl;
            return;
        }

        // 其次使用 document.referrer
        if (document.referrer && document.referrer !== window.location.href) {
            window.location.href = document.referrer;
            return;
        }

        // 最后尝试 history.back()
        if (window.history.length > 1) {
            window.history.back();
            return;
        }

        // 最后回到首页
        window.location.href = 'https://blog.2005815.xyz';
    }
    
    function fallbackCopyText(text) {
        var tempInput = document.createElement("input");
        tempInput.value = text;
        tempInput.style.position = "fixed";
        tempInput.style.opacity = "0";
        document.body.appendChild(tempInput);
        tempInput.select();
        tempInput.setSelectionRange(0, text.length);
        var copied = document.execCommand("copy");
        document.body.removeChild(tempInput);
        return copied;
    }

        if (!urlText) return;
        
        var toast = document.getElementById("copy-toast");

            toast.textContent = success ?
                '已复制！' :
                '复制失败';
            toast.classList.add("show");
            setTimeout(function() {
                toast.classList.remove("show");
            }, 1600);
        }
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(urlText).then(function() {

            }).catch(function() {

            });
        } else {
            showToast(fallbackCopyText(urlText));
        }
    };
    
    window.jumpNow = jumpNow;
    window.goBack = goBack;
    
    // 初始化
    initUrl();
    
    // 适配加载动画：等待加载动画结束后再开始倒计时
    function waitForPreloader() {
        var preloader = document.getElementById('preloader');

        // 如果加载动画不存在或已隐藏，直接开始倒计时
        if (!preloader || preloader.classList.contains('hidden') || preloader.style.display === 'none' || preloader.style.visibility === 'hidden') {
            startCountdown();
            return;
        }

        // 监听自定义事件 preloaderHidden
        function onPreloaderHidden() {
            window.removeEventListener('preloaderHidden', onPreloaderHidden);
            startCountdown();
        }
        window.addEventListener('preloaderHidden', onPreloaderHidden);

        // 创建 MutationObserver 监听加载动画的隐藏
        var observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.type === 'attributes') {
                    if (preloader.classList.contains('hidden') || preloader.style.display === 'none' || preloader.style.visibility === 'hidden' || preloader.style.opacity === '0') {
                        observer.disconnect();
                        window.removeEventListener('preloaderHidden', onPreloaderHidden);
                        startCountdown();
                    }
                }
            });
        });

        observer.observe(preloader, {
            attributes: true,
            attributeFilter: ['class', 'style']
        });

        // 备用方案：最多等待 3.5 秒（确保 base.html 的 3 秒强制隐藏先执行）
        setTimeout(function() {
            observer.disconnect();
            window.removeEventListener('preloaderHidden', onPreloaderHidden);
            startCountdown();
        }, 3500);
    }

    // 立即尝试开始（如果页面已经加载完成）
    if (document.readyState === 'complete') {
        waitForPreloader();
    } else if (document.readyState === 'interactive') {
        // DOM 已准备好，等待一小段时间让加载动画开始显示
        setTimeout(waitForPreloader, 100);
    } else {
        // 页面还在加载中，等待 load 事件
        window.addEventListener('load', function() {
            setTimeout(waitForPreloader, 100);
        });
    }
})();
</script>
