<style>
.postTitle{margin: auto 0;font-size:40px;font-weight:bold;}

/* Link Page Styles */
.flink-container {
    padding: 20px 0;
}

.flink-header {
    text-align: center;
    margin-bottom: 40px;
    padding: 30px 20px;
    background: linear-gradient(135deg, var(--color-canvas-subtle) 0%, var(--color-canvas-default) 100%);
    border-radius: 16px;
    border: 1px solid var(--color-border-default);
}

.flink-header h1 {
    margin: 0 0 12px 0;
    font-size: 32px;
    color: var(--color-fg-default);
}

.flink-header p {
    margin: 0;
    font-size: 16px;
    color: var(--color-fg-muted);
}

.flink-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 0;
    margin: 0;
    list-style: none;
}

.flink-list-item {
    display: block;
    text-decoration: none;
    background-color: var(--color-canvas-default);
    border: 1px solid var(--color-border-default);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    position: relative;
}

.flink-list-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
}

.flink-card-cover {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-bottom: 1px solid var(--color-border-default);
    background-color: var(--color-canvas-subtle);
}

.flink-card-content {
    padding: 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
}

.flink-card-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 2px solid var(--color-border-default);
}

.flink-card-info {
    flex: 1;
    min-width: 0;
}

.flink-card-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--color-fg-default);
    margin: 0 0 6px 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.flink-card-desc {
    font-size: 13px;
    color: var(--color-fg-muted);
    margin: 0;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* Status Tag Styles */
.status-tag {
    position: absolute;
    top: 0;
    left: 0;
    padding: 4px 10px;
    border-radius: 12px 0 12px 0;
    font-size: 11px;
    color: white;
    font-weight: bold;
    transition: font-size 0.3s ease-out, opacity 0.3s ease-out;
    z-index: 10;
}

.flink-list-item:hover .status-tag {
    font-size: 0;
    opacity: 0;
}

.status-tag-green {
    background-color: #1a7f37;
}

.status-tag-light-yellow {
    background-color: #9a6700;
}

.status-tag-dark-yellow {
    background-color: #7d4e00;
}

.status-tag-red {
    background-color: #cf222e;
}

/* Loading State */
.flink-loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--color-fg-muted);
}

.flink-loading .loading-spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 3px solid var(--color-border-default);
    border-top-color: var(--color-accent-fg);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 16px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Error State */
.flink-error {
    text-align: center;
    padding: 40px 20px;
    color: var(--color-danger-fg);
}

/* Responsive Design */
@media (max-width: 768px) {
    .postTitle{font-size:28px;}

    .flink-header h1 {
        font-size: 24px;
    }

    .flink-header p {
        font-size: 14px;
    }

    .flink-list {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 16px;
    }

    .flink-card-cover {
        height: 140px;
    }

    .flink-card-content {
        padding: 12px;
    }

    .flink-card-avatar {
        width: 40px;
        height: 40px;
    }

    .flink-card-name {
        font-size: 14px;
    }

    .flink-card-desc {
        font-size: 12px;
    }
}

@media (max-width: 480px) {
    .flink-list {
        grid-template-columns: 1fr;
    }
}

<script>
document.getElementById("pathHome").setAttribute("d",IconList["home"]);
document.getElementById("pathSearch").setAttribute("d",IconList["search"]);
document.getElementById("pathRSS").setAttribute("d",IconList["rss"]);

// Friend links data URL
const FRIEND_LINKS_URL = 'https://cdn.jsdmirror.com/gh/Kemeow0815/friends@output/v2/data.json';
const STATUS_CHECK_URL = 'https://check-flink.qyliu.top/result.json';

// Render friend links
function renderFriendLinks(data) {
    const listContainer = document.getElementById('flinkList');
    const loadingEl = document.getElementById('flinkLoading');
    const errorEl = document.getElementById('flinkError');

    // Support both data structures: {content: [...]} and {link_list: [...]}
    const linkList = data.content || data.link_list || [];

    if (!linkList || linkList.length === 0) {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        errorEl.textContent = '暂无友链';
        return;
    }

    let html = '';
    linkList.forEach(link => {
        // Support multiple field names for compatibility
        const cover = link.snapshot || link.cover || link.screenshot || '';
        const avatar = link.icon || link.avatar || link.favicon || '';
        const name = link.title || link.name || 'Unknown';
        const desc = link.description || link.descr || '';
        const url = link.url || link.link || '#';

        html += `
            <li>
                <a href="${url}" class="flink-list-item" target="_blank" rel="noopener noreferrer">
                    <img class="flink-card-cover" src="${cover}" alt="${name}" loading="lazy" onerror="this.style.display='none'">
                    <div class="flink-card-content">
                        <img class="flink-card-avatar" src="${avatar}" alt="${name}" loading="lazy" onerror="this.style.display='none'">
                        <div class="flink-card-info">
                            <h3 class="flink-card-name">${name}</h3>
                            <p class="flink-card-desc">${desc}</p>
                        </div>
                    </div>
                </a>
            </li>
        `;
    });

    listContainer.innerHTML = html;
    loadingEl.style.display = 'none';
    listContainer.style.display = 'grid';

    // Load status tags
    loadStatusTags();
}

// Load status tags with cache
function loadStatusTags() {
    const cacheKey = 'flinkStatusData';
    const cacheExpirationTime = 30 * 60 * 1000; // 30 minutes

    function applyStatusTags(data) {
        if (!data || !data.link_status) return;

        const linkStatus = data.link_status;
        document.querySelectorAll('.flink-list-item').forEach(card => {
            if (!card.href) return;
            const link = card.href.replace(/\/$/, '');

            const status = linkStatus.find(item => item.link && item.link.replace(/\/$/, '') === link);
            if (status) {
                const statusTag = document.createElement('div');
                statusTag.classList.add('status-tag');

                let latencyText = 'ERR';
                let className = 'status-tag-red';

                if (status.latency === -1) {
                    latencyText = 'ERR';
                } else {
                    const latencyMs = status.latency * 1000;
                    latencyText = Math.round(latencyMs) + ' MS';

                    if (status.latency <= 2) {
                        className = 'status-tag-green';
                    } else if (status.latency <= 5) {
                        className = 'status-tag-light-yellow';
                    } else if (status.latency <= 10) {
                        className = 'status-tag-dark-yellow';
                    }
                }

                statusTag.textContent = latencyText;
                statusTag.classList.add(className);
                card.appendChild(statusTag);
            }
        });
    }

    function fetchStatusData() {
        fetch(STATUS_CHECK_URL)
            .then(response => response.json())
            .then(data => {
                applyStatusTags(data);
                const cacheData = {
                    data: data,
                    timestamp: Date.now()
                };
                localStorage.setItem(cacheKey, JSON.stringify(cacheData));
            })
            .catch(error => console.error('Error fetching status data:', error));
    }

    const cachedData = localStorage.getItem(cacheKey);
    if (cachedData) {
        try {
            const { data, timestamp } = JSON.parse(cachedData);
            if (Date.now() - timestamp < cacheExpirationTime) {
                applyStatusTags(data);
                return;
            }
        } catch (e) {
            console.error('Error parsing cached data:', e);
        }
    }

    fetchStatusData();
}

// Fetch friend links
function fetchFriendLinks() {
    fetch(FRIEND_LINKS_URL)
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => renderFriendLinks(data))
        .catch(error => {
            console.error('Error fetching friend links:', error);
            document.getElementById('flinkLoading').style.display = 'none';
            document.getElementById('flinkError').style.display = 'block';
        });
}

// Initialize
document.addEventListener('DOMContentLoaded', fetchFriendLinks);
</script>
